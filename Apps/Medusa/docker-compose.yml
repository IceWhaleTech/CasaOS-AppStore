name: medusa
services:
  medusa:
    container_name: medusa
    deploy:
      resources:
        limits:
          memory: 7848M
    environment:
      - TZ= $TZ
    image: pymedusa/medusa:master
    ports:
      - target: 8081
        published: "8081"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID
        target: /config
      - type: bind
        source: /DATA/AppData/$AppID/Downloads/Television
        target: /downloads
      - type: bind
        source: /DATA/AppData/$AppID/Media/Television
        target: /tv
    network_mode: bridge
    privileged: false
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: medusa
  author: Jason McFeetors
  developer: pyMedusa (https://github.com/pymedusa)
  category: Media
  description:
    en_us: Automatic Video Library Manager for TV Shows. It watches for new episodes of your favorite shows, and when they are posted it does its magic.
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-3.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-4.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-5.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Medusa/screenshot-6.png
  index: /
  port_map: "8081"
  scheme: http
  store_app_id: medusa
  title:
    en_us: Medusa
  version: "master"
  updateAt: "2024-03-26"
  releaseNotes:
    en_US: |-
      - The main image uses the floating master tag, so release notes cannot be mapped to one fixed upstream version.
      - Pin the image to a concrete upstream tag before recording version-specific GitHub changelog notes.
      - The latest checked GitHub release adds a code of conduct and supply-chain security scorecard action.
      - Project dependencies and lock files were updated.
  website: ""
  repo: "https://github.com/pymedusa/Medusa"
  support: "https://github.com/pymedusa/Medusa/issues"
  docs: "https://github.com/pymedusa/Medusa/wiki"
