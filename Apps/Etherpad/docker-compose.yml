      - Suradničko uređivanje u stvarnom vremenu s trenutačnom sinkronizacijom
      - Označavanje bojom po autoru za jasno praćenje doprinosa
      - Ugrađena administratorska ploča i ekosustav s više od 250 dodataka
      - Izvorni uvoz i izvoz za DOCX, PDF i Markdown
      - Samohostirano open source postavljanje uz podršku za amd64 i arm64

      **Saznajte Više:**
      - [Službena Web Stranica Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Dokumentacija](https://docs.etherpad.org/)
    pt_PT: |
      Etherpad é um editor colaborativo de documentos em tempo real onde várias pessoas podem editar o mesmo pad em simultâneo, com cada alteração sincronizada de imediato e identificada por cores por autor.
      Auto-hospedado, open source e totalmente sob o seu controlo, é ideal para notas de reunião, brainstorming, escrita partilhada e recolha leve de conhecimento.
      Inclui um painel de administração integrado, um ecossistema com mais de 250 extensões, importação e exportação nativas de DOCX/PDF/Markdown e suporte de contentor multiarquitetura (amd64 + arm64).

      **Principais Funcionalidades:**
      - Edição colaborativa em tempo real com sincronização imediata
      - Identificação por cores por autor para atribuição clara do texto
      - Painel de administração integrado e ecossistema com mais de 250 extensões
      - Importação e exportação nativas de DOCX, PDF e Markdown
      - Implementação auto-hospedada open source com suporte para amd64 e arm64

      **Saiba Mais:**
      - [Site Oficial Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Documentação Etherpad](https://docs.etherpad.org/)
    ru_RU: |
      Etherpad - это редактор совместных документов в реальном времени, в котором несколько человек могут одновременно редактировать один и тот же pad, при этом каждое изменение мгновенно синхронизируется и выделяется цветом по автору.
      Самостоятельно размещаемый, с открытым исходным кодом и полностью подконтрольный вам, он отлично подходит для заметок встреч, мозговых штурмов, совместного письма и легкого накопления знаний.
      В комплект входят встроенная панель администратора, экосистема из 250+ дополнений, нативный импорт и экспорт DOCX/PDF/Markdown, а также поддержка контейнеров для нескольких архитектур (amd64 + arm64).

      **Основные Функции:**
      - Совместное редактирование в реальном времени с мгновенной синхронизацией
      - Цветовое выделение по авторам для понятной атрибуции текста
      - Встроенная панель администратора и экосистема из 250+ дополнений
      - Нативный импорт и экспорт DOCX, PDF и Markdown
      - Open source self-hosted развертывание с поддержкой amd64 и arm64

      **Узнать Больше:**
      - [Официальный Сайт Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Документация Etherpad](https://docs.etherpad.org/)
    tr_TR: |
      Etherpad, birden fazla kişinin aynı pad üzerinde aynı anda çalışabildiği, her değişikliğin anında senkronize edilip yazara göre renkle gösterildiği gerçek zamanlı ortak belge düzenleyicisidir.
      Kendi kendine barındırılabilir, açık kaynaklıdır ve tamamen sizin kontrolünüzdedir; toplantı notları, beyin fırtınası, ortak yazım ve hafif bilgi toplama için idealdir.
      Yerleşik bir yönetim paneli, 250'den fazla eklenti içeren bir ekosistem, yerel DOCX/PDF/Markdown içe aktarma ve dışa aktarma ile çoklu mimari kapsayıcı desteği (amd64 + arm64) sunar.

      **Başlıca İşlevler:**
      - Anında senkronizasyon ile gerçek zamanlı ortak düzenleme
      - Katkıları açıkça görmek için yazar bazlı renk kodlama
      - Yerleşik yönetim paneli ve 250'den fazla eklenti içeren ekosistem
      - DOCX, PDF ve Markdown için yerel içe aktarma ve dışa aktarma
      - amd64 ve arm64 desteğine sahip açık kaynaklı self-hosted kurulum

      **Daha Fazla Bilgi:**
      - [Etherpad Resmi Web Sitesi](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Dokümantasyonu](https://docs.etherpad.org/)
