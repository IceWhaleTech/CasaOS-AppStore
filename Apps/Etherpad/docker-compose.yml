name: etherpad
services:
  etherpad:
    image: etherpad/etherpad:3.1.0
    container_name: etherpad
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    restart: unless-stopped
    ports:
      - target: 9001
        published: "9001"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/var
        target: /opt/etherpad-lite/var
    environment:
      TITLE: Etherpad
      DEFAULT_PAD_TEXT: "Welcome to Etherpad on CasaOS!\n\nThis pad text is synchronized as you type, so that everyone viewing this page sees the same text. This allows you to collaborate seamlessly on documents!\n\nGet involved with Etherpad at https://etherpad.org\n"
      ADMIN_PASSWORD: admin
      AUTHENTICATION_METHOD: apikey
      DB_TYPE: dirty
      DB_FILENAME: /opt/etherpad-lite/var/dirty.db
      TRUST_PROXY: "true"
      SHOW_SETTINGS_IN_ADMIN_PAGE: "true"
      REQUIRE_AUTHENTICATION: "false"
      REQUIRE_AUTHORIZATION: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    x-casaos:
      ports:
        - container: "9001"
          description:
            en_US: WebUI HTTP Port
            en_GB: WebUI HTTP Port
            it_IT: Porta HTTP WebUI
            nb_NO: WebUI HTTP-port
            zh_CN: WebUI HTTP端口
            ja_JP: WebUI HTTPポート
            ko_KR: WebUI HTTP 포트
            fr_FR: Port HTTP WebUI
            de_DE: WebUI-HTTP-Port
            sv_SE: WebUI HTTP-port
            el_GR: Θύρα HTTP WebUI
            hr_HR: WebUI HTTP priključak
            pt_PT: Porta HTTP da WebUI
            ru_RU: HTTP-порт WebUI
            tr_TR: WebUI HTTP Bağlantı Noktası
      volumes:
        - container: /opt/etherpad-lite/var
          description:
            en_US: Etherpad Data Directory
            en_GB: Etherpad Data Directory
            it_IT: Directory Dati di Etherpad
            nb_NO: Etherpad datakatalog
            zh_CN: Etherpad 数据目录
            ja_JP: Etherpad データディレクトリ
            ko_KR: Etherpad 데이터 디렉터리
            fr_FR: Répertoire de données Etherpad
            de_DE: Etherpad-Datenverzeichnis
            sv_SE: Etherpad datakatalog
            el_GR: Κατάλογος δεδομένων Etherpad
            hr_HR: Etherpad direktorij podataka
            pt_PT: Diretório de dados do Etherpad
            ru_RU: Каталог данных Etherpad
            tr_TR: Etherpad veri dizini
      envs:
        - container: TITLE
          description:
            en_us: Name of your Etherpad instance (shown in the browser tab).
        - container: ADMIN_PASSWORD
          description:
            en_us: Password for the "admin" user used to reach /admin. CHANGE THIS.
        - container: DEFAULT_PAD_TEXT
          description:
            en_us: Text shown inside every freshly created pad.
        - container: AUTHENTICATION_METHOD
          description:
            en_us: 'Authentication mode. "apikey" (default here) enables admin login; "sso" enables OAuth2.'
        - container: REQUIRE_AUTHENTICATION
          description:
            en_us: If "true", every pad requires a login. Default "false" means public pads.
        - container: DB_TYPE
          description:
            en_us: Database backend. "dirty" is a zero-config embedded file store suitable for single-user CasaOS installs. Use "postgres"/"mysql" for production.
        - container: DB_FILENAME
          description:
            en_us: Path inside the container for the dirty-db file. Kept on the persistent volume.
        - container: TRUST_PROXY
          description:
            en_us: Set to "true" when running behind CasaOS's reverse proxy.
      ports:
        - container: "9001"
          description:
            en_us: WebUI HTTP Port
      volumes:
        - container: /opt/etherpad-lite/var
          description:
            en_us: Etherpad data directory (pads, sessions, dirty.db, plugins).

x-casaos:
  architectures:
    - amd64
    - arm64
  main: etherpad
  category: Notes
  developer: Etherpad Foundation
  author: CasaOS Community
  tagline:
    en_US: Real-time collaborative document editor
    en_GB: Real-time collaborative document editor
    it_IT: Editor di documenti collaborativo in tempo reale
    nb_NO: Samarbeidsredigerer for dokumenter i sanntid
    zh_CN: 实时协作文档编辑器
    ja_JP: リアルタイム共同文書エディタ
    ko_KR: 실시간 협업 문서 편집기
    fr_FR: Éditeur de documents collaboratif en temps réel
    de_DE: Kollaborativer Dokumenteneditor in Echtzeit
    sv_SE: Samarbetseditor för dokument i realtid
    el_GR: Επεξεργαστής συνεργατικών εγγράφων σε πραγματικό χρόνο
    hr_HR: Uređivač suradničkih dokumenata u stvarnom vremenu
    pt_PT: Editor colaborativo de documentos em tempo real
    ru_RU: Редактор совместных документов в реальном времени
    tr_TR: Gerçek zamanlı ortak belge düzenleyici
  description:
    en_US: |
      Etherpad is a real-time collaborative document editor where multiple people can edit the same pad simultaneously, with every change synchronized instantly and colour-coded per author.
      Self-hosted, open source, and fully under your control, it is perfect for meeting notes, brainstorming, shared writing, and lightweight knowledge capture.
      It ships with a built-in admin panel, a plugin ecosystem of 250+ add-ons, native DOCX/PDF/Markdown import & export, and multi-architecture container support (amd64 + arm64).

      **Main Features:**
      - Real-time collaborative editing with instant sync
      - Per-author colour coding for clear writing attribution
      - Built-in admin panel and a plugin ecosystem with 250+ add-ons
      - Native DOCX, PDF, and Markdown import & export
      - Open source, self-hosted deployment with amd64 and arm64 support

      **Learn More:**
      - [Etherpad Official Website](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Documentation](https://docs.etherpad.org/)
    en_GB: |
      Etherpad is a real-time collaborative document editor where multiple people can edit the same pad simultaneously, with every change synchronised instantly and colour-coded per author.
      Self-hosted, open source, and fully under your control, it is perfect for meeting notes, brainstorming, shared writing, and lightweight knowledge capture.
      It ships with a built-in admin panel, a plugin ecosystem of 250+ add-ons, native DOCX/PDF/Markdown import & export, and multi-architecture container support (amd64 + arm64).

      **Main Features:**
      - Real-time collaborative editing with instant synchronisation
      - Per-author colour coding for clear writing attribution
      - Built-in admin panel and a plugin ecosystem with 250+ add-ons
      - Native DOCX, PDF, and Markdown import & export
      - Open source, self-hosted deployment with amd64 and arm64 support

      **Learn More:**
      - [Etherpad Official Website](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Documentation](https://docs.etherpad.org/)
    it_IT: |
      Etherpad è un editor di documenti collaborativo in tempo reale in cui più persone possono modificare lo stesso pad contemporaneamente, con ogni modifica sincronizzata all'istante e colorata in base all'autore.
      Self-hosted, open source e completamente sotto il tuo controllo, è perfetto per verbali di riunioni, brainstorming, scrittura condivisa e raccolta leggera della conoscenza.
      Include un pannello di amministrazione integrato, un ecosistema di oltre 250 componenti aggiuntivi, importazione ed esportazione native DOCX/PDF/Markdown e supporto multiarchitettura per container (amd64 + arm64).

      **Funzionalità Principali:**
      - Modifica collaborativa in tempo reale con sincronizzazione immediata
      - Colori per autore per vedere chiaramente chi ha scritto cosa
      - Pannello di amministrazione integrato ed ecosistema con oltre 250 componenti aggiuntivi
      - Importazione ed esportazione native di DOCX, PDF e Markdown
      - Distribuzione open source self-hosted con supporto amd64 e arm64

      **Ulteriori Informazioni:**
      - [Sito Ufficiale Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Documentazione Etherpad](https://docs.etherpad.org/)
    nb_NO: |
      Etherpad er en samarbeidsredigerer for dokumenter i sanntid der flere personer kan redigere samme pad samtidig, og hver endring synkroniseres umiddelbart og fargekodes etter forfatter.
      Selvhostet, åpen kildekode og fullt under din kontroll, passer det godt til møtenotater, idémyldring, delt skriving og lett kunnskapsfangst.
      Det leveres med et innebygd administrasjonspanel, et plugin-økosystem med 250+ tillegg, innebygd import og eksport for DOCX/PDF/Markdown og multiarkitektur-støtte for containere (amd64 + arm64).

      **Hovedfunksjoner:**
      - Samarbeidsredigering i sanntid med øyeblikkelig synkronisering
      - Fargekoding per forfatter for tydelig skriveattribusjon
      - Innebygd administrasjonspanel og plugin-økosystem med 250+ tillegg
      - Innebygd import og eksport av DOCX, PDF og Markdown
      - Åpen kildekode og selvhostet drift med støtte for amd64 og arm64

      **Lær Mer:**
      - [Etherpad Offisielle Nettside](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Dokumentasjon](https://docs.etherpad.org/)
    zh_CN: |
      Etherpad 是一款实时协作文档编辑器，多人可以同时编辑同一个 pad，所有修改都会立即同步，并按作者颜色区分。
      它支持自托管、开源且完全由你掌控，非常适合会议记录、头脑风暴、协作写作和轻量知识沉淀。
      它内置管理面板，拥有 250+ 插件生态，原生支持 DOCX/PDF/Markdown 导入导出，并提供 amd64 与 arm64 多架构容器支持。

      **主要功能：**
      - 实时协同编辑，修改即时同步
      - 按作者颜色区分内容，便于追踪贡献
      - 内置管理面板，配合 250+ 插件扩展生态
      - 原生支持 DOCX、PDF 和 Markdown 的导入与导出
      - 开源自托管部署，支持 amd64 和 arm64

      **了解更多：**
      - [Etherpad 官网](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad 文档](https://docs.etherpad.org/)
    ja_JP: |
      Etherpadはリアルタイム共同文書エディタであり、複数の人が同じパッドを同時に編集でき、すべての変更は即座に同期され、著者ごとに色分けされます。
      セルフホスト可能でオープンソース、そして完全に自分で管理できるため、会議メモ、ブレインストーミング、共同執筆、軽量なナレッジ共有に適しています。
      内蔵の管理パネル、250以上のアドオンを持つプラグインエコシステム、DOCX/PDF/Markdownのネイティブなインポートとエクスポート、amd64とarm64向けのマルチアーキテクチャ対応コンテナを備えています。

      **主な機能：**
      - 即時同期に対応したリアルタイム共同編集
      - 誰が書いたかを分かりやすくする著者ごとの色分け
      - 内蔵管理パネルと250以上のアドオンを備えたプラグインエコシステム
      - DOCX、PDF、Markdownのネイティブなインポートとエクスポート
      - amd64とarm64をサポートするオープンソースのセルフホスト運用

      **詳細情報：**
      - [Etherpad 公式サイト](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad ドキュメント](https://docs.etherpad.org/)
    ko_KR: |
      Etherpad는 실시간 협업 문서 편집기로, 여러 사람이 같은 패드를 동시에 편집할 수 있으며 모든 변경 사항은 즉시 동기화되고 작성자별로 색상이 구분됩니다.
      자체 호스팅이 가능하고 오픈 소스이며 완전히 직접 제어할 수 있어 회의록, 브레인스토밍, 공동 작성, 가벼운 지식 정리에 적합합니다.
      내장 관리자 패널, 250개 이상의 애드온을 갖춘 플러그인 생태계, DOCX/PDF/Markdown의 기본 가져오기 및 내보내기, amd64와 arm64를 지원하는 멀티 아키텍처 컨테이너를 제공합니다.

      **주요 기능:**
      - 즉시 동기화되는 실시간 협업 편집
      - 누가 무엇을 썼는지 보여 주는 작성자별 색상 구분
      - 250개 이상의 애드온을 갖춘 내장 관리자 패널과 플러그인 생태계
      - DOCX, PDF, Markdown의 기본 가져오기 및 내보내기
      - amd64와 arm64를 지원하는 오픈 소스 자체 호스팅 배포

      **더 알아보기:**
      - [Etherpad 공식 웹사이트](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad 문서](https://docs.etherpad.org/)
    fr_FR: |
      Etherpad est un éditeur de documents collaboratif en temps réel où plusieurs personnes peuvent modifier le même pad simultanément, avec chaque changement synchronisé instantanément et codé par couleur selon l'auteur.
      Auto-hébergé, open source et entièrement sous votre contrôle, il est idéal pour les comptes rendus de réunion, le brainstorming, l'écriture partagée et la capture légère de connaissances.
      Il comprend un panneau d'administration intégré, un écosystème de plus de 250 extensions, l'import et l'export natifs DOCX/PDF/Markdown, ainsi qu'une prise en charge multiarchitecture des conteneurs (amd64 + arm64).

      **Fonctionnalités Principales :**
      - Édition collaborative en temps réel avec synchronisation immédiate
      - Codage par couleur par auteur pour identifier clairement les contributions
      - Panneau d'administration intégré et écosystème de plus de 250 extensions
      - Import et export natifs de DOCX, PDF et Markdown
      - Déploiement auto-hébergé open source avec prise en charge amd64 et arm64

      **En Savoir Plus :**
      - [Site Officiel Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Documentation Etherpad](https://docs.etherpad.org/)
    de_DE: |
      Etherpad ist ein kollaborativer Dokumenteneditor in Echtzeit, in dem mehrere Personen gleichzeitig dasselbe Pad bearbeiten können, wobei jede Änderung sofort synchronisiert und pro Autor farblich gekennzeichnet wird.
      Selbst gehostet, Open Source und vollständig unter Ihrer Kontrolle eignet es sich ideal für Besprechungsnotizen, Brainstorming, gemeinsames Schreiben und leichte Wissensdokumentation.
      Es bietet ein integriertes Administrationspanel, ein Plugin-Ökosystem mit mehr als 250 Erweiterungen, nativen DOCX/PDF/Markdown-Import und -Export sowie Multiarchitektur-Containerunterstützung für amd64 und arm64.

      **Hauptfunktionen:**
      - Zusammenarbeit in Echtzeit mit sofortiger Synchronisierung
      - Farbliche Kennzeichnung pro Autor für klare Zuordnung von Beiträgen
      - Integriertes Administrationspanel und Plugin-Ökosystem mit über 250 Erweiterungen
      - Nativer Import und Export für DOCX, PDF und Markdown
      - Open-Source-Self-Hosting mit Unterstützung für amd64 und arm64

      **Mehr Erfahren:**
      - [Etherpad Offizielle Website](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Dokumentation](https://docs.etherpad.org/)
    sv_SE: |
      Etherpad är en samarbetseditor för dokument i realtid där flera personer kan redigera samma pad samtidigt, och varje ändring synkroniseras direkt och färgkodas per författare.
      Självhostad, öppen källkod och helt under din kontroll passar den bra för mötesanteckningar, brainstorming, gemensamt skrivande och lätt kunskapsinsamling.
      Den levereras med en inbyggd administrationspanel, ett plugin-ekosystem med över 250 tillägg, inbyggd import och export för DOCX/PDF/Markdown samt containerstöd för flera arkitekturer (amd64 + arm64).

      **Huvudfunktioner:**
      - Samarbetsredigering i realtid med omedelbar synkronisering
      - Färgkodning per författare för tydlig attribution
      - Inbyggd administrationspanel och plugin-ekosystem med över 250 tillägg
      - Inbyggd import och export av DOCX, PDF och Markdown
      - Öppen källkod och självhostad drift med stöd för amd64 och arm64

      **Lär Dig Mer:**
      - [Etherpad Officiella Webbplats](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Etherpad Dokumentation](https://docs.etherpad.org/)
    el_GR: |
      Το Etherpad είναι ένας επεξεργαστής συνεργατικών εγγράφων σε πραγματικό χρόνο όπου πολλά άτομα μπορούν να επεξεργάζονται το ίδιο pad ταυτόχρονα, με κάθε αλλαγή να συγχρονίζεται άμεσα και να χρωματίζεται ανά συγγραφέα.
      Αυτο-φιλοξενούμενο, ανοιχτού κώδικα και πλήρως υπό τον έλεγχό σας, είναι ιδανικό για σημειώσεις συναντήσεων, brainstorming, κοινή συγγραφή και ελαφριά καταγραφή γνώσης.
      Περιλαμβάνει ενσωματωμένο πίνακα διαχείρισης, οικοσύστημα με 250+ πρόσθετα, εγγενή εισαγωγή και εξαγωγή DOCX/PDF/Markdown και υποστήριξη κοντέινερ πολλαπλών αρχιτεκτονικών (amd64 + arm64).

      **Κύριες Λειτουργίες:**
      - Συνεργατική επεξεργασία σε πραγματικό χρόνο με άμεσο συγχρονισμό
      - Χρωματική κωδικοποίηση ανά συγγραφέα για σαφή απόδοση συνεισφορών
      - Ενσωματωμένος πίνακας διαχείρισης και οικοσύστημα με 250+ πρόσθετα
      - Εγγενής εισαγωγή και εξαγωγή DOCX, PDF και Markdown
      - Αυτο-φιλοξενούμενη εγκατάσταση ανοιχτού κώδικα με υποστήριξη amd64 και arm64

      **Μάθετε Περισσότερα:**
      - [Επίσημος Ιστότοπος Etherpad](https://etherpad.org/)
      - [Etherpad GitHub](https://github.com/ether/etherpad)
      - [Τεκμηρίωση Etherpad](https://docs.etherpad.org/)
    hr_HR: |
      Etherpad je uređivač suradničkih dokumenata u stvarnom vremenu u kojem više osoba može istovremeno uređivati isti pad, a svaka promjena sinkronizira se odmah i označava bojom prema autoru.
      Samohostiran, otvorenog koda i potpuno pod vašom kontrolom, idealan je za zapisnike sastanaka, brainstorming, zajedničko pisanje i lagano bilježenje znanja.
      Dolazi s ugrađenom administratorskom pločom, ekosustavom s više od 250 dodataka, izvornim DOCX/PDF/Markdown uvozom i izvozom te podrškom za višearhitekturne spremnike (amd64 + arm64).

