  tips:
    before_install:
      en_US: |
        Default admin password is "admin". Change ADMIN_PASSWORD before exposing Etherpad to the network. Pads are stored on-disk in /DATA/AppData/etherpad/var using the embedded dirty database; this is ideal for personal and small-team use. For heavy multi-user production workloads, switch DB_TYPE to postgres or mysql and point DB_HOST, DB_NAME, DB_USER, and DB_PASS at an external database.
      en_GB: |
        Default admin password is "admin". Change ADMIN_PASSWORD before exposing Etherpad to the network. Pads are stored on-disk in /DATA/AppData/etherpad/var using the embedded dirty database; this is ideal for personal and small-team use. For heavy multi-user production workloads, switch DB_TYPE to postgres or mysql and point DB_HOST, DB_NAME, DB_USER, and DB_PASS at an external database.
      it_IT: |
        La password amministratore predefinita è "admin". Modifica ADMIN_PASSWORD prima di esporre Etherpad alla rete. I pad vengono salvati su disco in /DATA/AppData/etherpad/var usando il database dirty integrato; questa configurazione è ideale per uso personale o per piccoli team. Per carichi di produzione con molti utenti, imposta DB_TYPE su postgres o mysql e fai puntare DB_HOST, DB_NAME, DB_USER e DB_PASS a un database esterno.
      nb_NO: |
        Standard administratorpassord er "admin". Endre ADMIN_PASSWORD før du eksponerer Etherpad mot nettverket. Pads lagres på disk i /DATA/AppData/etherpad/var ved hjelp av den innebygde dirty-databasen; dette er ideelt for personlig bruk og små team. For tunge produksjonsmiljøer med mange brukere bør du bytte DB_TYPE til postgres eller mysql og peke DB_HOST, DB_NAME, DB_USER og DB_PASS til en ekstern database.
      zh_CN: |
        默认管理员密码是 "admin"。在将 Etherpad 暴露到网络之前，请先修改 ADMIN_PASSWORD。Pad 数据会使用内置的 dirty 数据库存储在 /DATA/AppData/etherpad/var 中，这种方式适合个人或小团队使用。对于高并发的生产场景，请将 DB_TYPE 改为 postgres 或 mysql，并将 DB_HOST、DB_NAME、DB_USER 和 DB_PASS 指向外部数据库。
      ja_JP: |
        デフォルトの管理者パスワードは "admin" です。Etherpad をネットワークに公開する前に ADMIN_PASSWORD を変更してください。pad は組み込みの dirty データベースを使って /DATA/AppData/etherpad/var に保存され、この構成は個人利用や小規模チームに適しています。多数のユーザーが利用する本番環境では、DB_TYPE を postgres または mysql に変更し、DB_HOST、DB_NAME、DB_USER、DB_PASS を外部データベースに向けてください。
      ko_KR: |
        기본 관리자 비밀번호는 "admin"입니다. Etherpad를 네트워크에 노출하기 전에 ADMIN_PASSWORD를 변경하세요. 패드는 내장 dirty 데이터베이스를 사용해 /DATA/AppData/etherpad/var 에 디스크로 저장되며, 이 방식은 개인용이나 소규모 팀에 적합합니다. 많은 사용자가 사용하는 운영 환경이라면 DB_TYPE을 postgres 또는 mysql로 바꾸고 DB_HOST, DB_NAME, DB_USER, DB_PASS를 외부 데이터베이스로 지정하세요.
      fr_FR: |
        Le mot de passe administrateur par défaut est "admin". Modifiez ADMIN_PASSWORD avant d'exposer Etherpad au réseau. Les pads sont stockés sur disque dans /DATA/AppData/etherpad/var à l'aide de la base dirty intégrée ; cette configuration convient à un usage personnel ou à de petites équipes. Pour des charges de production multi-utilisateurs importantes, remplacez DB_TYPE par postgres ou mysql et pointez DB_HOST, DB_NAME, DB_USER et DB_PASS vers une base de données externe.
      de_DE: |
        Das Standard-Administratorpasswort lautet "admin". Ändern Sie ADMIN_PASSWORD, bevor Sie Etherpad im Netzwerk verfügbar machen. Pads werden mit der eingebetteten dirty-Datenbank auf dem Datenträger unter /DATA/AppData/etherpad/var gespeichert; das ist ideal für den persönlichen Einsatz und kleine Teams. Für stark ausgelastete Produktionsumgebungen mit vielen Benutzern sollten Sie DB_TYPE auf postgres oder mysql umstellen und DB_HOST, DB_NAME, DB_USER und DB_PASS auf eine externe Datenbank verweisen lassen.
      sv_SE: |
        Standardlösenordet för administratören är "admin". Ändra ADMIN_PASSWORD innan du exponerar Etherpad mot nätverket. Pads lagras på disk i /DATA/AppData/etherpad/var med den inbyggda dirty-databasen; detta passar bra för personligt bruk och små team. För tyngre produktionsmiljöer med många användare bör du byta DB_TYPE till postgres eller mysql och peka DB_HOST, DB_NAME, DB_USER och DB_PASS mot en extern databas.
      el_GR: |
        Ο προεπιλεγμένος κωδικός διαχειριστή είναι "admin". Αλλάξτε το ADMIN_PASSWORD πριν εκθέσετε το Etherpad στο δίκτυο. Τα pads αποθηκεύονται στον δίσκο στο /DATA/AppData/etherpad/var χρησιμοποιώντας την ενσωματωμένη βάση dirty· αυτή η ρύθμιση είναι ιδανική για προσωπική χρήση και μικρές ομάδες. Για βαριά παραγωγικά φορτία πολλών χρηστών, αλλάξτε το DB_TYPE σε postgres ή mysql και κατευθύνετε τα DB_HOST, DB_NAME, DB_USER και DB_PASS σε εξωτερική βάση δεδομένων.
      hr_HR: |
        Zadana administratorska lozinka je "admin". Promijenite ADMIN_PASSWORD prije nego što Etherpad izložite mreži. Padovi se pohranjuju na disk u /DATA/AppData/etherpad/var koristeći ugrađenu dirty bazu podataka; to je idealno za osobnu upotrebu i male timove. Za zahtjevnija produkcijska okruženja s više korisnika promijenite DB_TYPE u postgres ili mysql te usmjerite DB_HOST, DB_NAME, DB_USER i DB_PASS na vanjsku bazu podataka.
      pt_PT: |
        A palavra-passe de administrador predefinida é "admin". Altere ADMIN_PASSWORD antes de expor o Etherpad à rede. Os pads são guardados em disco em /DATA/AppData/etherpad/var usando a base de dados dirty incorporada; esta configuração é ideal para uso pessoal e pequenas equipas. Para cargas de produção multiutilizador mais pesadas, altere DB_TYPE para postgres ou mysql e aponte DB_HOST, DB_NAME, DB_USER e DB_PASS para uma base de dados externa.
      ru_RU: |
        Пароль администратора по умолчанию - "admin". Измените ADMIN_PASSWORD перед тем, как открывать Etherpad для сети. Данные pad сохраняются на диске в /DATA/AppData/etherpad/var с использованием встроенной базы dirty; такой вариант подходит для личного использования и небольших команд. Для нагруженных производственных установок с большим числом пользователей переключите DB_TYPE на postgres или mysql и направьте DB_HOST, DB_NAME, DB_USER и DB_PASS на внешнюю базу данных.
      tr_TR: |
        Varsayılan yönetici parolası "admin" değeridir. Etherpad'i ağa açmadan önce ADMIN_PASSWORD değerini değiştirin. Pad'ler, gömülü dirty veritabanı kullanılarak /DATA/AppData/etherpad/var üzerinde diske kaydedilir; bu yapı kişisel kullanım ve küçük ekipler için idealdir. Yoğun çok kullanıcılı üretim iş yüklerinde DB_TYPE değerini postgres veya mysql olarak değiştirin ve DB_HOST, DB_NAME, DB_USER ile DB_PASS değerlerini harici bir veritabanına yönlendirin.
  scheme: http
  port_map: "9001"
