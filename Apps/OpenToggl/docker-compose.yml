name: opentoggl
services:
  opentoggl:
    image: correctroad/opentoggl:latest
    container_name: opentoggl
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: unless-stopped
    ports:
      - target: 8080
        published: "7789"
        protocol: tcp
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://opentoggl:${POSTGRES_PASSWORD}@opentoggl-db:5432/opentoggl?sslmode=disable
      REDIS_URL: redis://opentoggl-redis:6379/0
    networks:
      - opentoggl-network
    depends_on:
      - opentoggl-db
      - opentoggl-redis
    x-casaos:
      ports:
        - container: "8080"
          description:
            en_US: WebUI HTTP Port
            zh_CN: WebUI HTTP 端口
      envs:
        - container: DATABASE_URL
          description:
            en_US: Database Connection URL
            zh_CN: 数据库连接 URL
        - container: REDIS_URL
          description:
            en_US: Redis Connection URL
            zh_CN: Redis 连接 URL

  opentoggl-db:
    container_name: opentoggl-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opentoggl
      POSTGRES_USER: opentoggl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/pgdata
        target: /var/lib/postgresql/data
    networks:
      - opentoggl-network
    x-casaos:
      envs:
        - container: POSTGRES_DB
          description:
            en_US: PostgreSQL Database Name
            zh_CN: PostgreSQL 数据库名称
        - container: POSTGRES_USER
          description:
            en_US: PostgreSQL User
            zh_CN: PostgreSQL 用户
        - container: POSTGRES_PASSWORD
          description:
            en_US: PostgreSQL Password
            zh_CN: PostgreSQL 密码
      volumes:
        - container: /var/lib/postgresql/data
          description:
            en_US: PostgreSQL Data Directory
            zh_CN: PostgreSQL 数据目录

  opentoggl-redis:
    container_name: opentoggl-redis
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    networks:
      - opentoggl-network

networks:
  opentoggl-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: opentoggl
  category: Utilities
  developer: CorrectRoadH
  author: CorrectRoadH
  tagline:
    en_US: Free, private-first, AI-friendly alternative to Toggl time tracking.
    zh_CN: 免费、隐私优先、AI 友好的 Toggl 时间追踪替代方案。
  description:
    en_US: |
      OpenToggl is a free, private-first, AI-friendly alternative to Toggl.

      Toggl is a great product, but it's expensive and your data doesn't really belong to you. On top of that, the 30 requests/hour API limit is painful — an AI agent can burn through an hour's quota in a single minute.

      OpenToggl aims to stay aligned with Toggl, so you can move your data in and out between the two with zero loss. Keep every workflow and habit you already have. Nothing changes — it just gets better, cheaper, and more private.

      OpenToggl integrates with AI agents via [`toggl-cli`](https://github.com/CorrectRoadH/toggl-cli), letting AI help you log, manage, and review your time. You can apply the Lyubishchev time management method to find your time black holes.

      See the full documentation [here](https://opentoggl.com/docs/ai-integration).

      [Give us a Star](https://github.com/CorrectRoadH/opentoggl)
      [OpenToggl Official Website](https://opentoggl.com?utm_source=casaos-appstore)
    zh_CN: |
      OpenToggl 是一个免费、隐私优先、AI友好 的 Toggl 替代方案。

      Toggl 是一个很棒的产品，但是太贵而且数据并没有真正的属于你。而且 30 次/小时的 API 调用限制又令人头疼，AI Agent 能在一分钟内就把一个小时的用量给消耗掉。

      OpenToggl 的目标是与 Toggl 保持一致，你可以 0 损失的迁入与迁出用户数据在两者之间。保持一切工作流与使用习惯。什么都没有变，只是更好用、更便宜、更隐私了。

      OpenToggl 可以通过 [`toggl-cli`](https://github.com/CorrectRoadH/toggl-cli) 与 AI Agent 集成，让 AI Agent 帮助你记录、管理、复盘你的时间。可以应用柳比歇夫时间管理法来找出你的时间黑洞。

      详细文档见[这里](https://opentoggl.com/zh/docs/ai-integration)

      [给我一个 Star 吧](https://github.com/CorrectRoadH/opentoggl)
      [OpenToggl 官方网站](https://opentoggl.com?utm_source=casaos-appstore)

  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenToggl/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenToggl/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenToggl/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenToggl/screenshot-3.png
  thumbnail: ""
  scheme: http
  port_map: "7789"
  index: /
  title:
    en_US: OpenToggl
