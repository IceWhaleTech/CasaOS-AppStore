name: opentoggl
services:
  opentoggl:
    image: correctroad/opentoggl:latest
    container_name: opentoggl
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: unless-stopped
    ports:
      - target: 8080
        published: "7789"
        protocol: tcp
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://opentoggl:opentoggl@opentoggl-db:5432/opentoggl?sslmode=disable
      REDIS_URL: redis://opentoggl-redis:6379/0
    networks:
      - opentoggl-network
    depends_on:
      - opentoggl-db
      - opentoggl-redis
    x-casaos:
      ports:
        - container: "8080"
          description:
            en_US: WebUI HTTP Port
            zh_CN: WebUI HTTP 端口
      envs:
        - container: DATABASE_URL
          description:
            en_US: Database Connection URL
            zh_CN: 数据库连接 URL
        - container: REDIS_URL
          description:
            en_US: Redis Connection URL
            zh_CN: Redis 连接 URL

  opentoggl-db:
    container_name: opentoggl-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opentoggl
      POSTGRES_USER: opentoggl
      POSTGRES_PASSWORD: opentoggl
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/pgdata
        target: /var/lib/postgresql/data
    networks:
      - opentoggl-network
    x-casaos:
      envs:
        - container: POSTGRES_DB
          description:
            en_US: PostgreSQL Database Name
            zh_CN: PostgreSQL 数据库名称
        - container: POSTGRES_USER
          description:
            en_US: PostgreSQL User
            zh_CN: PostgreSQL 用户
        - container: POSTGRES_PASSWORD
          description:
            en_US: PostgreSQL Password
            zh_CN: PostgreSQL 密码
      volumes:
        - container: /var/lib/postgresql/data
          description:
            en_US: PostgreSQL Data Directory
            zh_CN: PostgreSQL 数据目录

  opentoggl-redis:
    container_name: opentoggl-redis
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    networks:
      - opentoggl-network

networks:
  opentoggl-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
  main: opentoggl
  category: Utilities
  developer: CorrectRoadH
  author: CorrectRoadH
  tagline:
    en_US: Free, private-first, AI-friendly alternative to Toggl time tracking.
    zh_CN: 免费、隐私优先、AI 友好的 Toggl 时间追踪替代方案。
  description:
    en_US: |
      OpenToggl is a free, private-first, AI-friendly alternative to Toggl.

      Toggl is a great product, but it's expensive and your data doesn't really belong to you. On top of that, the 30 requests/hour API limit is painful — an AI agent can burn through an hour's quota in a single minute.

      OpenToggl aims to stay aligned with Toggl, so you can move your data in and out between the two without any loss. Keep every workflow and habit you already have. Nothing changes — it just gets better, cheaper, and more private.

      **Key Features:**
      - Free and open source time tracking
      - Private-first, self-hostable on your own CasaOS / ZimaOS / NAS
      - AI-friendly: no API rate limits — works seamlessly with AI agents
      - Full API compatibility with Toggl Track v9 and Reports v3 (drop-in migration in/out, zero data loss)
      - Installable PWA on iOS and Android with offline support
      - Works directly with [toggl-cli](https://github.com/CorrectRoadH/toggl-cli) for AI-assisted time tracking (Lyubishchev method supported)

      **Learn More:**
      [Give us a Star](https://github.com/CorrectRoadH/opentoggl)

      [OpenToggl Official Website](https://opentoggl.com?utm_source=casaos-appstore&utm_medium=app-store&utm_campaign=opentoggl)
    zh_CN: |
      OpenToggl 是一个免费、隐私优先、AI 友好的 Toggl 替代方案。

      Toggl 是一个很棒的产品，但是太贵而且数据并没有真正的属于你。而且 30 次/小时的 API 调用限制又令人头疼，AI Agent 能在一分钟内就把一个小时的用量给消耗掉。

      OpenToggl 的目标是与 Toggl 保持一致，你可以 0 损失的迁入与迁出用户数据在两者之间。保持一切工作流与使用习惯。什么都没有变，只是更好用、更便宜、更隐私了。

      **主要功能：**
      - 免费开源的时间追踪
      - 隐私优先，可自托管在你的 CasaOS / ZimaOS / NAS 上
      - AI 友好，无 API 速率限制，完美适配 AI Agent 场景
      - 完全兼容 Toggl Track v9 和 Reports v3 API（0 损失迁入迁出）
      - 可安装的 PWA，支持 iOS、Android 并离线可用
      - 直接与 [toggl-cli](https://github.com/CorrectRoadH/toggl-cli) 集成，支持 AI 辅助记录（适合柳比歇夫时间管理法）

      **了解更多：**
      [给我一个 Star 吧](https://github.com/CorrectRoadH/opentoggl)

      [OpenToggl 官方网站](https://opentoggl.com?utm_source=casaos-appstore&utm_medium=app-store&utm_campaign=opentoggl)

