  releaseNotes:
    en_US: |-
      - 2.8.2 is a rollup release with automated build testing and InfluxDB support.
      - Probe handling, FPing command-line behavior, SSH handling, zoom mode URLs, cropper relative-time entry, config reloads for slaves, templates, loss colors, and graph titles were improved.
      - Fixes include restoring FindBin, adding the missing README, and correcting spelling in FTPtransfer.pm.
    en_GB: |-
      - 2.8.2 is a rollup release with automated build testing and InfluxDB support.
      - Probe handling, FPing command-line behavior, SSH handling, zoom mode URLs, cropper relative-time entry, config reloads for slaves, templates, loss colors, and graph titles were improved.
      - Fixes include restoring FindBin, adding the missing README, and correcting spelling in FTPtransfer.pm.
    it_IT: |-
      - 2.8.2 è una versione cumulativa con test di build automatizzati e supporto InfluxDB.
      - Sono stati migliorati la gestione della sonda, il comportamento FPing command-line, la gestione di SSH, la modalità zoom URLs, la voce cropper relative-time, i ricaricamenti della configurazione per gli slave, i modelli, i colori delle perdite e i titoli dei grafici.
      - Le correzioni includono il ripristino di FindBin, l'aggiunta di README mancante e la correzione dell'ortografia in FTPtransfer.pm.
    nb_NO: |-
      - 2.8.2 er en samleutgivelse med automatisert byggetesting og InfluxDB-støtte.
      - Probehåndtering, FPing command-line oppførsel, SSH håndtering, zoommodus URLs, cropper relative-time oppføring, konfigurasjonsinnlastinger for slaver, maler, tapsfarger og graftitler ble forbedret.
      - Rettelser inkluderer å gjenopprette FindBin, legge til den manglende README og korrigere stavemåten i FTPtransfer.pm.
    zh_CN: |-
      - 2.8.2 是包含 automated build testing 和 InfluxDB support 的 rollup release。
      - 改进了 probe handling、FPing command-line behavior、SSH handling、zoom mode URLs、cropper relative-time entry、slaves/templates 的 config reloads、loss colors 和 graph titles。
      - 修复包括恢复 FindBin、添加缺失的 README，以及修正 FTPtransfer.pm 中的拼写。
    ja_JP: |-
      - 2.8.2 は automated build testing と InfluxDB support を含む rollup release です。
      - probe handling、FPing command-line behavior、SSH handling、zoom mode URLs、cropper relative-time entry、slaves/templates の config reloads、loss colors、graph titles が改善されました。
      - FindBin の復元、欠落していた README の追加、FTPtransfer.pm のスペル修正が含まれます。
    ko_KR: |-
      - 2.8.2는 automated build testing과 InfluxDB support를 포함한 rollup release입니다.
      - probe handling, FPing command-line behavior, SSH handling, zoom mode URLs, cropper relative-time entry, slaves/templates의 config reloads, loss colors, graph titles가 개선되었습니다.
      - FindBin 복원, 누락된 README 추가, FTPtransfer.pm의 철자 수정이 포함됩니다.
    fr_FR: |-
      - 2.8.2 est une rollup release avec automated build testing et InfluxDB support.
      - Probe handling, FPing command-line behavior, SSH handling, zoom mode URLs, cropper relative-time entry, config reloads pour slaves/templates, loss colors et graph titles ont ete ameliores.
      - Les correctifs incluent la restauration de FindBin, l'ajout du README manquant et la correction orthographique dans FTPtransfer.pm.
    de_DE: |-
      - 2.8.2 ist ein Rollup-Release mit automated build testing und InfluxDB support.
      - Verbessert wurden probe handling, FPing command-line behavior, SSH handling, zoom mode URLs, cropper relative-time entry, config reloads fuer slaves/templates, loss colors und graph titles.
      - Korrekturen umfassen das Wiederherstellen von FindBin, das Hinzufuegen der fehlenden README und Rechtschreibkorrekturen in FTPtransfer.pm.
    sv_SE: |-
      - 2.8.2 är en samlad version med automatiserad byggtestning och InfluxDB-stöd.
      - Sondhantering, FPing command-line beteende, SSH hantering, zoomläge URLs, cropper relative-time post, konfigurationsomladdningar för slavar, mallar, förlustfärger och graftitlar förbättrades.
      - Korrigeringar inkluderar att återställa FindBin, lägga till den saknade README och rätta stavningen i FTPtransfer.pm.
    el_GR: |-
      - Η 2.8.2 είναι μια αθροιστική κυκλοφορία με αυτοματοποιημένη δοκιμή κατασκευής και υποστήριξη InfluxDB.
      - Βελτιώθηκαν ο χειρισμός ανιχνευτή, η συμπεριφορά FPing command-line, ο χειρισμός SSH, η λειτουργία ζουμ URLs, η είσοδος κοπής relative-time, οι επαναφορτώσεις ρυθμίσεων για σκλάβους, τα πρότυπα, τα χρώματα απώλειας και οι τίτλοι γραφημάτων.
      - Οι διορθώσεις περιλαμβάνουν την επαναφορά FindBin, την προσθήκη του README που λείπει και τη διόρθωση της ορθογραφίας στο FTPtransfer.pm.
    hr_HR: |-
      - 2.8.2 je zbirno izdanje s automatiziranim testiranjem izrade i podrškom za InfluxDB.
      - Poboljšano je rukovanje sondom, ponašanje FPing command-line, rukovanje SSH, način zumiranja URLs, unos cropper relative-time, ponovno učitavanje konfiguracije za slave, predlošci, boje gubitka i naslovi grafikona.
      - Popravci uključuju vraćanje FindBin, dodavanje nedostajućeg README i ispravljanje pravopisa u FTPtransfer.pm.
    pt_PT: |-
      - 2.8.2 é uma versão rollup com testes de compilação automatizados e suporte para InfluxDB.
      - Manipulação de sonda, comportamento de FPing command-line, manipulação de SSH, modo de zoom URLs, entrada de recorte relative-time, recargas de configuração para escravos, modelos, cores de perda e títulos de gráficos foram melhorados.
      - As correções incluem restaurar FindBin, adicionar o README em falta e corrigir a ortografia em FTPtransfer.pm.
    ru_RU: |-
      - 2.8.2 — это накопительный выпуск с автоматическим тестированием сборки и поддержкой InfluxDB.
      - Улучшена обработка зонда, поведение FPing command-line, обработка SSH, режим масштабирования URLs, обрезка relative-time, перезагрузка конфигурации для ведомых устройств, шаблоны, цвета потерь и заголовки графиков.
      - Исправления включают восстановление FindBin, добавление отсутствующего README и исправление орфографии в FTPtransfer.pm.
    tr_TR: |-
      - 2.8.2, otomatik derleme testi ve InfluxDB desteği içeren bir toplama sürümüdür.
      - Prob işleme, FPing command-line davranışı, SSH işleme, yakınlaştırma modu URLs, kırpıcı relative-time girişi, yardımcı öğeler için yapılandırma yeniden yüklemeleri, şablonlar, kayıp renkler ve grafik başlıkları iyileştirildi.
      - Düzeltmeler arasında FindBin'nin geri yüklenmesi, eksik README'nin eklenmesi ve FTPtransfer.pm'daki yazımın düzeltilmesi yer alıyor.
