name: smokeping
services:
  smokeping:
    environment:
      PGID: "1000"
      PUID: "1000"
      TZ: Europe/London
    image: linuxserver/smokeping:2.9.0
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
      - target: 80
        published: "10280"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/smokeping/config
        target: /config
      - type: bind
        source: /DATA/AppData/smokeping/data
        target: /data
    x-casaos:
      envs:
        - container: PUID
          description:
            en_US: ""
        - container: PGID
          description:
            en_US: ""
        - container: TZ
          description:
            en_US: ""
      ports:
        - container: "80"
          description:
            en_US: ""

      volumes:
        - container: /config
          description:
            en_US: ""
        - container: /data
          description:
            en_US: ""
    container_name: smokeping
x-casaos:
  app_id: org.icewhale.smokeping
  architectures:
    - amd64
    - arm64
  main: smokeping
  author: CasaOS Team
