services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    networks:
      - hermes-net
    ports:
      - target: 8642
        published: "8642"
        protocol: tcp
    environment:
      TZ: $TZ
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: change-me-local-dev
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /opt/data
    logging:
      options:
        max-size: 10m
        max-file: "3"
    x-casaos:
      envs:
        - container: TZ
          description:
            de_DE: Zeitzone des Hermes-Agent-Gateway-Containers
            el_GR: Ζώνη ώρας που χρησιμοποιεί το κοντέινερ πύλης Hermes Agent
