name: hermes
services:
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: hermes
    deploy:
      resources:
        reservations:
          memory: 1G
    restart: unless-stopped
    command:
      - gateway
      - run
    ports:
      - target: 8642
        published: "8642"
        protocol: tcp
      - target: 9119
        published: "9119"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/
        target: /opt/data
    environment:
      HERMES_DASHBOARD: 1
      HERMES_DASHBOARD_INSECURE: 1
    x-casaos:
      ports:
        - container: "8642"
          description:
            en_US: Gateway API Port
            en_GB: Gateway API Port
            it_IT: Porta API del gateway
            nb_NO: Gateway API-port
            zh_CN: 网关 API 端口
            ja_JP: ゲートウェイ API ポート
            ko_KR: 게이트웨이 API 포트
            fr_FR: Port API de la passerelle
            de_DE: Gateway-API-Port
            sv_SE: Gateway API-port
            el_GR: Θύρα API πύλης
            hr_HR: API priključak pristupnika
            pt_PT: Porta da API do gateway
            ru_RU: Порт API шлюза
            tr_TR: Ağ geçidi API bağlantı noktası
        - container: "9119"
          description:
            en_US: Dashboard HTTP Port
            en_GB: Dashboard HTTP Port
            it_IT: Porta HTTP della dashboard
            nb_NO: Dashboard HTTP-port
            zh_CN: 仪表盘 HTTP 端口
            ja_JP: ダッシュボード HTTP ポート
            ko_KR: 대시보드 HTTP 포트
            fr_FR: Port HTTP du tableau de bord
            de_DE: Dashboard-HTTP-Port
            sv_SE: Dashboard HTTP-port
            el_GR: Θύρα HTTP πίνακα ελέγχου
            hr_HR: HTTP priključak nadzorne ploče
            pt_PT: Porta HTTP do painel
            ru_RU: HTTP-порт панели управления
            tr_TR: Panel HTTP bağlantı noktası
      volumes:
        - container: /opt/data
          description:
            en_US: Hermes User Data Directory
            en_GB: Hermes User Data Directory
            it_IT: Directory Dati Utente Hermes
            nb_NO: Hermes brukerdata-katalog
            zh_CN: Hermes 用户数据目录
            ja_JP: Hermes ユーザーデータディレクトリ
            ko_KR: Hermes 사용자 데이터 디렉터리
            fr_FR: Répertoire des données utilisateur Hermes
            de_DE: Hermes Benutzerdatenverzeichnis
            sv_SE: Hermes användardata-katalog
            el_GR: Κατάλογος δεδομένων χρήστη Hermes
            hr_HR: Hermes direktorij korisničkih podataka
            pt_PT: Diretório de dados do utilizador Hermes
            ru_RU: Каталог пользовательских данных Hermes
            tr_TR: Hermes kullanıcı veri dizini
      envs:
        - container: HERMES_DASHBOARD
          description:
            en_US: Enables the Hermes web dashboard
            en_GB: Enables the Hermes web dashboard
            it_IT: Abilita la dashboard web di Hermes
            nb_NO: Aktiverer Hermes-nettdashbordet
            zh_CN: 启用 Hermes Web 仪表盘
            ja_JP: Hermes の Web ダッシュボードを有効にします
            ko_KR: Hermes 웹 대시보드를 활성화합니다
            fr_FR: Active le tableau de bord web de Hermes
            de_DE: Aktiviert das Hermes-Web-Dashboard
            sv_SE: Aktiverar Hermes webbpanel
            el_GR: Ενεργοποιεί τον πίνακα ελέγχου web του Hermes
            hr_HR: Omogućuje Hermes web nadzornu ploču
            pt_PT: Ativa o painel web do Hermes
            ru_RU: Включает веб-панель Hermes
            tr_TR: Hermes web panelini etkinleştirir
        - container: HERMES_DASHBOARD_INSECURE
          description:
            en_US: Allows dashboard access from non-loopback hosts
            en_GB: Allows dashboard access from non-loopback hosts
            it_IT: Consente l'accesso alla dashboard da host non loopback
            nb_NO: Tillater dashbordtilgang fra ikke-loopback-verter
            zh_CN: 允许从非 loopback 主机访问仪表盘
            ja_JP: loopback 以外のホストからのダッシュボードアクセスを許可します
            ko_KR: non-loopback 호스트에서 대시보드에 접근할 수 있게 합니다
            fr_FR: Autorise l'acces au tableau de bord depuis des hotes non loopback
            de_DE: Erlaubt den Dashboard-Zugriff von Nicht-Loopback-Hosts
            sv_SE: Tillater dashboardatkomst fran vardar som inte ar loopback
            el_GR: Επιτρέπει πρόσβαση στο dashboard από hosts εκτός loopback
            hr_HR: Omogucuje pristup nadzornoj ploci s hostova koji nisu loopback
            pt_PT: Permite o acesso ao painel a partir de hosts nao loopback
            ru_RU: Разрешает доступ к панели управления с хостов, отличных от loopback
            tr_TR: Panel erisimine loopback disi ana makinelerden izin verir
