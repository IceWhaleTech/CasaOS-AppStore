    it_IT: |
      Hermes Agent è un agente AI auto-migliorante di Nous Research, progettato per essere un collaboratore continuativo più che un semplice chatbot occasionale.
      Il suo ciclo di apprendimento interno combina memoria persistente, richiamo tra sessioni e competenze riutilizzabili, così da mantenere il contesto e migliorare nel tempo i flussi di lavoro ricorrenti.
      Con un gateway unificato, ricchi set di strumenti e una dashboard accessibile dal browser, Hermes si adatta bene a ricerca, automazione, comunicazione multipiattaforma e lavoro operativo continuativo.

      **Funzionalità Principali:**
      - Ciclo di apprendimento integrato con memoria persistente, richiamo tra sessioni e competenze riutilizzabili
      - Un solo gateway per CLI, Telegram, Discord, Slack, WhatsApp, Signal e altre piattaforme
      - Flussi di lavoro guidati dagli strumenti con terminale, ricerca web, automazione del browser, modifica file e integrazione MCP
      - Automazione e coordinamento con cron, sottoagenti, dashboard web e API compatibile con OpenAI

      **Ulteriori Informazioni:**
      - [Sito Ufficiale di Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Documentazione di Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    nb_NO: |
      Hermes Agent er en selvforbedrende AI-agent fra Nous Research, laget for å være en langsiktig samarbeidspartner heller enn en engangs chatbot.
      Den innebygde læringssløyfen kombinerer vedvarende minne, søk på tvers av økter og gjenbrukbare ferdigheter, slik at den kan huske kontekst og forbedre tilbakevendende arbeidsflyter over tid.
      Med en samlet gateway, rike verktøysett og et nettleserbasert dashboard passer Hermes godt til forskning, automatisering, kommunikasjon på tvers av plattformer og løpende operativt arbeid.

      **Hovedfunksjoner:**
      - Innebygd læringssløyfe med vedvarende minne, øktsøk og gjenbrukbare ferdigheter
      - Én gateway for CLI, Telegram, Discord, Slack, WhatsApp, Signal og mer
      - Verktøydrevne arbeidsflyter med terminal, nettsøk, nettleserautomatisering, filredigering og MCP-integrasjon
      - Automatisering og koordinering med cron, underagenter, webdashboard og OpenAI-kompatibelt API

      **Lær Mer:**
      - [Hermes Agent Offisielle Nettside](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent-dokumentasjon](https://hermes-agent.nousresearch.com/docs/)
    zh_CN: |
      Hermes Agent 是 Nous Research 推出的自我改进 AI 代理，定位不是一次性聊天机器人，而是可以长期协作的智能助手。
      它内置学习闭环，把长期记忆、跨会话检索和可复用技能结合在一起，能够持续保留上下文，并不断改进重复出现的工作流。
      借助统一消息网关、丰富工具集和基于浏览器的仪表盘，Hermes 很适合研究整理、任务自动化、跨平台沟通以及持续性的运营工作。

      **主要功能：**
      - 内置学习闭环，结合长期记忆、会话检索与可复用技能
      - 单一网关连接 CLI、Telegram、Discord、Slack、WhatsApp、Signal 等多种平台
      - 可通过工具执行终端操作、网页搜索、浏览器自动化、文件编辑和 MCP 扩展集成
      - 支持定时任务、子代理协作、Web 仪表盘与 OpenAI 兼容 API 等自动化与协同能力

      **了解更多：**
      - [Hermes Agent 官网](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent 文档](https://hermes-agent.nousresearch.com/docs/)
    ja_JP: |
      Hermes AgentはNous Researchによる自己改善型AIエージェントで、単発のチャットボットではなく長期的な協業相手として設計されています。
      組み込みの学習ループにより、永続メモリ、セッションをまたぐ検索、再利用可能なスキルを組み合わせ、文脈を保ちながら反復的なワークフローを改善していきます。
      統合ゲートウェイ、豊富なツールセット、ブラウザベースのダッシュボードを備え、調査、自動化、複数プラットフォームでの連携、継続的な運用業務に適しています。

      **主な機能：**
      - 永続メモリ、セッション検索、再利用可能スキルを備えた学習ループ
      - CLI、Telegram、Discord、Slack、WhatsApp、Signal などをつなぐ単一ゲートウェイ
      - ターミナル操作、Web検索、ブラウザ自動化、ファイル編集、MCP連携によるツール駆動ワークフロー
      - cron、サブエージェント、Webダッシュボード、OpenAI互換APIによる自動化と調整

      **詳細情報：**
      - [Hermes Agent 公式サイト](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent ドキュメント](https://hermes-agent.nousresearch.com/docs/)
    ko_KR: |
      Hermes Agent는 Nous Research가 만든 자기개선형 AI 에이전트로, 일회성 챗봇이 아니라 오래 함께 일하는 협업 도우미를 지향합니다.
      내장된 학습 루프는 지속 메모리, 세션 간 검색, 재사용 가능한 스킬을 결합해 문맥을 기억하고 반복되는 워크플로를 시간이 지날수록 더 잘 처리하게 만듭니다.
      통합 게이트웨이, 풍부한 도구 세트, 브라우저 기반 대시보드를 바탕으로 리서치, 자동화, 다중 플랫폼 커뮤니케이션, 지속적인 운영 업무에 잘 맞습니다。

      **주요 기능:**
      - 지속 메모리, 세션 검색, 재사용 가능한 스킬을 결합한 내장 학습 루프
      - CLI, Telegram, Discord, Slack, WhatsApp, Signal 등을 연결하는 단일 게이트웨이
      - 터미널, 웹 검색, 브라우저 자동화, 파일 편집, MCP 연동을 포함한 도구 기반 작업
      - 크론 작업, 서브에이전트, 웹 대시보드, OpenAI 호환 API를 통한 자동화와 조정

      **더 알아보기:**
      - [Hermes Agent 공식 웹사이트](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent 문서](https://hermes-agent.nousresearch.com/docs/)
    fr_FR: |
      Hermes Agent est un agent IA auto-améliorant de Nous Research, conçu comme un collaborateur durable plutôt qu'un simple chatbot ponctuel.
      Sa boucle d'apprentissage intégrée combine mémoire persistante, recherche intersessions et compétences réutilisables afin de conserver le contexte et d'améliorer les flux de travail récurrents au fil du temps.
      Avec une passerelle unifiée, de riches jeux d'outils et un tableau de bord accessible depuis le navigateur, Hermes convient bien à la recherche, à l'automatisation, à la communication multiplateforme et aux opérations continues.

      **Fonctionnalités Principales :**
      - Boucle d'apprentissage intégrée avec mémoire persistante, recherche entre sessions et compétences réutilisables
      - Une seule passerelle pour le CLI, Telegram, Discord, Slack, WhatsApp, Signal et d'autres plateformes
      - Flux pilotés par outils avec terminal, recherche web, automatisation du navigateur, édition de fichiers et intégration MCP
      - Automatisation et coordination avec cron, sous-agents, tableau de bord web et API compatible OpenAI

      **En Savoir Plus :**
      - [Site Officiel Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Documentation Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    de_DE: |
      Hermes Agent ist ein selbstverbessernder KI-Agent von Nous Research, der als langfristiger Arbeitsbegleiter und nicht als einmaliger Chatbot gedacht ist.
      Seine integrierte Lernschleife verbindet dauerhaftes Gedächtnis, sitzungsübergreifende Suche und wiederverwendbare Fähigkeiten, damit Kontext erhalten bleibt und wiederkehrende Abläufe mit der Zeit besser werden.
      Mit einer einheitlichen Gateway-Schicht, umfangreichen Toolsets und einem browserbasierten Dashboard eignet sich Hermes für Recherche, Automatisierung, plattformübergreifende Kommunikation und laufende operative Arbeit.

      **Hauptfunktionen:**
      - Integrierte Lernschleife mit persistentem Gedächtnis, sitzungsübergreifender Suche und wiederverwendbaren Fähigkeiten
      - Ein Gateway für CLI, Telegram, Discord, Slack, WhatsApp, Signal und weitere Plattformen
      - Werkzeuggestützte Workflows mit Terminal, Websuche, Browserautomatisierung, Dateibearbeitung und MCP-Integration
      - Automatisierung und Koordination mit Cron, Subagenten, Web-Dashboard und OpenAI-kompatibler API

      **Mehr Erfahren:**
      - [Hermes Agent Offizielle Website](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent Dokumentation](https://hermes-agent.nousresearch.com/docs/)
    sv_SE: |
      Hermes Agent är en självförbättrande AI-agent från Nous Research, byggd för att vara en långsiktig samarbetspartner snarare än en engångschattbot.
      Den inbyggda lärloopen kombinerar beständigt minne, sökning mellan sessioner och återanvändbara färdigheter så att den kan minnas sammanhang och förbättra återkommande arbetsflöden över tid.
      Med en gemensam gateway, rika verktygsuppsättningar och en webbaserad panel passar Hermes för forskning, automatisering, kommunikation över flera plattformar och löpande operativt arbete.

      **Huvudfunktioner:**
      - Inbyggd lärloop med beständigt minne, sessionssökning och återanvändbara färdigheter
      - En gateway för CLI, Telegram, Discord, Slack, WhatsApp, Signal och fler plattformar
      - Verktygsdrivna arbetsflöden med terminal, webbsökning, webbläsarautomatisering, filredigering och MCP-integration
      - Automatisering och samordning med cron, underagenter, webbpanel och OpenAI-kompatibelt API

      **Lär Dig Mer:**
      - [Hermes Agent Officiella Webbplats](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent-dokumentation](https://hermes-agent.nousresearch.com/docs/)
    el_GR: |
      Το Hermes Agent είναι ένας αυτοβελτιούμενος πράκτορας AI της Nous Research, σχεδιασμένος ως μακροχρόνιος συνεργάτης και όχι ως ένα απλό εφάπαξ chatbot.
      Ο ενσωματωμένος βρόχος μάθησης συνδυάζει επίμονη μνήμη, αναζήτηση μεταξύ συνεδριών και επαναχρησιμοποιήσιμες δεξιότητες, ώστε να διατηρεί το πλαίσιο και να βελτιώνει επαναλαμβανόμενες ροές εργασίας με τον χρόνο.
      Με ενιαία πύλη, πλούσια σύνολα εργαλείων και πίνακα ελέγχου μέσω προγράμματος περιήγησης, το Hermes ταιριάζει σε έρευνα, αυτοματοποίηση, επικοινωνία σε πολλές πλατφόρμες και συνεχή επιχειρησιακή εργασία.

      **Κύριες Λειτουργίες:**
      - Ενσωματωμένος βρόχος μάθησης με επίμονη μνήμη, αναζήτηση συνεδριών και επαναχρησιμοποιήσιμες δεξιότητες
      - Μία πύλη για CLI, Telegram, Discord, Slack, WhatsApp, Signal και περισσότερες πλατφόρμες
      - Ροές εργασίας με εργαλεία όπως τερματικό, αναζήτηση ιστού, αυτοματοποίηση περιηγητή, επεξεργασία αρχείων και ενσωμάτωση MCP
      - Αυτοματισμός και συντονισμός με cron, υποπράκτορες, web dashboard και API συμβατό με OpenAI

      **Μάθετε Περισσότερα:**
      - [Επίσημος Ιστότοπος Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Τεκμηρίωση Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    hr_HR: |
      Hermes Agent je samopoboljšavajući AI agent tvrtke Nous Research, osmišljen kao dugoročni suradnik, a ne kao jednokratni chatbot.
      Njegova ugrađena petlja učenja spaja trajnu memoriju, pretraživanje između sesija i ponovno upotrebljive vještine kako bi zadržao kontekst i s vremenom unaprijedio ponavljajuće radne tokove.
      Uz objedinjeni pristupnik, bogate skupove alata i web nadzornu ploču, Hermes je prikladan za istraživanje, automatizaciju, višekanalnu komunikaciju i kontinuirani operativni rad.

      **Glavne Funkcije:**
      - Ugrađena petlja učenja s trajnom memorijom, pretraživanjem sesija i ponovno upotrebljivim vještinama
      - Jedan pristupnik za CLI, Telegram, Discord, Slack, WhatsApp, Signal i druge platforme
      - Radni tokovi vođeni alatima uz terminal, web pretragu, automatizaciju preglednika, uređivanje datoteka i MCP integraciju
      - Automatizacija i koordinacija uz cron, podagente, web nadzornu ploču i OpenAI-kompatibilni API

      **Saznajte Više:**
      - [Službena Web Stranica Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Dokumentacija Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    pt_PT: |
      Hermes Agent é um agente de IA autoaperfeiçoável da Nous Research, concebido para funcionar como colaborador de longo prazo e não apenas como um chatbot ocasional.
      O seu ciclo de aprendizagem integrado combina memória persistente, pesquisa entre sessões e competências reutilizáveis, permitindo-lhe manter contexto e melhorar fluxos de trabalho recorrentes ao longo do tempo.
      Com um gateway unificado, conjuntos de ferramentas ricos e um painel baseado no navegador, o Hermes adapta-se bem a investigação, automação, comunicação multiplataforma e trabalho operacional contínuo.

      **Principais Funcionalidades:**
      - Ciclo de aprendizagem integrado com memória persistente, pesquisa entre sessões e competências reutilizáveis
      - Um único gateway para CLI, Telegram, Discord, Slack, WhatsApp, Signal e outras plataformas
      - Fluxos de trabalho orientados por ferramentas com terminal, pesquisa web, automação do navegador, edição de ficheiros e integração MCP
      - Automação e coordenação com cron, subagentes, painel web e API compatível com OpenAI

      **Saiba Mais:**
      - [Site Oficial do Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Documentação do Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    ru_RU: |
      Hermes Agent — это самообучающийся ИИ-агент от Nous Research, созданный не как разовый чат-бот, а как долгосрочный помощник для совместной работы.
      Его встроенный цикл обучения объединяет постоянную память, поиск между сессиями и переиспользуемые навыки, чтобы сохранять контекст и со временем улучшать повторяющиеся рабочие процессы.
      Благодаря единому шлюзу, богатому набору инструментов и веб-панели Hermes хорошо подходит для исследований, автоматизации, коммуникации на разных платформах и длительной операционной работы.

      **Основные Функции:**
      - Встроенный цикл обучения с постоянной памятью, межсессионным поиском и переиспользуемыми навыками
      - Единый шлюз для CLI, Telegram, Discord, Slack, WhatsApp, Signal и других платформ
      - Инструментальные рабочие процессы с терминалом, веб-поиском, автоматизацией браузера, редактированием файлов и интеграцией MCP
      - Автоматизация и координация через cron, субагентов, веб-панель и OpenAI-совместимый API

      **Узнать Больше:**
      - [Официальный Сайт Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Документация Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    tr_TR: |
      Hermes Agent, Nous Research tarafından geliştirilen ve tek seferlik bir sohbet botundan ziyade uzun vadeli bir çalışma ortağı olarak tasarlanan kendini geliştiren bir yapay zeka aracısıdır.
      Yerleşik öğrenme döngüsü kalıcı hafıza, oturumlar arası arama ve yeniden kullanılabilir becerileri bir araya getirerek bağlamı korumasını ve tekrar eden iş akışlarını zamanla iyileştirmesini sağlar.
      Birleşik ağ geçidi, zengin araç setleri ve tarayıcı tabanlı paneli sayesinde Hermes; araştırma, otomasyon, çok platformlu iletişim ve süreklilik gerektiren operasyonel işler için uygundur.

      **Başlıca İşlevler:**
      - Kalıcı hafıza, oturumlar arası arama ve yeniden kullanılabilir becerilerle yerleşik öğrenme döngüsü
      - CLI, Telegram, Discord, Slack, WhatsApp, Signal ve daha fazlası için tek ağ geçidi
      - Terminal, web araması, tarayıcı otomasyonu, dosya düzenleme ve MCP entegrasyonu ile araç odaklı iş akışları
      - Cron, alt aracılar, web paneli ve OpenAI uyumlu API ile otomasyon ve koordinasyon

      **Daha Fazla Bilgi:**
      - [Hermes Agent Resmi Web Sitesi](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent Dokümantasyonu](https://hermes-agent.nousresearch.com/docs/)
