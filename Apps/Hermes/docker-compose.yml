  description:
    en_US: |
      Hermes Agent is a self-improving AI agent from Nous Research, designed to be a long-running collaborator rather than a one-off chatbot.
      Its built-in learning loop combines persistent memory, cross-session recall, and reusable skills so it can keep context and improve recurring workflows over time.
      With a unified gateway, rich toolsets, and a browser-based dashboard, Hermes fits research, automation, cross-platform communication, and ongoing operational work.

      **Main Features:**
      - Built-in learning loop with persistent memory, session search, and reusable skills
      - One gateway for CLI, Telegram, Discord, Slack, WhatsApp, Signal, and more
      - Tool-driven workflows with terminal access, web search, browser automation, file editing, and MCP integration
      - Automation and coordination with cron jobs, subagents, the web dashboard, and an OpenAI-compatible API

      **Learn More:**
