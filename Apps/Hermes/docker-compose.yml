    el_GR: |
      Το Hermes Agent είναι ένας αυτοβελτιούμενος πράκτορας AI της Nous Research, σχεδιασμένος ως μακροχρόνιος συνεργάτης και όχι ως ένα απλό εφάπαξ chatbot.
      Ο ενσωματωμένος βρόχος μάθησης συνδυάζει επίμονη μνήμη, αναζήτηση μεταξύ συνεδριών και επαναχρησιμοποιήσιμες δεξιότητες, ώστε να διατηρεί το πλαίσιο και να βελτιώνει επαναλαμβανόμενες ροές εργασίας με τον χρόνο.
      Με ενιαία πύλη, πλούσια σύνολα εργαλείων και πίνακα ελέγχου μέσω προγράμματος περιήγησης, το Hermes ταιριάζει σε έρευνα, αυτοματοποίηση, επικοινωνία σε πολλές πλατφόρμες και συνεχή επιχειρησιακή εργασία.

      **Κύριες Λειτουργίες:**
      - Ενσωματωμένος βρόχος μάθησης με επίμονη μνήμη, αναζήτηση συνεδριών και επαναχρησιμοποιήσιμες δεξιότητες
      - Μία πύλη για CLI, Telegram, Discord, Slack, WhatsApp, Signal και περισσότερες πλατφόρμες
      - Ροές εργασίας με εργαλεία όπως τερματικό, αναζήτηση ιστού, αυτοματοποίηση περιηγητή, επεξεργασία αρχείων και ενσωμάτωση MCP
      - Αυτοματισμός και συντονισμός με cron, υποπράκτορες, web dashboard και API συμβατό με OpenAI

      **Μάθετε Περισσότερα:**
      - [Επίσημος Ιστότοπος Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Τεκμηρίωση Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    hr_HR: |
      Hermes Agent je samopoboljšavajući AI agent tvrtke Nous Research, osmišljen kao dugoročni suradnik, a ne kao jednokratni chatbot.
      Njegova ugrađena petlja učenja spaja trajnu memoriju, pretraživanje između sesija i ponovno upotrebljive vještine kako bi zadržao kontekst i s vremenom unaprijedio ponavljajuće radne tokove.
      Uz objedinjeni pristupnik, bogate skupove alata i web nadzornu ploču, Hermes je prikladan za istraživanje, automatizaciju, višekanalnu komunikaciju i kontinuirani operativni rad.

      **Glavne Funkcije:**
      - Ugrađena petlja učenja s trajnom memorijom, pretraživanjem sesija i ponovno upotrebljivim vještinama
      - Jedan pristupnik za CLI, Telegram, Discord, Slack, WhatsApp, Signal i druge platforme
      - Radni tokovi vođeni alatima uz terminal, web pretragu, automatizaciju preglednika, uređivanje datoteka i MCP integraciju
      - Automatizacija i koordinacija uz cron, podagente, web nadzornu ploču i OpenAI-kompatibilni API

      **Saznajte Više:**
      - [Službena Web Stranica Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Dokumentacija Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    pt_PT: |
      Hermes Agent é um agente de IA autoaperfeiçoável da Nous Research, concebido para funcionar como colaborador de longo prazo e não apenas como um chatbot ocasional.
      O seu ciclo de aprendizagem integrado combina memória persistente, pesquisa entre sessões e competências reutilizáveis, permitindo-lhe manter contexto e melhorar fluxos de trabalho recorrentes ao longo do tempo.
      Com um gateway unificado, conjuntos de ferramentas ricos e um painel baseado no navegador, o Hermes adapta-se bem a investigação, automação, comunicação multiplataforma e trabalho operacional contínuo.

      **Principais Funcionalidades:**
      - Ciclo de aprendizagem integrado com memória persistente, pesquisa entre sessões e competências reutilizáveis
      - Um único gateway para CLI, Telegram, Discord, Slack, WhatsApp, Signal e outras plataformas
      - Fluxos de trabalho orientados por ferramentas com terminal, pesquisa web, automação do navegador, edição de ficheiros e integração MCP
      - Automação e coordenação com cron, subagentes, painel web e API compatível com OpenAI

      **Saiba Mais:**
      - [Site Oficial do Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Documentação do Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    ru_RU: |
      Hermes Agent — это самообучающийся ИИ-агент от Nous Research, созданный не как разовый чат-бот, а как долгосрочный помощник для совместной работы.
      Его встроенный цикл обучения объединяет постоянную память, поиск между сессиями и переиспользуемые навыки, чтобы сохранять контекст и со временем улучшать повторяющиеся рабочие процессы.
      Благодаря единому шлюзу, богатому набору инструментов и веб-панели Hermes хорошо подходит для исследований, автоматизации, коммуникации на разных платформах и длительной операционной работы.

      **Основные Функции:**
      - Встроенный цикл обучения с постоянной памятью, межсессионным поиском и переиспользуемыми навыками
      - Единый шлюз для CLI, Telegram, Discord, Slack, WhatsApp, Signal и других платформ
      - Инструментальные рабочие процессы с терминалом, веб-поиском, автоматизацией браузера, редактированием файлов и интеграцией MCP
      - Автоматизация и координация через cron, субагентов, веб-панель и OpenAI-совместимый API

      **Узнать Больше:**
      - [Официальный Сайт Hermes Agent](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Документация Hermes Agent](https://hermes-agent.nousresearch.com/docs/)
    tr_TR: |
      Hermes Agent, Nous Research tarafından geliştirilen ve tek seferlik bir sohbet botundan ziyade uzun vadeli bir çalışma ortağı olarak tasarlanan kendini geliştiren bir yapay zeka aracısıdır.
      Yerleşik öğrenme döngüsü kalıcı hafıza, oturumlar arası arama ve yeniden kullanılabilir becerileri bir araya getirerek bağlamı korumasını ve tekrar eden iş akışlarını zamanla iyileştirmesini sağlar.
      Birleşik ağ geçidi, zengin araç setleri ve tarayıcı tabanlı paneli sayesinde Hermes; araştırma, otomasyon, çok platformlu iletişim ve süreklilik gerektiren operasyonel işler için uygundur.

      **Başlıca İşlevler:**
      - Kalıcı hafıza, oturumlar arası arama ve yeniden kullanılabilir becerilerle yerleşik öğrenme döngüsü
      - CLI, Telegram, Discord, Slack, WhatsApp, Signal ve daha fazlası için tek ağ geçidi
      - Terminal, web araması, tarayıcı otomasyonu, dosya düzenleme ve MCP entegrasyonu ile araç odaklı iş akışları
      - Cron, alt aracılar, web paneli ve OpenAI uyumlu API ile otomasyon ve koordinasyon

      **Daha Fazla Bilgi:**
      - [Hermes Agent Resmi Web Sitesi](https://hermes-agent.nousresearch.com/)
      - [Hermes Agent GitHub](https://github.com/NousResearch/hermes-agent)
      - [Hermes Agent Dokümantasyonu](https://hermes-agent.nousresearch.com/docs/)
