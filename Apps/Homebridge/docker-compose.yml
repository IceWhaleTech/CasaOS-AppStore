        - Corregge handleUpdatePlatformAccessories() e consente di impostare Characteristic.SerialNumber tramite config.json.
        - La versione include aggiornamenti minori delle dipendenze e utilizza hap-nodejs v0.12.3.
      nb_NO: |-
