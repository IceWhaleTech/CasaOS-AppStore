            en_US: Minecraft listening Port (TCP)
            zh_CN: Minecraft监听端口 (TCP)
          protocol: tcp

        - container: "25570"
          description:
            en_US: Minecraft listening Port (TCP)
            zh_CN: Minecraft监听端口 (TCP)
          protocol: tcp

        - container: "25565"
          description:
            en_US: Minecraft listening Port (UDP)
            zh_CN: Minecraft监听端口 (UDP)
          protocol: udp

        - container: "25566"
