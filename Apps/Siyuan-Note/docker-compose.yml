      - Forbedringer inkluderer Mermaid-feillogger, F13-F32-snarveier, database-relation-field-atferd, mobilmenyforbedringer og kolonner for databasetabellvisning.
      - Rettelser dekker Azure OpenAI-oppsett, innebygd markdown-redigering, databasedatoeksport, plain-text-lim og user-guide-fanelukking.
    zh_CN: |-
      - v3.0.1 增加了 flashcard set review mode。
      - 增强项包括 Mermaid error logs、F13-F32 shortcuts、database relation-field behavior、mobile menu 改进和 database table view template columns。
      - 修复包括 Azure OpenAI setup、inline markdown editing、database date export、plain-text paste 和 user-guide tab closing。
    ja_JP: |-
