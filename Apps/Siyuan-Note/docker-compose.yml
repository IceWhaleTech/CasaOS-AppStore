      - Les ameliorations incluent Mermaid error logs, F13-F32 shortcuts, database relation-field behavior, des ameliorations mobile menu et database table view template columns.
      - Les correctifs couvrent Azure OpenAI setup, inline markdown editing, database date export, plain-text paste et user-guide tab closing.
    de_DE: |-
      - v3.0.1 fuegt flashcard set review mode hinzu.
      - Verbesserungen umfassen Mermaid error logs, F13-F32 shortcuts, database relation-field behavior, mobile menu-Verbesserungen und database table view template columns.
      - Korrekturen betreffen Azure OpenAI setup, inline markdown editing, database date export, plain-text paste und user-guide tab closing.
    sv_SE: |-
      - v3.0.1 lägger till granskningsläge för flashkortuppsättning.
      - Förbättringar inkluderar Mermaid-felloggar, F13-F32-genvägar, databas relation-field-beteende, förbättringar av mobilmeny och kolumner för databastabellvymallar.
      - Korrigeringar täcker Azure OpenAI konfiguration, inline markdown redigering, databas export datum, plain-text klistra in och user-guide flikstängning.
    el_GR: |-
      - Το v3.0.1 προσθέτει τη λειτουργία ελέγχου συνόλου καρτών flash.
      - Οι βελτιώσεις περιλαμβάνουν αρχεία καταγραφής σφαλμάτων Mermaid, συντομεύσεις F13-F32, συμπεριφορά βάσης δεδομένων relation-field, βελτιώσεις μενού για κινητά και στήλες προτύπων προβολής πίνακα βάσης δεδομένων.
      - Διορθώσεις καλύπτουν τη ρύθμιση Azure OpenAI, την ενσωματωμένη επεξεργασία σήμανσης, την εξαγωγή ημερομηνίας βάσης δεδομένων, την επικόλληση plain-text και το κλείσιμο της καρτέλας user-guide.
    hr_HR: |-
      - v3.0.1 dodaje način pregleda skupa kartica.
      - Poboljšanja uključuju zapisnike grešaka Mermaid, prečace F13-F32, ponašanje baze podataka relation-field, poboljšanja mobilnog izbornika i stupce predloška prikaza tablice baze podataka.
      - Popravci pokrivaju postavljanje Azure OpenAI, ugrađeno uređivanje oznaka, izvoz datuma baze podataka, lijepljenje plain-text i zatvaranje kartice user-guide.
    pt_PT: |-
      - v3.0.1 adiciona o modo de revisão do conjunto de flashcards.
      - As melhorias incluem registos de erros do Mermaid, atalhos F13-F32, comportamento da base de dados relation-field, melhorias no menu móvel e colunas do modelo de visualização da tabela da base de dados.
      - As correções abrangem a configuração do Azure OpenAI, a edição de redução em linha, a exportação de data da base de dados, a colagem de plain-text e o fecho de separador user-guide.
    ru_RU: |-
      - v3.0.1 добавляет режим просмотра набора карточек.
      - Улучшения включают журналы ошибок Mermaid, ярлыки F13-F32, поведение базы данных relation-field, улучшения мобильного меню и столбцы шаблона представления таблицы базы данных.
      - Исправления касаются настройки Azure OpenAI, встроенного редактирования уценки, экспорта даты базы данных, вставки plain-text и закрытия вкладки user-guide.
    tr_TR: |-
