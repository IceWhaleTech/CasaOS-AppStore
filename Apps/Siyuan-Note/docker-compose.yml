  releaseNotes:
    en_US: |-
      - v3.0.1 adds flashcard set review mode.
      - Enhancements include Mermaid error logs, F13-F32 shortcuts, database relation-field behavior, mobile menu improvements, and database table view template columns.
      - Fixes cover Azure OpenAI setup, inline markdown editing, database date export, plain-text paste, and user-guide tab closing.
    en_GB: |-
      - v3.0.1 adds flashcard set review mode.
      - Enhancements include Mermaid error logs, F13-F32 shortcuts, database relation-field behavior, mobile menu improvements, and database table view template columns.
      - Fixes cover Azure OpenAI setup, inline markdown editing, database date export, plain-text paste, and user-guide tab closing.
    it_IT: |-
      - v3.0.1 aggiunge la modalità di revisione del set di flashcard.
      - I miglioramenti includono registri degli errori della sirena, scorciatoie F13-F32, comportamento del database relation-field, miglioramenti del menu mobile e colonne del modello di visualizzazione della tabella del database.
      - Le correzioni riguardano l'installazione di OpenAI di Azure, la modifica del markdown in linea, l'esportazione della data del database, l'incollamento di plain-text e la chiusura della scheda user-guide.
    nb_NO: |-
