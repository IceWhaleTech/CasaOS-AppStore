    ru_RU: |-
      - v6.17.0 добавляет поддержку ClouDNS.
      - Исправлена ​​обработка обратного вызова, поэтому учитывается включение протокола и используется правильный клиент HTTP.
    tr_TR: |-
      - v6.17.0, ClouDNS desteğini ekler.
