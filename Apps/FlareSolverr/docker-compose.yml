name: flaresolverr
services:
  flaresolverr:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: "002"
      LOG_LEVEL: "info"
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"
    cpu_shares: 50
    command: []
    container_name: flaresolverr
    deploy:
      resources:
        reservations:
          memory: 64M
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.5
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/icon.png
    ports:
      - target: 8191
        published: "8191"
        protocol: tcp
    restart: unless-stopped
    network_mode: bridge
    privileged: false
x-casaos:
  architectures:                  # a list of architectures that the app supports
      - amd64
      - arm
      - arm64
  author: calganaygun
  category: Network
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/screenshot-1.png
  index: /
  port_map: "8191"
  scheme: http
  store_app_id: flaresolverr
  title:
    en_us: FlareSolverr
  version: "v3.4.5"
  updateAt: "2025-11-11"
  releaseNotes:
    en_US: |-
      - v3.4.5 reverts the runtime to Python v3.13 and bumps FlareSolverr to 3.4.5.
      - Dockerfile casing and changelog generation were fixed.
    zh_CN: |-
      - v3.4.5 将运行时回退到 Python v3.13，并将 FlareSolverr 提升到 3.4.5。
      - 修复了 Dockerfile 大小写和 changelog 生成问题。
    de_DE: |-
      - v3.4.5 setzt die Laufzeit auf Python v3.13 zurück und erhöht FlareSolverr auf 3.4.5.
      - Dockerfile-Großschreibung und Changelog-Erzeugung wurden korrigiert.
    fr_FR: |-
      - v3.4.5 revient à l'environnement d'exécution Python v3.13 et met FlareSolverr à 3.4.5.
      - La casse du Dockerfile et la génération du changelog ont été corrigées.
    ja_JP: |-
      - v3.4.5 はランタイムを Python v3.13 に戻し、FlareSolverr を 3.4.5 に更新します。
      - Dockerfile の大文字小文字と changelog 生成が修正されました。
    ko_KR: |-
      - v3.4.5는 런타임을 Python v3.13으로 되돌리고 FlareSolverr를 3.4.5로 올립니다.
      - Dockerfile 대소문자와 changelog 생성이 수정되었습니다.
  website: ""
  repo: "https://github.com/FlareSolverr/FlareSolverr"
  support: "https://github.com/FlareSolverr/FlareSolverr/issues"
  docs: "https://github.com/FlareSolverr/FlareSolverr#readme"
