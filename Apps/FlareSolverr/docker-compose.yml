name: flaresolverr
services:
  flaresolverr:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: "002"
      LOG_LEVEL: "info"
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"
    cpu_shares: 50
    command: []
    container_name: flaresolverr
    deploy:
      resources:
        reservations:
          memory: 64M
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.5
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/icon.png
    ports:
      - target: 8191
        published: "8191"
        protocol: tcp
    restart: unless-stopped
    network_mode: bridge
    privileged: false
    x-casaos:
      ports:
        - container: "8191"
          description:
            en_US: Container port 8191
            zh_CN: 容器端口 8191
      envs:
        - container: "CAPTCHA_SOLVER"
          description:
            en_US: Environment variable CAPTCHA_SOLVER
            zh_CN: 环境变量 CAPTCHA_SOLVER
        - container: "LOG_HTML"
          description:
            en_US: Environment variable LOG_HTML
            zh_CN: 环境变量 LOG_HTML
        - container: "LOG_LEVEL"
          description:
            en_US: Environment variable LOG_LEVEL
            zh_CN: 环境变量 LOG_LEVEL
        - container: "PGID"
          description:
            en_US: Environment variable PGID
            zh_CN: 环境变量 PGID
        - container: "PUID"
          description:
            en_US: Environment variable PUID
            zh_CN: 环境变量 PUID
        - container: "TZ"
          description:
            en_US: Environment variable TZ
            zh_CN: 环境变量 TZ
        - container: "UMASK"
          description:
            en_US: Environment variable UMASK
            zh_CN: 环境变量 UMASK
x-casaos:
  architectures:                  # a list of architectures that the app supports
      - amd64
      - arm
      - arm64
  main: flaresolverr
  author: calganaygun
  category: Network
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlareSolverr/screenshot-1.png
  index: /
  port_map: "8191"
  scheme: http
  store_app_id: flaresolverr
  title:
    en_us: FlareSolverr
  version: "v3.4.5"
  updateAt: "2025-11-11"
  releaseNotes:
    en_US: |-
      - v3.4.5 reverts the runtime to Python v3.13 and bumps FlareSolverr to 3.4.5.
      - Dockerfile casing and changelog generation were fixed.
  website: ""
  repo: "https://github.com/FlareSolverr/FlareSolverr"
  support: "https://github.com/FlareSolverr/FlareSolverr/issues"
  docs: "https://github.com/FlareSolverr/FlareSolverr#readme"
