name: anaconda3
services:
  anaconda3:
    container_name: anaconda3
    image: continuumio/anaconda3:2024.10-1
    network_mode: bridge
    restart: unless-stopped
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PATH=/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - target: 8888
        published: "8888"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/notebooks
        target: /opt/notebooks
    command:
      - /bin/bash
      - -c
      - conda install -c conda-forge jupyterlab -y --quiet && jupyter lab
        --notebook-dir=/opt/notebooks --ip='*' --port=8888 --no-browser
        --allow-root
    labels:
      icon: https://cdn.jsdelivr.net/gh/LisonEvf/CasaOS-AppStore@main/Apps/Anaconda3/icon.png
    x-casaos:
      envs:
        - container: PATH
          description:
            en_us: ""
        - container: LANG
          description:
            en_us: ""
        - container: LC_ALL
          description:
            en_us: ""
      ports:
        - container: "8888"
          description:
            en_us: JupyterLab
      volumes:
        - container: /opt/notebooks
          description:
            en_us: Jupyter notebook directory
            zh_cn: Jupyter 笔记目录
x-casaos:
  main: anaconda3
