name: rdtclient
services:
  rdtclient:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: "002"
    cpu_shares: 50
    command: []
    container_name: rdtclient
    deploy:
      resources:
        reservations:
          memory: 64M
    image: rogerfar/rdtclient:2
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RDTClient/icon.png
    ports:
      - target: 6500
        published: "6500"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/Downloads
        target: /data/downloads
      - type: bind
        source: /DATA/AppData/$AppID/db
        target: /data/db
    network_mode: bridge
    privileged: false
    x-casaos:
      ports:
        - container: "6500"
          description:
            en_US: Container port 6500
            zh_CN: 容器端口 6500
      volumes:
        - container: "/data/db"
          description:
            en_US: Container path /data/db
            zh_CN: 容器路径 /data/db
        - container: "/data/downloads"
          description:
            en_US: Container path /data/downloads
            zh_CN: 容器路径 /data/downloads
      envs:
        - container: "PGID"
          description:
            en_US: Environment variable PGID
            zh_CN: 环境变量 PGID
        - container: "PUID"
          description:
            en_US: Environment variable PUID
            zh_CN: 环境变量 PUID
        - container: "TZ"
          description:
            en_US: Environment variable TZ
            zh_CN: 环境变量 TZ
        - container: "UMASK"
          description:
            en_US: Environment variable UMASK
            zh_CN: 环境变量 UMASK
x-casaos:
  architectures:                  # a list of architectures that the app supports
      - amd64
      - arm
      - arm64
  main: rdtclient
  author: calganaygun
  category: Downloader
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RDTClient/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RDTClient/screenshot-1.png
  index: /
  port_map: "6500"
  scheme: http
  store_app_id: rdtclient
  title:
    en_us: Real-Debrid Torrent Client
  version: "2"
  updateAt: "2024-06-11"
  releaseNotes:
    en_US: |-
      RDTClient 2 is the Docker image tag used by this app; no separate formal release notes were identified for this tag.
  website: ""
  repo: "https://github.com/rogerfar/rdt-client"
  support: "https://github.com/rogerfar/rdt-client/issues"
  docs: "https://github.com/rogerfar/rdt-client/wiki"
