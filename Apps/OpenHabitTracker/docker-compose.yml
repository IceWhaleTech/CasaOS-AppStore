name: openhabittracker
services:
  openhabittracker:
    image: jinjinov/openhabittracker:1.2.3
    container_name: openhabittracker
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: unless-stopped
    ports:
      - target: 8080
        published: "8425"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/.OpenHabitTracker
    environment:
      TZ: $TZ
      AppSettings__UserName: admin
      AppSettings__Email: admin@example.com
      AppSettings__Password: "change_this_password"
      AppSettings__JwtSecret: "change_this_to_a_long_random_string"
    x-casaos:
      ports:
        - container: "8080"
          description:
            en_US: WebUI HTTP Port
      volumes:
        - container: /app/.OpenHabitTracker
          description:
            en_US: OpenHabitTracker Data Directory (SQLite database)
      envs:
        - container: TZ
          description:
            en_US: Timezone - sets the day boundary for habit tracking
        - container: AppSettings__UserName
          description:
            en_US: Login username for the single user
        - container: AppSettings__Email
          description:
            en_US: Login email for the single user
        - container: AppSettings__Password
          description:
            en_US: Login password for the single user - change it before installing
        - container: AppSettings__JwtSecret
          description:
            en_US: Secret used to sign login tokens - use a long random string
