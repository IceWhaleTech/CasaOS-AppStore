  description:
    en_US: |
      OpenHabitTracker is a free, ad-free, open source app for Markdown notes, tasks and habits - no account, no telemetry.
      This container is the self-hosted sync server: native OpenHabitTracker apps for Windows, Linux, Android, iOS and macOS log into it and keep all devices in sync, with all data on your server.
      Habits work without streak guilt: instead of a streak that resets to zero, each habit shows how overdue it is compared to your desired interval. Streaks exist as opt-in extra information, off by default.

      **Main Features:**
      - Markdown notes with categories, priorities and colors
      - Tasks with checklists and time tracking
      - Habits with flexible intervals, statistics and calendar backfill
      - Advanced search, filter and sort
      - Import your notes from Google Keep
      - Data export and import: JSON, YAML, TSV, Markdown
      - REST API with OpenAPI UI at /scalar/v1
      - 26 themes with dark and light modes, localized to 20 languages

      **Learn More:**
      - [OpenHabitTracker Website](https://openhabittracker.net)
      - [OpenHabitTracker GitHub](https://github.com/Jinjinov/OpenHabitTracker)
