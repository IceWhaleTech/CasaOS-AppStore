      - Sistem RAM: > 40 GB
      - CUDA uyumlu NVIDIA sürücüleri

      **Daha fazla bilgi:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    zh_CN: |
      TurboDiffusion是基于潜在一致性模型（LCM）的加速文本到视频生成框架。它使用各种TurboWan2模型，能够从文本描述快速生成高质量视频。该框架支持图像和视频生成，并为不同的GPU配置提供优化的检查点。

      **主要功能：**
      - 极速视频和图像生成
      - 直观的Gradio WebUI
      - 针对不同GPU配置优化
      - 量化和非量化检查点
      - 灵活的模型配置

      **硬件要求：**
      - 推荐 RTX 3090 及以上GPU
      - 显存 > 30GB
      - 内存 > 40GB
      - CUDA兼容的NVIDIA驱动

      **了解更多：**
