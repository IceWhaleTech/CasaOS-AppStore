  tagline:
    de_DE: Ein Beschleunigungsframework für die End-to-End-Diffusionsgenerierung bei gleichbleibender Videoqualität
    el_GR: Πλαίσιο επιτάχυνσης για ενιαία (end-to-end) παραγωγή διάχυσης με διατήρηση της ποιότητας βίντεο
    en_GB: An accelerated video generation framework that speeds up end-to-end diffusion while preserving video quality
    en_US: An accelerated video generation framework that speeds up end-to-end diffusion while preserving video quality
    fr_FR: Un framework d’accélération pour la génération par diffusion de bout en bout tout en préservant la qualité vidéo
    hr_HR: Akceleracijski okvir za end-to-end difuzijsko generiranje uz očuvanje kvalitete videa
    it_IT: Un framework di accelerazione per la generazione end-to-end tramite diffusione mantenendo la qualità video
    ja_JP: 動画品質を維持しながらエンドツーエンドの拡散生成を高速化する動画生成フレームワーク
    ko_KR: 비디오 품질을 유지하면서 엔드투엔드 확산 생성을 가속하는 비디오 생성 프레임워크
    nb_NO: Et akselerasjonsrammeverk for ende-til-ende diffusjonsgenerering med bevart videokvalitet
    pt_PT: Um framework de aceleração para geração por difusão de ponta a ponta mantendo a qualidade de vídeo
    ru_RU: Ускоряющий фреймворк для сквозной диффузионной генерации с сохранением качества видео
    sv_SE: Ett accelerationsramverk för end-to-end-diffusionsgenerering med bibehållen videokvalitet
    tr_TR: Video kalitesini koruyarak uçtan uca difüzyon üretimini hızlandıran bir video üretim çerçevesi
    zh_CN: 一种能够加速端到端扩散生成并保持视频质量的视频生成加速框架
  description:
    de_DE: |
      TurboDiffusion ist ein beschleunigtes Framework zur Text-zu-Video-Generierung auf Basis des Latent Consistency Model (LCM). Es nutzt verschiedene TurboWan2-Modelle, um aus Textbeschreibungen schnell hochwertige Videos zu erzeugen. Das Framework unterstützt sowohl die Bild- als auch die Videogenerierung und bietet optimierte Checkpoints für unterschiedliche GPU-Konfigurationen.

      **Hauptfunktionen:**
      - Extrem schnelle Video- und Bildgenerierung
      - Intuitive Gradio WebUI
      - Optimiert für unterschiedliche GPU-Konfigurationen
      - Quantisierte und nicht quantisierte Checkpoints
      - Flexible Modellkonfiguration

      **Hardware-Anforderungen:**
      - Empfohlen: RTX 3090 oder höher
      - GPU-VRAM: > 30 GB
      - System-RAM: > 40 GB
      - CUDA-kompatible NVIDIA-Treiber

      **Mehr erfahren:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    el_GR: |
      Το TurboDiffusion είναι ένα επιταχυνόμενο πλαίσιο παραγωγής κειμένου-σε-βίντεο βασισμένο στο Latent Consistency Model (LCM). Χρησιμοποιεί διάφορα μοντέλα TurboWan2 για τη γρήγορη δημιουργία βίντεο υψηλής ποιότητας από περιγραφές κειμένου. Το πλαίσιο υποστηρίζει παραγωγή εικόνων και βίντεο και παρέχει βελτιστοποιημένα checkpoints για διαφορετικές διαμορφώσεις GPU.

      **Κύρια χαρακτηριστικά:**
      - Εξαιρετικά γρήγορη παραγωγή βίντεο και εικόνων
      - Διαισθητικό Gradio WebUI
      - Βελτιστοποιημένο για διαφορετικές διαμορφώσεις GPU
      - Ποσοτικοποιημένα και μη ποσοτικοποιημένα checkpoints
      - Ευέλικτη διαμόρφωση μοντέλων

      **Απαιτήσεις υλικού:**
      - Συνιστάται: RTX 3090 ή νεότερη
      - VRAM GPU: > 30 GB
      - RAM συστήματος: > 40 GB
      - Οδηγοί NVIDIA συμβατοί με CUDA

      **Μάθετε περισσότερα:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    en_GB: |
      TurboDiffusion is an accelerated text-to-video generation framework based on the Latent Consistency Model (LCM). It leverages various TurboWan2 models to rapidly generate high-quality videos from text descriptions. The framework supports both image and video generation and provides optimised checkpoints for different GPU configurations.

      **Key Features:**
      - Ultra-fast video and image generation
      - Intuitive Gradio WebUI
      - Optimised for different GPU configurations
      - Quantised and unquantised checkpoints
      - Flexible model configuration

      **Hardware Requirements:**
      - Recommended: RTX 3090 or above
      - GPU VRAM: > 30 GB
      - System RAM: > 40 GB
      - CUDA-compatible NVIDIA drivers

      **Learn More:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    en_US: |
      TurboDiffusion is an accelerated text-to-video generation framework based on the Latent Consistency Model (LCM). It leverages various TurboWan2 models to rapidly generate high-quality videos from text descriptions. The framework supports both image and video generation and provides optimized checkpoints for different GPU configurations.

      **Key Features:**
      - Ultra-fast video and image generation
      - Intuitive Gradio WebUI
      - Optimized for different GPU configurations
      - Quantized and unquantized checkpoints
      - Flexible model configuration

      **Hardware Requirements:**
      - Recommended: RTX 3090 or above
      - GPU VRAM: > 30 GB
      - System RAM: > 40 GB
      - CUDA-compatible NVIDIA drivers

      **Learn More:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    fr_FR: |
      TurboDiffusion est un framework accéléré de génération texte-à-vidéo basé sur le Latent Consistency Model (LCM). Il utilise divers modèles TurboWan2 pour générer rapidement des vidéos de haute qualité à partir de descriptions textuelles. Le framework prend en charge la génération d’images et de vidéos et fournit des checkpoints optimisés pour différentes configurations GPU.

      **Fonctionnalités principales :**
      - Génération ultra-rapide de vidéos et d’images
      - Gradio WebUI intuitive
      - Optimisé pour différentes configurations GPU
      - Checkpoints quantifiés et non quantifiés
      - Configuration flexible des modèles

      **Configuration matérielle requise :**
      - Recommandé : RTX 3090 ou supérieure
      - VRAM GPU : > 30 Go
      - RAM système : > 40 Go
      - Pilotes NVIDIA compatibles CUDA

      **En savoir plus :**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    hr_HR: |
      TurboDiffusion je ubrzani okvir za generiranje teksta-u-video temeljen na Latent Consistency Modelu (LCM). Koristi različite TurboWan2 modele za brzo generiranje visokokvalitetnih videozapisa iz tekstualnih opisa. Okvir podržava generiranje slika i videozapisa te pruža optimizirane checkpointove za različite GPU konfiguracije.

      **Glavne značajke:**
      - Ultra brzo generiranje videozapisa i slika
      - Intuitivni Gradio WebUI
      - Optimizirano za različite GPU konfiguracije
      - Kvantizirani i nekvantizirani checkpointovi
      - Fleksibilna konfiguracija modela

      **Hardverski zahtjevi:**
      - Preporučeno: RTX 3090 ili noviji
      - VRAM GPU-a: > 30 GB
      - Sistemски RAM: > 40 GB
      - CUDA-kompatibilni NVIDIA upravljački programi

      **Saznajte više:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    it_IT: |
      TurboDiffusion è un framework accelerato per la generazione testo-video basato sul Latent Consistency Model (LCM). Utilizza vari modelli TurboWan2 per generare rapidamente video di alta qualità a partire da descrizioni testuali. Il framework supporta la generazione di immagini e video e fornisce checkpoint ottimizzati per diverse configurazioni GPU.

      **Funzionalità principali:**
      - Generazione ultra-rapida di video e immagini
      - Gradio WebUI intuitiva
      - Ottimizzato per diverse configurazioni GPU
      - Checkpoint quantizzati e non quantizzati
      - Configurazione modello flessibile

      **Requisiti hardware:**
      - Consigliato: RTX 3090 o superiore
      - VRAM GPU: > 30 GB
      - RAM di sistema: > 40 GB
      - Driver NVIDIA compatibili con CUDA

      **Scopri di più:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    ja_JP: |
      TurboDiffusionは、Latent Consistency Model（LCM）に基づく加速テキスト動画生成フレームワークです。さまざまなTurboWan2モデルを使用し、テキスト記述から高品質な動画を高速に生成します。本フレームワークは画像および動画生成をサポートし、異なるGPU構成向けに最適化されたチェックポイントを提供します。

      **主な機能：**
      - 超高速な動画・画像生成
      - 直感的なGradio WebUI
      - さまざまなGPU構成に最適化
      - 量子化／非量子化チェックポイント
      - 柔軟なモデル設定

      **ハードウェア要件：**
      - 推奨：RTX 3090以上
      - GPU VRAM：30GB超
      - システムRAM：40GB超
      - CUDA互換のNVIDIAドライバー

      **詳細情報：**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    ko_KR: |
      TurboDiffusion은 Latent Consistency Model(LCM)을 기반으로 한 가속 텍스트-비디오 생성 프레임워크입니다. 다양한 TurboWan2 모델을 활용하여 텍스트 설명으로부터 고품질 비디오를 빠르게 생성합니다. 이 프레임워크는 이미지 및 비디오 생성을 지원하며, 다양한 GPU 구성에 최적화된 체크포인트를 제공합니다.

      **주요 기능:**
      - 초고속 비디오 및 이미지 생성
      - 직관적인 Gradio WebUI
      - 다양한 GPU 구성에 최적화
      - 양자화 및 비양자화 체크포인트
      - 유연한 모델 구성

      **하드웨어 요구 사항:**
      - 권장: RTX 3090 이상
      - GPU VRAM: 30GB 초과
      - 시스템 RAM: 40GB 초과
      - CUDA 호환 NVIDIA 드라이버

      **자세히 알아보기:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    nb_NO: |
      TurboDiffusion er et akselerert rammeverk for tekst-til-video-generering basert på Latent Consistency Model (LCM). Det bruker ulike TurboWan2-modeller for raskt å generere videoer av høy kvalitet fra tekstbeskrivelser. Rammeverket støtter både bilde- og videogenerering og gir optimaliserte checkpoints for ulike GPU-konfigurasjoner.

      **Hovedfunksjoner:**
      - Ultra-rask video- og bildegenerering
      - Intuitiv Gradio WebUI
      - Optimalisert for ulike GPU-konfigurasjoner
      - Kvantiserte og ikke-kvantiserte checkpoints
      - Fleksibel modellkonfigurasjon

      **Maskinvarekrav:**
      - Anbefalt: RTX 3090 eller nyere
      - GPU VRAM: > 30 GB
      - System-RAM: > 40 GB
      - CUDA-kompatible NVIDIA-drivere

      **Les mer:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    pt_PT: |
      TurboDiffusion é um framework acelerado para geração texto-para-vídeo baseado no Latent Consistency Model (LCM). Ele utiliza vários modelos TurboWan2 para gerar rapidamente vídeos de alta qualidade a partir de descrições de texto. O framework suporta geração de imagens e vídeos e fornece checkpoints otimizados para diferentes configurações de GPU.

      **Principais funcionalidades:**
      - Geração ultra-rápida de vídeos e imagens
      - Gradio WebUI intuitivo
      - Otimizado para diferentes configurações de GPU
      - Checkpoints quantizados e não quantizados
      - Configuração de modelo flexível

      **Requisitos de hardware:**
      - Recomendado: RTX 3090 ou superior
      - VRAM da GPU: > 30 GB
      - RAM do sistema: > 40 GB
      - Drivers NVIDIA compatíveis com CUDA

      **Saiba mais:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    ru_RU: |
      TurboDiffusion — это ускоренный фреймворк генерации текста в видео на основе Latent Consistency Model (LCM). Он использует различные модели TurboWan2 для быстрого создания высококачественных видео по текстовым описаниям. Фреймворк поддерживает генерацию изображений и видео и предоставляет оптимизированные чекпоинты для различных конфигураций GPU.

      **Основные возможности:**
      - Сверхбыстрая генерация видео и изображений
      - Интуитивный Gradio WebUI
      - Оптимизация под разные конфигурации GPU
      - Квантизованные и неквантизованные чекпоинты
      - Гибкая конфигурация моделей

      **Требования к оборудованию:**
      - Рекомендуется: RTX 3090 и выше
      - VRAM GPU: > 30 ГБ
      - ОЗУ системы: > 40 ГБ
      - Драйверы NVIDIA, совместимые с CUDA

      **Подробнее:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    sv_SE: |
      TurboDiffusion är ett accelererat ramverk för text-till-video-generering baserat på Latent Consistency Model (LCM). Det använder olika TurboWan2-modeller för att snabbt generera högkvalitativa videor från textbeskrivningar. Ramverket stödjer både bild- och videogenerering och tillhandahåller optimerade checkpoints för olika GPU-konfigurationer.

      **Nyckelfunktioner:**
      - Ultrasnabb video- och bildgenerering
      - Intuitivt Gradio WebUI
      - Optimerat för olika GPU-konfigurationer
      - Kvantiserade och icke-kvantiserade checkpoints
      - Flexibel modellkonfiguration

      **Hårdvarukrav:**
      - Rekommenderas: RTX 3090 eller högre
      - GPU VRAM: > 30 GB
      - System-RAM: > 40 GB
      - CUDA-kompatibla NVIDIA-drivrutiner

      **Läs mer:**
      - [TurboDiffusion GitHub](https://github.com/thu-ml/TurboDiffusion)
    tr_TR: |
      TurboDiffusion, Latent Consistency Model (LCM) tabanlı hızlandırılmış bir metinden videoya üretim çerçevesidir. Çeşitli TurboWan2 modellerini kullanarak metin açıklamalarından yüksek kaliteli videoları hızlı bir şekilde üretir. Çerçeve hem görüntü hem de video üretimini destekler ve farklı GPU yapılandırmaları için optimize edilmiş checkpoint'ler sunar.

      **Temel özellikler:**
      - Ultra hızlı video ve görüntü üretimi
      - Sezgisel Gradio WebUI
