name: turbodiffusion_nvidia
services:
  turbodiffusion:
    image: icewhaletech/turbodiffusion:20260312
    container_name: turbodiffusion
    deploy:
      resources:
        reservations:
          memory: 40G
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    environment:
      MODEL_PATHS: /workspace/TurboDiffusion/checkpoints_host,/workspace/TurboDiffusion/checkpoints
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      CUDA_HOME: /usr/local/cuda
      PYTHONPATH: /workspace/TurboDiffusion/turbodiffusion
    ports:
      - target: 7860
        published: "27860"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/models
        target: /workspace/TurboDiffusion/checkpoints_host
      - type: bind
        source: /DATA/AppData/$AppID/outputs
        target: /workspace/TurboDiffusion/outputs
    working_dir: /workspace/TurboDiffusion
    command:
      - python
      - turbodiffusion/app_gradio.py
    x-casaos:
      envs:
        - container: NVIDIA_VISIBLE_DEVICES
          description:
            de_DE: Sichtbare NVIDIA-Geräte für GPU-Beschleunigung
            el_GR: Ορατές συσκευές NVIDIA για επιτάχυνση GPU
            en_GB: Visible NVIDIA devices for GPU acceleration
            en_US: Visible NVIDIA devices for GPU acceleration
