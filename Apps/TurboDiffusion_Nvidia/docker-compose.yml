            it_IT: Dispositivi NVIDIA visibili per l'accelerazione GPU
            ja_JP: GPUアクセラレーション用の可視NVIDIAデバイス
            ko_KR: GPU 가속을 위한 가시적 NVIDIA 장치
            nb_NO: Synlige NVIDIA-enheter for GPU-akselerasjon
            pt_PT: Dispositivos NVIDIA visíveis para aceleração de GPU
            ru_RU: Видимые устройства NVIDIA для ускорения GPU
            sv_SE: Synliga NVIDIA-enheter för GPU-acceleration
