name: autobrr
services:
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:v1.69.0
    network_mode: bridge
    restart: unless-stopped
    environment:
      TZ: $TZ
    ports:
      - target: 7474
        published: "7474"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /config
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: TimeZone
            zh_cn: 时区
      ports:
        - container: "7474"
          description:
            en_us: WebUI HTTP Port
            zh_cn: WebUI HTTP端口
      volumes:
        - container: /config
          description:
            en_us: Autobrr config directory
            zh_cn: Autobrr配置目录
x-casaos:
  main: autobrr
  architectures:
    - amd64
    - arm
    - arm64
  port_map: "7474"
  title:
    en_us: Autobrr
  author: Autobrr Team
  developer: Autobrr Team
  category: Media
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Autobrr/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Autobrr/thumbnail.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Autobrr/screenshot-1.png
  description:
    en_us: Autobrr is the modern download automation tool for torrents and usenet. With inspiration and ideas from tools like trackarr, autodl-irssi and flexget we built one tool that can do it all, and then some.
    zh_cn: Autobrr是用于torrents和Usenet的现代下载自动化工具。受到trackarr、autodl-irssi和flexget等工具的启发和理念，我们构建了一个可以完成所有这些任务的工具，甚至更多。
  tagline:
    en_us: Modern, easy to use download automation for torrents and usenet.
    zh_cn: 现代、易于使用的Torrents和Usenet下载自动化工具。
  version: "v1.69.0"
  updateAt: "2025-11-10"
  releaseNotes:
    en_US: |-
      - v1.69.0 adds configurable CORS settings, HTTP resource release on close, Pending release filtering, failed-list refresh warnings, BJ-Share support, and DarkPeers Featured Promo support.
      - Indexer updates include Aither SASL authentication and ReelFlix domain changes.
      - Fixes include missing database rows.Close calls, SQLite-to-PostgreSQL conversion issues, HHD regex, proxy credential testing, Windows exec arg parsing, and a web dropdown crash.
    en_GB: |-
      - v1.69.0 adds configurable CORS settings, HTTP resource release on close, Pending release filtering, failed-list refresh warnings, BJ-Share support, and DarkPeers Featured Promo support.
      - Indexer updates include Aither SASL authentication and ReelFlix domain changes.
      - Fixes include missing database rows.Close calls, SQLite-to-PostgreSQL conversion issues, HHD regex, proxy credential testing, Windows exec arg parsing, and a web dropdown crash.
    it_IT: |-
      - v1.69.0 aggiunge impostazioni CORS configurabili, rilascio di risorse HTTP alla chiusura, filtro rilascio in sospeso, avvisi di aggiornamento failed-list, supporto BJ-Share e supporto promozione in primo piano DarkPeers.
      - Gli aggiornamenti dell'indicizzatore includono l'autenticazione Aither SASL e le modifiche al dominio ReelFlix.
      - Le correzioni includono chiamate rows.Close mancanti al database, problemi di conversione SQLite-to-PostgreSQL, regex HHD, test delle credenziali proxy, analisi degli argomenti exec di Windows e un arresto anomalo del menu a discesa Web.
    nb_NO: |-
      - v1.69.0 legger til konfigurerbare CORS-innstillinger, HTTP ressursutgivelse ved lukking, Ventende utgivelsesfiltrering, failed-list oppdateringsvarsler, BJ-Share-støtte og DarkPeers Utvalgt promo-støtte.
      - Indekseringsoppdateringer inkluderer Aither SASL-autentisering og ReelFlix-domeneendringer.
      - Rettelser inkluderer manglende database-rows.Close-anrop, SQLite-to-PostgreSQL-konverteringsproblemer, HHD regex, proxy-legitimasjonstesting, Windows exec-arg-parsing og en nett-rullegardinkrasj.
    zh_CN: |-
      - v1.69.0 增加了可配置 CORS、关闭时释放 HTTP resource、Pending release 过滤、failed-list 刷新警告、BJ-Share 支持和 DarkPeers Featured Promo 支持。
      - Indexer 更新包括 Aither SASL authentication 和 ReelFlix 域名变更。
      - 修复内容包括缺失的 database rows.Close 调用、SQLite 到 PostgreSQL 转换问题、HHD regex、proxy credential 测试、Windows exec arg 解析和 web 下拉崩溃。
    ja_JP: |-
      - v1.69.0 は設定可能な CORS、クローズ時の HTTP resource 解放、Pending release フィルタ、failed-list 更新警告、BJ-Share 対応、DarkPeers Featured Promo 対応を追加します。
      - Indexer 更新には Aither SASL authentication と ReelFlix ドメイン変更が含まれます。
      - database rows.Close 呼び出し漏れ、SQLite から PostgreSQL への変換、HHD regex、proxy credential テスト、Windows exec arg 解析、web ドロップダウンのクラッシュが修正されました。
    ko_KR: |-
      - v1.69.0은 구성 가능한 CORS, 닫을 때 HTTP resource 해제, Pending release 필터링, failed-list 새로고침 경고, BJ-Share 지원, DarkPeers Featured Promo 지원을 추가합니다.
      - Indexer 업데이트에는 Aither SASL authentication과 ReelFlix 도메인 변경이 포함됩니다.
      - 누락된 database rows.Close 호출, SQLite에서 PostgreSQL 변환 문제, HHD regex, proxy credential 테스트, Windows exec arg 파싱, web 드롭다운 crash가 수정되었습니다.
    fr_FR: |-
      - v1.69.0 ajoute CORS configurable, la liberation des ressources HTTP a la fermeture, le filtrage Pending release, des avertissements de rafraichissement failed-list, la prise en charge BJ-Share et DarkPeers Featured Promo.
      - Les mises a jour d'indexer incluent Aither SASL authentication et les changements de domaine ReelFlix.
      - Les correctifs couvrent les appels database rows.Close manquants, la conversion SQLite vers PostgreSQL, HHD regex, les tests de proxy credential, l'analyse Windows exec arg et un crash de menu deroulant web.
    de_DE: |-
      - v1.69.0 ergaenzt konfigurierbares CORS, HTTP-Resource-Freigabe beim Schliessen, Pending-release-Filter, Warnungen beim Aktualisieren der Failed-Liste, BJ-Share-Support und DarkPeers Featured Promo-Support.
      - Indexer-Updates umfassen Aither SASL authentication und ReelFlix-Domain-Aenderungen.
      - Korrekturen betreffen fehlende database rows.Close-Aufrufe, SQLite-zu-PostgreSQL-Konvertierung, HHD regex, Proxy-Credential-Tests, Windows exec arg Parsing und einen Web-Dropdown-Absturz.
    sv_SE: |-
      - v1.69.0 lägger till konfigurerbara CORS-inställningar, HTTP resurssläpp vid stängning, Väntande release-filtrering, failed-list uppdateringsvarningar, BJ-Share-stöd och DarkPeers Utvalda kampanjstöd.
      - Indexeringsuppdateringar inkluderar Aither SASL-autentisering och ReelFlix domänändringar.
      - Korrigeringar inkluderar saknade databas rows.Close-anrop, SQLite-to-PostgreSQL-konverteringsproblem, HHD regex, proxy-autentiseringstestning, Windows exec arg-parsning och en nedrullningsbar webbkrasch.
    el_GR: |-
      - Το v1.69.0 προσθέτει ρυθμίσεις CORS με δυνατότητα διαμόρφωσης, την απελευθέρωση πόρων HTTP στο κλείσιμο, το φιλτράρισμα κυκλοφορίας σε εκκρεμότητα, τις προειδοποιήσεις ανανέωσης failed-list, την υποστήριξη BJ-Share και την υποστήριξη της Προτεινόμενης προώθησης DarkPeers.
      - Οι ενημερώσεις ευρετηρίου περιλαμβάνουν έλεγχο ταυτότητας Aither SASL και αλλαγές τομέα ReelFlix.
      - Οι επιδιορθώσεις περιλαμβάνουν κλήσεις rows.Close που λείπουν από τη βάση δεδομένων, ζητήματα μετατροπής SQLite-to-PostgreSQL, regex HHD, δοκιμή διαπιστευτηρίων διακομιστή μεσολάβησης, ανάλυση arg exec των Windows και σφάλμα αναπτυσσόμενης λίστας ιστού.
    hr_HR: |-
      - v1.69.0 dodaje konfigurabilne CORS postavke, HTTP izdavanje resursa pri zatvaranju, filtriranje izdanja na čekanju, failed-list upozorenja o osvježavanju, BJ-Share podršku i DarkPeers Istaknutu promotivnu podršku.
      - Ažuriranja indeksatora uključuju bilo SASL provjeru autentičnosti i ReelFlix promjene domene.
      - Popravci uključuju nedostajuće pozive baze podataka rows.Close, probleme s konverzijom SQLite-to-PostgreSQL, HHD regex, testiranje proxy vjerodajnica, Windows exec arg parsiranje i pad padajućeg izbornika na webu.
    pt_PT: |-
      - v1.69.0 adiciona definições CORS configuráveis, libertação de recursos HTTP no fecho, filtragem de libertação pendente, avisos de atualização failed-list, suporte BJ-Share e suporte DarkPeers Promo em destaque.
      - As atualizações do indexador incluem a autenticação Aither SASL e as alterações de domínio ReelFlix.
      - As correções incluem chamadas rows.Close de base de dados em falta, problemas de conversão SQLite-to-PostgreSQL, regex HHD, teste de credenciais de proxy, análise de argumentos executivos do Windows e falha no menu suspenso da web.
    ru_RU: |-
      - v1.69.0 добавляет настраиваемые параметры CORS, выпуск ресурсов HTTP при закрытии, фильтрацию ожидающих выпусков, предупреждения об обновлении failed-list, поддержку BJ-Share и поддержку DarkPeers Featured Promo.
      - Обновления индексатора включают аутентификацию Aither SASL и изменения домена ReelFlix.
      - Исправления включают в себя отсутствующие вызовы базы данных rows.Close, проблемы преобразования SQLite-to-PostgreSQL, регулярное выражение HHD, проверку учетных данных прокси-сервера, синтаксический анализ аргументов exec Windows и сбой раскрывающегося списка веб-страниц.
    tr_TR: |-
      - v1.69.0 yapılandırılabilir CORS ayarları, kapatıldığında HTTP kaynak sürümü, Bekleyen sürüm filtreleme, failed-list yenileme uyarıları, BJ-Share desteği ve DarkPeers Öne Çıkan Promosyon desteği ekler.
      - Dizin oluşturucu güncellemeleri, SASL kimlik doğrulamasını ve ReelFlix etki alanı değişikliklerini içerir.
      - Düzeltmeler arasında eksik veritabanı rows.Close çağrıları, SQLite-to-PostgreSQL dönüştürme sorunları, HHD regex, proxy kimlik bilgisi testi, Windows exec arg ayrıştırması ve web açılır listesi çökmesi yer alıyor.
  website: "https://autobrr.com"
  repo: "https://github.com/autobrr/autobrr"
  support: "https://github.com/autobrr/autobrr/issues"
  docs: "https://autobrr.com"
