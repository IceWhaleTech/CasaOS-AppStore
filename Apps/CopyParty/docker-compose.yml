  description:
    de_DE: |
      **CopyParty** ist ein schneller, auf Datenschutz ausgerichteter Dateifreigabeserver mit einer Local-First-Einzeldateienarchitektur, die die vollständige Kontrolle über Daten ohne Cloud-Abhängigkeiten gewährleistet. Die intuitive Benutzeroberfläche unterstützt die Offline-Nutzung, bietet plattformübergreifende Kompatibilität und Multi-Protokoll-Zugriff und liefert ein sicheres, effizientes Dateiverwaltungserlebnis, ideal für Benutzer, die direkte Datenhoheit und eine leichtgewichtige Lösung suchen.

      Zu den Kernfunktionen der App gehören beschleunigte, fortsetzbare Uploads (über das up2k-Protokoll), die zuverlässige Übertragungen großer Dateien gewährleisten, und automatische Deduplizierung zur Speicheroptimierung. Sie hilft Benutzern, Ordner und Medien mühelos zu organisieren, mit einem webbasierten Dateimanager, der einen integrierten Medienindexer und Thumbnail-Generator für schnelle Vorschauen enthält. Fein abgestufte Berechtigungssteuerungen ermöglichen spezifische Benutzerzugriffsregeln. Die Funktion „Upload während des Downloads“ verbessert die Effizienz der Freigabe, und das Zero-Dependency-Design stellt sicher, dass die App auf nahezu jeder Hardware läuft.

      Sie integriert mehrere Zugriffsprotokolle, darunter HTTP, WebDAV, FTP und TFTP, und unterstützt Verbindungen von Standard-Webbrowsern, dedizierten Dateiclienten und älterer Hardware (wie PSP). Die App unterstützt Docker und Python für die Bereitstellung, was die Einrichtung in verschiedenen Serverumgebungen vereinfacht. Sie ermöglicht nahtlosen Zugriff auf lokale Dateien ohne komplexe Konfiguration. Die Community-Dokumentation verbessert die Benutzerfreundlichkeit, und die einfache Bedienung und hohe Flexibilität der App bieten eine moderne Lösung für lokale Dateidienste.

      **Hauptmerkmale:**
      - Datenschutzorientierte lokale Dateifreigabe
      - Zero-Dependency-Einzeldateienarchitektur
      - Beschleunigte, fortsetzbare Uploads
      - Multi-Protokoll-Unterstützung (HTTP, WebDAV, FTP, etc.)
      - Plattformübergreifende Kompatibilität
      - Medienindizierung und -streaming
      - Intelligente Deduplizierung
      - Benutzerberechtigungsverwaltung

      **Mehr erfahren:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    el_GR: |
      Το **CopyParty** είναι ένας γρήγορος διακομιστής κοινής χρήσης αρχείων με έμφαση στην ιδιωτικότητα, χρησιμοποιώντας μια αρχιτεκτονική τοπικής πρώτης, ενιαίου αρχείου, εξασφαλίζοντας πλήρη έλεγχο των δεδομένων χωρίς εξαρτήσεις από το cloud. Η διαισθητική διεπαφή του υποστηρίζει χρήση εκτός σύνδεσης, με συμβατότητα πολλαπλών πλατφορμών και πρόσβαση πολλαπλών πρωτοκόλλων, προσφέροντας μια ασφαλή, αποτελεσματική εμπειρία διαχείρισης αρχείων, ιδανική για χρήστες που αναζητούν άμεση ιδιοκτησία δεδομένων και μια ελαφριά λύση.

      Οι βασικές λειτουργίες της εφαρμογής περιλαμβάνουν επιταχυνόμενες μεταφορτώσεις με δυνατότητα συνέχισης (μέσω του πρωτοκόλλου up2k), εξασφαλίζοντας αξιόπιστες μεταφορές μεγάλων αρχείων, και αυτόματη αποδιπλασιασμό για βελτιστοποίηση του αποθηκευτικού χώρου. Βοηθά τους χρήστες να οργανώνουν φακέλους και μέσα χωρίς κόπο, με έναν διαχειριστή αρχείων βασισμένο στο διαδίκτυο που περιλαμβάνει ενσωματωμένο ευρετήριο μέσων και γεννήτρια μικρογραφιών για γρήγορες προεπισκοπήσεις. Οι λεπτομερείς έλεγχοι αδειών επιτρέπουν συγκεκριμένους κανόνες πρόσβασης χρηστών. Η λειτουργία «μεταφόρτωση κατά τη λήψη» ενισχύει την αποτελεσματικότητα της κοινής χρήσης, και ο σχεδιασμός μηδενικών εξαρτήσεων διασφαλίζει ότι λειτουργεί σχεδόν σε οποιοδήποτε υλικό.

      Ενσωματώνει πολλαπλά πρωτόκολλα πρόσβασης, συμπεριλαμβανομένων των HTTP, WebDAV, FTP και TFTP, υποστηρίζοντας συνδέσεις από τυπικά προγράμματα περιήγησης ιστού, ειδικούς πελάτες αρχείων και παλαιότερο υλικό (όπως PSP). Η εφαρμογή υποστηρίζει Docker και Python για ανάπτυξη, απλοποιώντας τη ρύθμιση σε διάφορα περιβάλλοντα διακομιστών. Διευκολύνει την απρόσκοπτη πρόσβαση σε τοπικά αρχεία χωρίς πολύπλοκη διαμόρφωση. Η τεκμηρίωση της κοινότητας ενισχύει τη χρηστικότητα, και η απλή λειτουργία και η υψηλή ευελιξία της εφαρμογής προσφέρουν μια σύγχρονη λύση υπηρεσίας τοπικών αρχείων.

      **Βασικά Χαρακτηριστικά:**
      - Τοπική κοινή χρήση αρχείων με έμφαση στην ιδιωτικότητα
      - Αρχιτεκτονική ενιαίου αρχείου χωρίς εξαρτήσεις
      - Επιταχυνόμενες μεταφορτώσεις με δυνατότητα συνέχισης
      - Υποστήριξη πολλαπλών πρωτοκόλλων (HTTP, WebDAV, FTP, κ.λπ.)
      - Συμβατότητα πολλαπλών πλατφορμών
      - Ευρετηρίαση και ροή μέσων
      - Έξυπνη αποδιπλασιασμός
      - Διαχείριση αδειών χρήστη

      **Μάθετε Περισσότερα:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    en_GB: |
      **CopyParty** is a fast, privacy-focused file sharing server using a local-first, single-file architecture, ensuring full control over data without cloud dependencies. Its intuitive interface supports offline use, with cross-platform compatibility and multi-protocol access, delivering a secure, efficient file management experience, ideal for users seeking direct data ownership and a lightweight solution.

      The app's core features include accelerated resumable uploads (via the up2k protocol), ensuring reliable large file transfers, and automatic deduplication to optimise storage. It helps users organise folders and media effortlessly, with a web-based file manager that includes a built-in media indexer and thumbnail generator for quick previews. Fine-grained permission controls allow specific user access rules. The "upload-while-downloading" feature enhances sharing efficiency, and the zero-dependency design ensures it runs on almost any hardware.

      It integrates multiple access protocols, including HTTP, WebDAV, FTP, and TFTP, supporting connections from standard web browsers, dedicated file clients, and legacy hardware (such as PSP). The app supports Docker and Python for deployment, simplifying setup across various server environments. It facilitates seamless access to local files without complex configuration. Community documentation enhances usability, and the app's simple operation and high flexibility deliver a modern local file service solution.

      **Key Features:**
      - Privacy-focused local file sharing
      - Zero-dependency single-file architecture
      - Accelerated resumable uploads
      - Multi-protocol support (HTTP, WebDAV, FTP, etc.)
      - Cross-platform compatibility
      - Media indexing and streaming
      - Smart deduplication
      - User permission management

      **Learn More:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
