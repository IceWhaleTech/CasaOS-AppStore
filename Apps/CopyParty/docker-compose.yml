    fr_FR: |
      **CopyParty** est un serveur de partage de fichiers rapide et axé sur la confidentialité, utilisant une architecture « local-first » à fichier unique, garantissant un contrôle total sur les données sans dépendances cloud. Son interface intuitive prend en charge l'utilisation hors ligne, avec une compatibilité multiplateforme et un accès multi-protocole, offrant une expérience de gestion de fichiers sécurisée et efficace, idéale pour les utilisateurs recherchant une propriété directe des données et une solution légère.

      Les fonctionnalités principales de l'application incluent des téléchargements accélérés et reprenables (via le protocole up2k), assurant des transferts de fichiers volumineux fiables, et une déduplication automatique pour optimiser le stockage. Elle aide les utilisateurs à organiser sans effort leurs dossiers et médias, grâce à un gestionnaire de fichiers basé sur le web qui comprend un indexeur de médias intégré et un générateur de vignettes pour des aperçus rapides. Des contrôles de permissions granulaires permettent des règles d'accès utilisateur spécifiques. La fonction « upload-while-downloading » (téléchargement pendant le téléchargement) améliore l'efficacité du partage, et la conception sans dépendances garantit son fonctionnement sur presque n'importe quel matériel.

      Il intègre plusieurs protocoles d'accès, y compris HTTP, WebDAV, FTP et TFTP, prenant en charge les connexions depuis les navigateurs web standards, les clients de fichiers dédiés et le matériel hérité (tel que la PSP). L'application prend en charge Docker et Python pour le déploiement, simplifiant la configuration dans divers environnements de serveur. Elle facilite l'accès transparent aux fichiers locaux sans configuration complexe. La documentation communautaire améliore l'utilisabilité, et le fonctionnement simple et la grande flexibilité de l'application offrent une solution moderne de service de fichiers locaux.

      **Fonctionnalités Clés :**
      - Partage de fichiers local axé sur la confidentialité
      - Architecture à fichier unique sans dépendances
      - Téléchargements reprenables accélérés
      - Prise en charge multi-protocole (HTTP, WebDAV, FTP, etc.)
      - Compatibilité multiplateforme
      - Indexation et streaming de médias
      - Déduplication intelligente
      - Gestion des permissions utilisateur

      **En savoir plus :**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    hr_HR: |
      **CopyParty** je brz poslužitelj za dijeljenje datoteka usmjeren na privatnost, koristeći arhitekturu 'local-first', s jednom datotekom, osiguravajući potpunu kontrolu nad podacima bez ovisnosti o oblaku. Njegovo intuitivno sučelje podržava izvanmrežnu upotrebu, s višeplatformskom kompatibilnošću i višeprotokolnim pristupom, pružajući sigurno i učinkovito iskustvo upravljanja datotekama, idealno za korisnike koji traže izravno vlasništvo nad podacima i lagano rješenje.

      Osnovne značajke aplikacije uključuju ubrzane, nastavljive prijenose (putem up2k protokola), osiguravajući pouzdane prijenose velikih datoteka, i automatsku deduplikaciju za optimizaciju pohrane. Pomaže korisnicima da bez napora organiziraju mape i medije, s web-baziranim upraviteljem datoteka koji uključuje ugrađeni indeksator medija i generator sličica za brze preglede. Detaljne kontrole dopuštenja omogućuju specifična pravila pristupa korisnicima. Značajka „upload-while-downloading“ (prijenos tijekom preuzimanja) poboljšava učinkovitost dijeljenja, a dizajn bez ovisnosti osigurava da radi na gotovo svakom hardveru.

      Integrira više pristupnih protokola, uključujući HTTP, WebDAV, FTP i TFTP, podržavajući veze sa standardnih web preglednika, namjenskih klijenata datoteka i starijeg hardvera (kao što je PSP). Aplikacija podržava Docker i Python za implementaciju, pojednostavljujući postavljanje u različitim poslužiteljskim okruženjima. Omogućuje besprijekoran pristup lokalnim datotekama bez složene konfiguracije. Dokumentacija zajednice poboljšava upotrebljivost, a jednostavno rukovanje i visoka fleksibilnost aplikacije pružaju moderno rješenje za lokalne datotečne usluge.

      **Ključne značajke:**
      - Lokalno dijeljenje datoteka usmjereno na privatnost
      - Arhitektura s jednom datotekom bez ovisnosti
      - Ubrzani, nastavljivi prijenosi
      - Podrška za više protokola (HTTP, WebDAV, FTP, itd.)
      - Višeplatformska kompatibilnost
      - Indeksiranje i streaming medija
      - Pametna deduplikacija
      - Upravljanje korisničkim dopuštenjima

      **Saznajte više:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    it_IT: |
      **CopyParty** è un server di condivisione file veloce e attento alla privacy, che utilizza un'architettura "local-first" a file singolo, garantendo il pieno controllo sui dati senza dipendenze dal cloud. La sua interfaccia intuitiva supporta l'uso offline, con compatibilità multipiattaforma e accesso multi-protocollo, offrendo un'esperienza di gestione file sicura ed efficiente, ideale per gli utenti che cercano la proprietà diretta dei dati e una soluzione leggera.

      Le funzionalità principali dell'app includono upload ripristinabili accelerati (tramite il protocollo up2k), garantendo trasferimenti affidabili di file di grandi dimensioni, e deduplicazione automatica per ottimizzare lo storage. Aiuta gli utenti a organizzare cartelle e media senza sforzo, con un file manager basato sul web che include un indicizzatore multimediale integrato e un generatore di miniature per anteprime rapide. I controlli di autorizzazione granulari consentono regole di accesso utente specifiche. La funzione "upload-while-downloading" (caricamento durante il download) migliora l'efficienza della condivisione, e il design a zero dipendenze assicura che funzioni su quasi qualsiasi hardware.

      Integra più protocolli di accesso, inclusi HTTP, WebDAV, FTP e TFTP, supportando connessioni da browser web standard, client di file dedicati e hardware legacy (come PSP). L'app supporta Docker e Python per la distribuzione, semplificando la configurazione in vari ambienti server. Facilita l'accesso senza interruzioni ai file locali senza configurazioni complesse. La documentazione della community migliora l'usabilità, e il funzionamento semplice e l'elevata flessibilità dell'app offrono una soluzione moderna per i servizi di file locali.

      **Caratteristiche principali:**
      - Condivisione file locale attenta alla privacy
      - Architettura a file singolo a zero dipendenze
      - Upload ripristinabili accelerati
      - Supporto multi-protocollo (HTTP, WebDAV, FTP, ecc.)
      - Compatibilità multipiattaforma
      - Indicizzazione e streaming multimediale
      - Deduplicazione intelligente
      - Gestione dei permessi utente

      **Scopri di più:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    ja_JP: |
      **CopyParty** は、ローカルファーストの単一ファイルアーキテクチャを使用する、高速でプライバシー重視のファイル共有サーバーであり、クラウドへの依存なしにデータに対する完全な制御を保証します。その直感的なインターフェースはオフライン使用をサポートし、クロスプラットフォーム互換性とマルチプロトコルアクセスを備え、安全で効率的なファイル管理体験を提供します。データの直接所有権と軽量なソリューションを求めるユーザーに最適です。

      アプリの主要機能には、高速で再開可能なアップロード（up2kプロトコル経由）が含まれており、信頼性の高い大容量ファイル転送を保証し、ストレージを最適化するための自動重複排除も行います。組み込みのメディアインデクサーとサムネイルジェネレーターを備えたウェブベースのファイルマネージャーにより、ユーザーはフォルダーやメディアを簡単に整理し、素早くプレビューできます。きめ細かなアクセス許可制御により、特定のユーザーアクセスルールを設定できます。「ダウンロードしながらアップロード」機能は共有効率を高め、ゼロ依存設計により、ほぼすべてのハードウェアで動作します。

      HTTP、WebDAV、FTP、TFTPを含む複数のアクセスプロトコルを統合し、標準のウェブブラウザ、専用ファイルクライアント、レガシーハードウェア（PSPなど）からの接続をサポートします。このアプリはDockerとPythonでのデプロイメントをサポートし、さまざまなサーバー環境でのセットアップを簡素化します。複雑な設定なしでローカルファイルへのシームレスなアクセスを容易にします。コミュニティドキュメントは使いやすさを向上させ、アプリのシンプルな操作性と高い柔軟性は、最新のローカルファイルサービスソリューションを提供します。

      **主な機能:**
      - プライバシー重視のローカルファイル共有
      - ゼロ依存の単一ファイルアーキテクチャ
      - 高速で再開可能なアップロード
      - マルチプロトコルサポート（HTTP、WebDAV、FTPなど）
      - クロスプラットフォーム互換性
      - メディアインデックス作成とストリーミング
      - スマートな重複排除
      - ユーザー権限管理

      **詳細はこちら:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    ko_KR: |
      **CopyParty**는 로컬 우선, 단일 파일 아키텍처를 사용하는 빠르고 개인 정보 보호에 중점을 둔 파일 공유 서버로, 클라우드 종속성 없이 데이터에 대한 완전한 제어를 보장합니다. 직관적인 인터페이스는 오프라인 사용을 지원하며, 크로스 플랫폼 호환성과 다중 프로토콜 액세스를 통해 안전하고 효율적인 파일 관리 경험을 제공하여 직접적인 데이터 소유권과 경량 솔루션을 찾는 사용자에게 이상적입니다.

      앱의 핵심 기능에는 가속화된 재개 가능한 업로드(up2k 프로토콜을 통해)가 포함되어 안정적인 대용량 파일 전송을 보장하며, 저장 공간을 최적화하기 위한 자동 중복 제거 기능도 있습니다. 내장된 미디어 인덱서와 썸네일 생성기가 포함된 웹 기반 파일 관리자를 통해 사용자는 폴더와 미디어를 손쉽게 정리하고 빠르게 미리 볼 수 있습니다. 세분화된 권한 제어를 통해 특정 사용자 액세스 규칙을 설정할 수 있습니다. "다운로드 중 업로드" 기능은 공유 효율성을 높이며, 제로 종속성 설계로 거의 모든 하드웨어에서 실행됩니다.

      HTTP, WebDAV, FTP, TFTP를 포함한 여러 액세스 프로토콜을 통합하여 표준 웹 브라우저, 전용 파일 클라이언트 및 레거시 하드웨어(PSP 등)의 연결을 지원합니다. 이 앱은 배포를 위해 Docker 및 Python을 지원하여 다양한 서버 환경에서 설정을 간소화합니다. 복잡한 구성 없이 로컬 파일에 대한 원활한 액세스를 용이하게 합니다. 커뮤니티 문서는 사용성을 향상시키며, 앱의 간단한 작동과 높은 유연성은 현대적인 로컬 파일 서비스 솔루션을 제공합니다.

      **주요 기능:**
      - 개인 정보 보호에 중점을 둔 로컬 파일 공유
      - 제로 종속성 단일 파일 아키텍처
      - 가속화된 재개 가능한 업로드
      - 다중 프로토콜 지원 (HTTP, WebDAV, FTP 등)
      - 크로스 플랫폼 호환성
      - 미디어 인덱싱 및 스트리밍
      - 스마트 중복 제거
      - 사용자 권한 관리

      **더 알아보기:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    nb_NO: |
      **CopyParty** er en rask, personvernfokusert fildelingsserver som bruker en lokal-først, enkeltfil-arkitektur, og sikrer full kontroll over data uten skyavhengigheter. Det intuitive grensesnittet støtter offline bruk, med kryssplattformkompatibilitet og multi-protokoll tilgang, og leverer en sikker, effektiv filbehandlingsopplevelse, ideell for brukere som søker direkte dataeierskap og en lettvektsløsning.

      Appens kjernefunksjoner inkluderer akselererte gjenopptagbare opplastinger (via up2k-protokollen), som sikrer pålitelige store filoverføringer, og automatisk deduplisering for å optimalisere lagring. Den hjelper brukere med å organisere mapper og medier uten anstrengelse, med en nettbasert filbehandler som inkluderer en innebygd medieindekserer og miniatyrbildegenerator for raske forhåndsvisninger. Finmaskede tillatelseskontroller tillater spesifikke brukeraksessregler. Funksjonen «opplasting under nedlasting» forbedrer delingseffektiviteten, og den null-avhengige designen sikrer at den kjører på nesten all maskinvare.

      Den integrerer flere tilgangsprotokoller, inkludert HTTP, WebDAV, FTP og TFTP, og støtter tilkoblinger fra standard nettlesere, dedikerte filklienter og eldre maskinvare (som PSP). Appen støtter Docker og Python for distribusjon, noe som forenkler oppsettet på tvers av ulike servermiljøer. Den tilrettelegger for sømløs tilgang til lokale filer uten kompleks konfigurasjon. Fellesskapsdokumentasjon forbedrer brukervennligheten, og appens enkle betjening og høye fleksibilitet leverer en moderne lokal filløsning.

      **Nøkkelfunksjoner:**
      - Personvernfokusert lokal fildeling
      - Null-avhengig enkeltfil-arkitektur
      - Akselererte gjenopptagbare opplastinger
      - Multi-protokoll støtte (HTTP, WebDAV, FTP, etc.)
      - Kryssplattformkompatibilitet
      - Medieindeksering og strømming
      - Smart deduplisering
      - Brukertillatelsesadministrasjon

      **Lær mer:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    pt_PT: |
      **CopyParty** é um servidor de partilha de ficheiros rápido e focado na privacidade, utilizando uma arquitetura de ficheiro único, "local-first", garantindo controlo total sobre os dados sem dependências da cloud. A sua interface intuitiva suporta o uso offline, com compatibilidade multiplataforma e acesso multi-protocolo, proporcionando uma experiência de gestão de ficheiros segura e eficiente, ideal para utilizadores que procuram propriedade direta dos dados e uma solução leve.

      As principais funcionalidades da aplicação incluem uploads acelerados e retomáveis (via protocolo up2k), garantindo transferências fiáveis de ficheiros grandes, e deduplicação automática para otimizar o armazenamento. Ajuda os utilizadores a organizar pastas e multimédia sem esforço, com um gestor de ficheiros baseado na web que inclui um indexador de multimédia integrado e um gerador de miniaturas para pré-visualizações rápidas. Os controlos de permissões granulares permitem regras de acesso de utilizador específicas. A funcionalidade "upload-while-downloading" (carregar enquanto descarrega) melhora a eficiência da partilha, e o design de zero dependências garante que funciona em quase qualquer hardware.

      Integra múltiplos protocolos de acesso, incluindo HTTP, WebDAV, FTP e TFTP, suportando ligações de navegadores web padrão, clientes de ficheiros dedicados e hardware legado (como PSP). A aplicação suporta Docker e Python para implementação, simplificando a configuração em vários ambientes de servidor. Facilita o acesso contínuo a ficheiros locais sem configuração complexa. A documentação da comunidade melhora a usabilidade, e a operação simples e alta flexibilidade da aplicação oferecem uma solução moderna de serviço de ficheiros locais.

      **Funcionalidades Chave:**
      - Partilha de ficheiros local focada na privacidade
      - Arquitetura de ficheiro único com zero dependências
      - Uploads acelerados e retomáveis
      - Suporte multi-protocolo (HTTP, WebDAV, FTP, etc.)
      - Compatibilidade multiplataforma
      - Indexação e streaming de multimédia
      - Deduplicação inteligente
      - Gestão de permissões de utilizador

      **Saber Mais:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    ru_RU: |
      **CopyParty** — это быстрый, ориентированный на конфиденциальность сервер для обмена файлами, использующий архитектуру «local-first» с одним файлом, обеспечивающую полный контроль над данными без зависимостей от облака. Его интуитивно понятный интерфейс поддерживает автономное использование, кроссплатформенную совместимость и многопротокольный доступ, предоставляя безопасное и эффективное управление файлами, идеально подходящее для пользователей, стремящихся к прямому владению данными и легковесному решению.

      Основные функции приложения включают ускоренную возобновляемую загрузку (через протокол up2k), обеспечивающую надежную передачу больших файлов, и автоматическую дедупликацию для оптимизации хранилища. Оно помогает пользователям без усилий организовывать папки и медиафайлы с помощью веб-менеджера файлов, который включает встроенный индексатор медиа и генератор миниатюр для быстрого предварительного просмотра. Детальный контроль разрешений позволяет устанавливать специфические правила доступа для пользователей. Функция «загрузка во время скачивания» повышает эффективность обмена, а конструкция с нулевой зависимостью гарантирует работу почти на любом оборудовании.

      Он интегрирует несколько протоколов доступа, включая HTTP, WebDAV, FTP и TFTP, поддерживая соединения со стандартных веб-браузеров, специализированных файловых клиентов и устаревшего оборудования (например, PSP). Приложение поддерживает Docker и Python для развертывания, упрощая настройку в различных серверных средах. Оно обеспечивает беспрепятственный доступ к локальным файлам без сложной конфигурации. Документация сообщества повышает удобство использования, а простота работы и высокая гибкость приложения обеспечивают современное решение для локальных файловых служб.

      **Ключевые особенности:**
      - Локальный обмен файлами с акцентом на конфиденциальность
      - Однофайловая архитектура с нулевой зависимостью
      - Ускоренная возобновляемая загрузка
      - Поддержка нескольких протоколов (HTTP, WebDAV, FTP и т. д.)
      - Кроссплатформенная совместимость
      - Индексация и потоковая передача медиа
      - Интеллектуальная дедупликация
      - Управление разрешениями пользователей

      **Узнать больше:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    sv_SE: |
      **CopyParty** är en snabb, integritetsfokuserad filserver som använder en lokal-först, enfilsarkitektur, vilket säkerställer full kontroll över data utan molnberoenden. Dess intuitiva gränssnitt stöder offlineanvändning, med plattformsoberoende kompatibilitet och multiprotokollåtkomst, vilket ger en säker och effektiv filhanteringsupplevelse, idealisk för användare som söker direkt dataägarskap och en lättviktslösning.

      Appens kärnfunktioner inkluderar accelererade återupptagbara uppladdningar (via up2k-protokollet), vilket säkerställer tillförlitliga stora filöverföringar, och automatisk deduplicering för att optimera lagring. Den hjälper användare att enkelt organisera mappar och media, med en webbaserad filhanterare som inkluderar en inbyggd medieindexerare och miniatyrbildsgenerator för snabba förhandsvisningar. Finstämd behörighetskontroll möjliggör specifika användaråtkomstregler. Funktionen "ladda upp medan du laddar ner" förbättrar delningseffektiviteten, och den beroendefria designen säkerställer att den körs på nästan vilken hårdvara som helst.

      Den integrerar flera åtkomstprotokoll, inklusive HTTP, WebDAV, FTP och TFTP, och stöder anslutningar från standardwebbläsare, dedikerade filklienter och äldre hårdvara (som PSP). Appen stöder Docker och Python för distribution, vilket förenklar installationen i olika servermiljöer. Den underlättar sömlös åtkomst till lokala filer utan komplex konfiguration. Gemenskapsdokumentation förbättrar användbarheten, och appens enkla funktion och höga flexibilitet levererar en modern lösning för lokala filtjänster.

      **Nyckelfunktioner:**
      - Integritetsfokuserad lokal fildelning
      - Beroendefri enfilsarkitektur
      - Accelererade återupptagbara uppladdningar
      - Stöd för flera protokoll (HTTP, WebDAV, FTP, etc.)
      - Plattformsoberoende kompatibilitet
      - Medieindexering och streaming
      - Smart deduplicering
      - Användarbehörighetshantering

      **Läs mer:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    tr_TR: |
      **CopyParty**, yerel öncelikli, tek dosyalı mimari kullanarak hızlı, gizlilik odaklı bir dosya paylaşım sunucusudur ve bulut bağımlılıkları olmadan veriler üzerinde tam kontrol sağlar. Sezgisel arayüzü çevrimdışı kullanımı destekler, çapraz platform uyumluluğu ve çok protokollü erişim ile güvenli, verimli bir dosya yönetimi deneyimi sunar; doğrudan veri sahipliği ve hafif bir çözüm arayan kullanıcılar için idealdir.

      Uygulamanın temel özellikleri arasında hızlandırılmış, devam ettirilebilir yüklemeler (up2k protokolü aracılığıyla) bulunur, bu da güvenilir büyük dosya transferleri sağlar ve depolamayı optimize etmek için otomatik tekilleştirme yapar. Dahili medya dizinleyici ve küçük resim oluşturucu içeren web tabanlı bir dosya yöneticisi ile kullanıcıların klasörleri ve medyayı zahmetsizce düzenlemesine yardımcı olur. İnce taneli izin kontrolleri, belirli kullanıcı erişim kurallarına olanak tanır. "İndirirken yükle" özelliği paylaşım verimliliğini artırır ve sıfır bağımlılık tasarımı, neredeyse her donanımda çalışmasını sağlar.

      HTTP, WebDAV, FTP ve TFTP dahil olmak üzere birden fazla erişim protokolünü entegre eder, standart web tarayıcılarından, özel dosya istemcilerinden ve eski donanımlardan (PSP gibi) bağlantıları destekler. Uygulama, dağıtım için Docker ve Python'ı destekleyerek çeşitli sunucu ortamlarında kurulumu basitleştirir. Karmaşık yapılandırma olmadan yerel dosyalara sorunsuz erişimi kolaylaştırır. Topluluk belgeleri kullanılabilirliği artırır ve uygulamanın basit çalışması ve yüksek esnekliği modern bir yerel dosya hizmeti çözümü sunar.

      **Temel Özellikler:**
      - Gizlilik odaklı yerel dosya paylaşımı
      - Sıfır bağımlılıklı tek dosyalı mimari
      - Hızlandırılmış, devam ettirilebilir yüklemeler
      - Çok protokollü destek (HTTP, WebDAV, FTP, vb.)
      - Çapraz platform uyumluluğu
      - Medya dizinleme ve akış
      - Akıllı tekilleştirme
      - Kullanıcı izin yönetimi

      **Daha Fazla Bilgi Edinin:**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
    zh_CN: |
      **CopyParty** 是一款快速、注重隐私的文件共享服务器，采用本地优先、单文件架构，确保对数据拥有完全控制权，且不依赖云服务。其直观的界面支持离线使用，具备跨平台兼容性和多协议访问能力，提供安全、高效的文件管理体验，是寻求直接数据所有权和轻量级解决方案的用户的理想选择。

      该应用的核心功能包括加速可恢复上传（通过 up2k 协议），确保可靠的大文件传输，以及自动去重以优化存储。它通过一个基于网络的 文件管理器帮助用户轻松组织文件夹和媒体，该管理器内置媒体索引器和缩略图生成器，可实现快速预览。细粒度的权限控制允许设置特定的用户访问规则。“边下载边上传”功能提高了共享效率，零依赖设计确保它几乎可以在任何硬件上运行。

      它集成了多种访问协议，包括 HTTP、WebDAV、FTP 和 TFTP，支持来自标准网页浏览器、专用文件客户端和旧硬件（如 PSP）的连接。该应用支持 Docker 和 Python 部署，简化了各种服务器环境的设置。它无需复杂配置即可实现对本地文件的无缝访问。社区文档增强了可用性，该应用简单的操作和高度的灵活性提供了一个现代化的本地文件服务解决方案。

      **主要功能：**
      - 注重隐私的本地文件共享
      - 零依赖的单文件架构
      - 加速可恢复上传
      - 多协议支持（HTTP、WebDAV、FTP 等）
      - 跨平台兼容性
      - 媒体索引和流媒体
      - 智能去重
      - 用户权限管理

      **了解更多：**
      - [CopyParty GitHub Repository](https://github.com/9001/copyparty)
