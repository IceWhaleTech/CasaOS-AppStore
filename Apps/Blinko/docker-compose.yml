  blinko-postgres:
    image: postgres:14
    container_name: blinko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: JWD9bxUR7Um9PaGg7FQZ
      TZ: $TZ
    networks:
      - blinko-net
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/postgres_data
        target: /var/lib/postgresql/data
    deploy:
      resources:
        reservations:
          memory: 256m
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -U
        - postgres
        - -d
        - postgres
      interval: 5s
      timeout: 10s
      retries: 5
