services:
  blinko:
    image: blinkospace/blinko:1.8.7
    container_name: blinko
    restart: unless-stopped
    networks:
      - blinko-net
    depends_on:
      blinko-postgres:
        condition: service_healthy
    ports:
      - target: 1111
        published: "1111"
        protocol: tcp
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:1111
      NEXT_PUBLIC_BASE_URL: http://localhost:1111
      NEXTAUTH_SECRET: 22PhaGVvvBTEC5E5G+U+5O1xqdmuzZKzjLeDMvdvB7I=
      DATABASE_URL: postgresql://postgres:JWD9bxUR7Um9PaGg7FQZ@blinko-postgres:5432/postgres
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/blinko_data
        target: /app/.blinko
    logging:
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        reservations:
          memory: 512m
    x-casaos:
      envs:
        - container: NODE_ENV
