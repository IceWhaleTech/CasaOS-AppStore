    fr_FR: |-
      - v2.13.5 ajoute Vietnamese et Italian locales, ajoute Dutch et met a jour Polish, Russian, Slovak et Chinese translations.
      - Les web crashes lors de l'affichage de Custom Certificates et les translation text spacing issues ont ete corriges.
      - Inclut upgrade notifications, des ameliorations mobile UI/UX, des mises a jour certbot-azure-dns et des composants OpenResty, Certbot et s6-overlay rafraichis.
    de_DE: |-
      - v2.13.5 fuegt Vietnamese und Italian locales hinzu, ergaenzt Dutch und aktualisiert Polish, Russian, Slovak und Chinese translations.
      - Behoben wurden web crashes beim Anzeigen von Custom Certificates und translation text spacing issues.
      - Enthalten sind upgrade notifications, mobile UI/UX-Verbesserungen, certbot-azure-dns-Updates sowie aktualisierte OpenResty-, Certbot- und s6-overlay-Komponenten.
    sv_SE: |-
      - v2.13.5 lägger till vietnamesiska och italienska språk, med holländska tillagda och polska, ryska, slovakiska och kinesiska översättningar uppdaterade.
      - Korrigeringar inkluderar webbkrascher vid visning av anpassade certifikat och problem med översättningstextavstånd.
