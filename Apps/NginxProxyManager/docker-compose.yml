  release_notes:
    en_US: |-
      - v2.13.5 adds Vietnamese and Italian locales, with Dutch added and Polish, Russian, Slovak, and Chinese translations updated.
      - Fixes include web crashes when viewing Custom Certificates and translation text spacing issues.
      - Upgrade notifications, mobile UI/UX improvements, certbot-azure-dns updates, and refreshed OpenResty, Certbot, and s6-overlay components are included.
    en_GB: |-
      - v2.13.5 adds Vietnamese and Italian locales, with Dutch added and Polish, Russian, Slovak, and Chinese translations updated.
      - Fixes include web crashes when viewing Custom Certificates and translation text spacing issues.
      - Upgrade notifications, mobile UI/UX improvements, certbot-azure-dns updates, and refreshed OpenResty, Certbot, and s6-overlay components are included.
    it_IT: |-
      - v2.13.5 aggiunge le versioni locali vietnamita e italiana, con l'aggiunta dell'olandese e l'aggiornamento delle traduzioni polacca, russa, slovacca e cinese.
      - Le correzioni includono arresti anomali del Web durante la visualizzazione di certificati personalizzati e problemi di spaziatura del testo di traduzione.
      - Sono inclusi notifiche di aggiornamento, miglioramenti UI/UX mobili, aggiornamenti certbot-azure-dns e componenti OpenResty, Certbot e s6-overlay aggiornati.
    nb_NO: |-
      - v2.13.5 legger til vietnamesiske og italienske lokaliteter, med nederlandsk lagt til og polske, russiske, slovakiske og kinesiske oversettelser oppdatert.
      - Rettelser inkluderer nettkrasj ved visning av tilpassede sertifikater og problemer med oversettelse av tekstavstand.
      - Oppgraderingsvarsler, mobile UI/UX forbedringer, certbot-azure-dns oppdateringer og oppdaterte OpenResty, Certbot og s6-overlay komponenter er inkludert.
    zh_CN: |-
      - v2.13.5 增加了 Vietnamese 和 Italian locales，同时新增 Dutch，并更新 Polish、Russian、Slovak 和 Chinese translations。
      - 修复了查看 Custom Certificates 时 web crashes 和 translation text spacing issues。
      - 包含 upgrade notifications、mobile UI/UX 改进、certbot-azure-dns 更新，以及刷新的 OpenResty、Certbot 和 s6-overlay 组件。
    ja_JP: |-
      - v2.13.5 は Vietnamese と Italian locales を追加し、Dutch を追加、Polish、Russian、Slovak、Chinese translations を更新します。
      - Custom Certificates 表示時の web crashes と translation text spacing issues が修正されました。
