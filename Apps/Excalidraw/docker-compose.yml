    it_IT: |
      Excalidraw ГЁ una piattaforma lavagna virtuale in stile disegnato a mano che supporta canvas infinito e collaborazione crittografata end-to-end. Un'interfaccia intuitiva offre un'esperienza di disegno a mano, ideale per brainstorming, schizzi di design o scenari educativi, soddisfacendo diverse esigenze creative.

      Le caratteristiche principali includono una lavagna a canvas infinito e collaborazione crittografata end-to-end. Lo stile disegnato a mano con supporto libreria forme consente di creare grafici ricchi, potenziato dalle capacitГ  di inserimento immagini. La modalitГ  scura migliora l'esperienza utente, soddisfacendo utenti diversi.

      Fornisce opzioni di esportazione inclusi PNG, SVG e appunti per condivisione facile dei contenuti. Le capacitГ  di disegno coprono rettangolo, cerchio, diamante, freccia, linea, disegno libero ed eraser, con supporto binding-freccia e frecce etichettate.

      **Caratteristiche Principali:**
      - Lavagna canvas infinito supporta stile disegnato a mano
      - Supporto libreria forme per creare grafici ricchi
      - CapacitГ  inserimento immagini
      - ModalitГ  scura
      - Esportazione in PNG, SVG e appunti
      - Formato aperto - esporta disegni come file json `.excalidraw`
      - Ampia gamma strumenti - rettangolo, cerchio, diamante, freccia, linea, disegno libero, eraser...
      - Binding frecce e frecce etichettate
      - Annulla e ripeti
      - Supporto zoom e panoramica

      **Scopri di PiГ№:**
      - [Sito Ufficiale Excalidraw](https://excalidraw.com/)
      - [Excalidraw GitHub](https://github.com/excalidraw/excalidraw)
    nb_NO: |
      Excalidraw er en virtuell hГҘndtegnet stil whiteboard-plattform som stГёtter uendelig lerret og ende-til-ende kryptert samarbeid. Et intuitivt grensesnitt tilbyr hГҘndtegnet opplevelse, ideelt for brainstorming, designskisser eller utdanningsscenarier, som mГёter mangfoldige kreative behov.

      Kjernefunksjoner inkluderer uendelig lerret whiteboard og ende-til-ende kryptert samarbeid. HГҘndtegnet stil med formbibliotek stГёtte tillater ГҘ lage rik grafikk, forsterket av bildeinnsetningskapasiteter. MГёrk modus forbedrer brukeropplevelse, imГёtekomme mangfoldige brukere.

      Det gir eksportalternativer inkludert PNG, SVG og utklippstavle for enkel innholdsdeling. Tegnefunksjoner dekker rektangel, sirkel, diamant, pil, linje, fritegning og viskelГҰr, med pilbinding og merkede pil stГёtte.

      **Hovedfunksjoner:**
      - Uendelig lerret whiteboard stГёtter hГҘndtegnet stil
      - Formbibliotek stГёtte for ГҘ lage rik grafikk
      - Bildeinnsetningskapasitet
      - MГёrk modus
      - Eksporter til PNG, SVG og utklippstavle
      - Г…pent format - eksporter tegninger som `.excalidraw` json fil
      - Bredt spekter av verktГёy - rektangel, sirkel, diamant, pil, linje, fritegning, viskelГҰr...
      - Pilbinding og merkede piler
      - Angre og gjГёr om
      - Zoom og panorering stГёtte

      **LГҰr Mer:**
      - [Excalidraw Offisielle Nettside](https://excalidraw.com/)
      - [Excalidraw GitHub](https://github.com/excalidraw/excalidraw)
