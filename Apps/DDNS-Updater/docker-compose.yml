name: ddns-updater
services:
  ddns-updater:
    image: qmcgaw/ddns-updater:v2.9.0
    network_mode: bridge
    command:
      - touch /data/config.json
    container_name: ddns-updater
    deploy:
      resources:
        limits:
          memory: 32M
    environment:
      - BACKUP_DIRECTORY=/updater/data
      - BACKUP_PERIOD=0
      - CONFIG=
      - HTTP_TIMEOUT=10s
      - LISTENING_ADDRESS=:8000
      - LOG_CALLER=hidden
      - LOG_LEVEL=info
      - PERIOD=5m
      - PUBLICIP_DNS_PROVIDERS=all
      - PUBLICIP_DNS_TIMEOUT=3s
      - PUBLICIP_FETCHERS=all
      - PUBLICIP_HTTP_PROVIDERS=all
      - PUBLICIPV4_HTTP_PROVIDERS=all
      - PUBLICIPV6_HTTP_PROVIDERS=all
      - ROOT_URL=/
      - SHOUTRRR_ADDRESSES=
      - UPDATE_COOLDOWN_PERIOD=5m
    hostname: ddns-updater
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /updater/data
    x-casaos:
      ports:
        - container: "8000"
          description:
            en_us: WebUI HTTP Port
      volumes:
        - container: /updater/data
          description:
            en_us: ddns-updater config directory.
      envs:
        - container: "BACKUP_DIRECTORY"
          description:
            en_US: Environment variable BACKUP_DIRECTORY
            zh_CN: 环境变量 BACKUP_DIRECTORY
        - container: "BACKUP_PERIOD"
          description:
            en_US: Environment variable BACKUP_PERIOD
            zh_CN: 环境变量 BACKUP_PERIOD
        - container: "CONFIG"
          description:
            en_US: Environment variable CONFIG
            zh_CN: 环境变量 CONFIG
        - container: "HTTP_TIMEOUT"
          description:
            en_US: Environment variable HTTP_TIMEOUT
            zh_CN: 环境变量 HTTP_TIMEOUT
        - container: "LISTENING_ADDRESS"
          description:
            en_US: Environment variable LISTENING_ADDRESS
            zh_CN: 环境变量 LISTENING_ADDRESS
        - container: "LOG_CALLER"
          description:
            en_US: Environment variable LOG_CALLER
            zh_CN: 环境变量 LOG_CALLER
        - container: "LOG_LEVEL"
          description:
            en_US: Environment variable LOG_LEVEL
            zh_CN: 环境变量 LOG_LEVEL
        - container: "PERIOD"
          description:
            en_US: Environment variable PERIOD
            zh_CN: 环境变量 PERIOD
        - container: "PUBLICIPV4_HTTP_PROVIDERS"
          description:
            en_US: Environment variable PUBLICIPV4_HTTP_PROVIDERS
            zh_CN: 环境变量 PUBLICIPV4_HTTP_PROVIDERS
        - container: "PUBLICIPV6_HTTP_PROVIDERS"
          description:
            en_US: Environment variable PUBLICIPV6_HTTP_PROVIDERS
            zh_CN: 环境变量 PUBLICIPV6_HTTP_PROVIDERS
        - container: "PUBLICIP_DNS_PROVIDERS"
          description:
            en_US: Environment variable PUBLICIP_DNS_PROVIDERS
            zh_CN: 环境变量 PUBLICIP_DNS_PROVIDERS
        - container: "PUBLICIP_DNS_TIMEOUT"
          description:
            en_US: Environment variable PUBLICIP_DNS_TIMEOUT
            zh_CN: 环境变量 PUBLICIP_DNS_TIMEOUT
        - container: "PUBLICIP_FETCHERS"
          description:
            en_US: Environment variable PUBLICIP_FETCHERS
            zh_CN: 环境变量 PUBLICIP_FETCHERS
        - container: "PUBLICIP_HTTP_PROVIDERS"
          description:
            en_US: Environment variable PUBLICIP_HTTP_PROVIDERS
            zh_CN: 环境变量 PUBLICIP_HTTP_PROVIDERS
        - container: "ROOT_URL"
          description:
            en_US: Environment variable ROOT_URL
            zh_CN: 环境变量 ROOT_URL
        - container: "SHOUTRRR_ADDRESSES"
          description:
            en_US: Environment variable SHOUTRRR_ADDRESSES
