name: ddns-updater
services:
  ddns-updater:
    image: qmcgaw/ddns-updater:v2.9.0
    network_mode: bridge
    command:
      - touch /data/config.json
    container_name: ddns-updater
    deploy:
      resources:
        limits:
          memory: 32M
    environment:
      - BACKUP_DIRECTORY=/updater/data
      - BACKUP_PERIOD=0
      - CONFIG=
      - HTTP_TIMEOUT=10s
      - LISTENING_ADDRESS=:8000
      - LOG_CALLER=hidden
      - LOG_LEVEL=info
      - PERIOD=5m
      - PUBLICIP_DNS_PROVIDERS=all
      - PUBLICIP_DNS_TIMEOUT=3s
      - PUBLICIP_FETCHERS=all
      - PUBLICIP_HTTP_PROVIDERS=all
      - PUBLICIPV4_HTTP_PROVIDERS=all
      - PUBLICIPV6_HTTP_PROVIDERS=all
      - ROOT_URL=/
      - SHOUTRRR_ADDRESSES=
      - UPDATE_COOLDOWN_PERIOD=5m
    hostname: ddns-updater
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /updater/data
    x-casaos:
      ports:
        - container: "8000"
          description:
            en_us: WebUI HTTP Port
      volumes:
        - container: /updater/data
          description:
            en_us: ddns-updater config directory.
x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  author: rstuhlmuller
  category: Network
  description:
    en_us: Program to keep DNS A and/or AAAA records updated for multiple DNS providers
  developer: qmcgaw
  screenshot:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/DDNS-Updater/screenshot-1.png
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/DDNS-Updater/icon.png
  main: ddns-updater
  port_map: "8000"
  scheme: http
  tagline:
    en_us: Simple and easy to use DDNS
    zh_cn: 简单好用的DDNS
  title:
    en_us: ddns-updater
  version: "v2.9.0"
  updateAt: "2024-12-24"
  releaseNotes:
    en_US: |-
      - v2.9.0 adds provider support for domene.shop, loopia.se, vultr.com, myaddr.tools, and namesilo.com.
      - Health server configuration can run outside Docker or be disabled in containers.
      - Fixes include multi-address public IP handling, IPv6 hostname resolution, Porkbun, Gandi, DonDominio, Netcup, GCP, file permissions, NoIP response parsing, real IP logging, and response trimming.
    zh_CN: |-
      - v2.9.0 增加了 domene.shop、loopia.se、vultr.com、myaddr.tools 和 namesilo.com provider 支持。
      - Health server 配置可以在 Docker 外运行，也可以在容器中禁用。
      - 修复内容包括多地址 public IP、IPv6 hostname resolution、Porkbun、Gandi、DonDominio、Netcup、GCP、文件权限、NoIP response parsing、real IP logging 和 response trimming。
    de_DE: |-
      - v2.9.0 ergaenzt Provider-Support fuer domene.shop, loopia.se, vultr.com, myaddr.tools und namesilo.com.
      - Die Health-server-Konfiguration kann ausserhalb von Docker laufen oder in Containern deaktiviert werden.
      - Korrekturen betreffen Multi-Address public IP, IPv6 hostname resolution, Porkbun, Gandi, DonDominio, Netcup, GCP, Dateiberechtigungen, NoIP response parsing, real IP logging und response trimming.
    fr_FR: |-
      - v2.9.0 ajoute la prise en charge des providers domene.shop, loopia.se, vultr.com, myaddr.tools et namesilo.com.
      - La configuration Health server peut s'executer hors Docker ou etre desactivee dans les conteneurs.
      - Les correctifs couvrent multi-address public IP, IPv6 hostname resolution, Porkbun, Gandi, DonDominio, Netcup, GCP, permissions de fichiers, NoIP response parsing, real IP logging et response trimming.
    ja_JP: |-
      - v2.9.0 は domene.shop、loopia.se、vultr.com、myaddr.tools、namesilo.com の provider 対応を追加します。
      - Health server 設定は Docker 外で実行でき、コンテナ内では無効化できます。
      - multi-address public IP、IPv6 hostname resolution、Porkbun、Gandi、DonDominio、Netcup、GCP、ファイル権限、NoIP response parsing、real IP logging、response trimming が修正されました。
    ko_KR: |-
      - v2.9.0은 domene.shop, loopia.se, vultr.com, myaddr.tools, namesilo.com provider 지원을 추가합니다.
      - Health server 구성은 Docker 밖에서 실행하거나 컨테이너에서 비활성화할 수 있습니다.
      - multi-address public IP, IPv6 hostname resolution, Porkbun, Gandi, DonDominio, Netcup, GCP, 파일 권한, NoIP response parsing, real IP logging, response trimming이 수정되었습니다.
  website: ""
  repo: "https://github.com/qdm12/ddns-updater"
  support: "https://github.com/qdm12/ddns-updater/issues"
  docs: "https://github.com/qdm12/ddns-updater/tree/master/docs"
