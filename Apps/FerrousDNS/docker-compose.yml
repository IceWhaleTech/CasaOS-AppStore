  tips:
    before_install:
      en_US: |
        Ferrous DNS uses host networking so it can bind DNS on port 53 and discover devices via mDNS.
        Make sure ports 53 (TCP/UDP) and 8080 are free on the host — stop any other DNS server (e.g. systemd-resolved) using port 53 first.
        Open the dashboard at http://<host-ip>:8080 and complete the first-run setup wizard to set your admin password, then point your router's DNS at this server.
      en_GB: |
        Ferrous DNS uses host networking so it can bind DNS on port 53 and discover devices via mDNS.
        Make sure ports 53 (TCP/UDP) and 8080 are free on the host — stop any other DNS server (e.g. systemd-resolved) using port 53 first.
        Open the dashboard at http://<host-ip>:8080 and complete the first-run setup wizard to set your admin password, then point your router's DNS at this server.
      zh_CN: |
        Ferrous DNS 使用主机网络模式，以便绑定 53 端口并通过 mDNS 发现设备。
        请确保主机上的 53 端口（TCP/UDP）和 8080 端口空闲——先停止占用 53 端口的其他 DNS 服务（如 systemd-resolved）。
        在 http://<主机IP>:8080 打开管理面板，完成首次运行的设置向导以设定管理员密码，然后将路由器的 DNS 指向本服务器。
      pt_PT: |
        O Ferrous DNS usa rede em modo host para poder ligar o DNS à porta 53 e descobrir dispositivos por mDNS.
        Garanta que as portas 53 (TCP/UDP) e 8080 estão livres no anfitrião — pare primeiro qualquer outro servidor DNS (por exemplo, systemd-resolved) que use a porta 53.
        Abra o painel em http://<ip-do-anfitriao>:8080 e conclua o assistente de configuração inicial para definir a palavra-passe de administrador, depois aponte o DNS do seu router para este servidor.
      pt_BR: |
        O Ferrous DNS usa rede em modo host para conseguir vincular o DNS à porta 53 e descobrir dispositivos via mDNS.
        Garanta que as portas 53 (TCP/UDP) e 8080 estejam livres no host — pare primeiro qualquer outro servidor DNS (por exemplo, systemd-resolved) que use a porta 53.
        Abra o painel em http://<ip-do-host>:8080 e conclua o assistente de configuração inicial para definir a senha de administrador, depois aponte o DNS do seu roteador para este servidor.
