name: ferrous-dns
services:
  ferrous-dns:
    image: ferrousnetworking/ferrous-dns:0.9.6
    container_name: ferrous-dns
    deploy:
      resources:
        reservations:
          memory: 128M
    restart: unless-stopped
    # Host networking is required: DNS listens on UDP/TCP 53 and mDNS/Bonjour
    # discovery uses multicast on UDP 5353, which does not traverse Docker bridge
    # port mapping. The web dashboard binds directly on the host at port 8080.
    network_mode: host
    # Run as root so the bootstrap entrypoint can write config, database, and
    # migrations into the /DATA/AppData bind mount (created root-owned by CasaOS),
    # and bind privileged port 53. NET_BIND_SERVICE is kept in the bounding set
    # for hosts/orchestrators that strip Docker's default capability profile.
    user: "0:0"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /data
    environment:
      FERROUS_CONFIG: /data/config/ferrous-dns.toml
      FERROUS_DNS_PORT: "53"
      FERROUS_WEB_PORT: "8080"
      FERROUS_BIND_ADDRESS: 0.0.0.0
      FERROUS_DATABASE: /data/db/ferrous.db
      FERROUS_LOG_LEVEL: info
      TZ: $TZ
    healthcheck:
      test: ["CMD", "/usr/local/bin/ferrous-dns", "--version"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 60
    x-casaos:
      envs:
        - container: FERROUS_WEB_PORT
          description:
            en_US: Web dashboard port
            en_GB: Web dashboard port
            it_IT: Porta della dashboard web
            nb_NO: Port for nettdashbordet
            zh_CN: Web 管理面板端口
            ja_JP: Web ダッシュボードのポート
            ko_KR: 웹 대시보드 포트
            fr_FR: Port du tableau de bord web
            de_DE: Port des Web-Dashboards
            sv_SE: Port för webbpanelen
            el_GR: Θύρα του web dashboard
            hr_HR: Priključak web nadzorne ploče
            pt_PT: Porta do painel web
            pt_BR: Porta do painel web
            ru_RU: Порт веб-панели
            tr_TR: Web panosu bağlantı noktası
