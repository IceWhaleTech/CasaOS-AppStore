    ja_JP: ネットワーク全体の広告ブロックを備えた高性能 DNS サーバー
    ko_KR: 네트워크 전체 광고 차단 기능을 갖춘 고성능 DNS 서버
    fr_FR: Serveur DNS haute performance avec blocage des publicités sur tout le réseau
    de_DE: Hochleistungs-DNS-Server mit netzwerkweitem Werbeblocker
    sv_SE: Högpresterande DNS-server med nätverksomfattande annonsblockering
    el_GR: Διακομιστής DNS υψηλών επιδόσεων με φραγή διαφημίσεων σε όλο το δίκτυο
    hr_HR: DNS poslužitelj visokih performansi s blokiranjem oglasa na cijeloj mreži
    pt_PT: Servidor DNS de alto desempenho com bloqueio de anúncios em toda a rede
    pt_BR: Servidor DNS de alto desempenho com bloqueio de anúncios em toda a rede
    ru_RU: Высокопроизводительный DNS-сервер с блокировкой рекламы на уровне всей сети
