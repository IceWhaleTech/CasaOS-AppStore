    en_US: Self-hosted control plane for AI agents
  description:
    en_US: |-
      Nora is an open-source control plane for deploying, monitoring, and operating OpenClaw and Hermes AI agents on infrastructure you control. It combines operator, admin, and public web interfaces with an Express API, PostgreSQL, Redis, and dedicated provisioning and backup workers.

      This package installs the complete nine-service Nora v1.15.0 control plane from immutable amd64 image digests. Cryptographic keys and the database password are generated automatically on first boot and persisted under the app data directory.
  author: Nora
  developer: Nora
  category: AI
  architectures:
    - amd64
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nora/thumbnail.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nora/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nora/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Nora/screenshot-3.png
  tips:
    before_install:
      en_US: |-
        Security and capacity notice:

        - Nora is amd64-only in this AppStore release and runs nine services before any agent containers. Use at least 4 GB RAM and allow additional capacity for each agent.
        - Install only one Nora control plane per Docker host. Nora allocates agent gateway ports from 19000-19999, so that entire host-port range must remain available.
        - The backend API, provisioner, and backup worker mount `/var/run/docker.sock`. Docker-socket access is effectively root-equivalent on the host and is required for Nora to create, inspect, stop, back up, and restore agent containers. Install only on a trusted machine and limit access to Nora's web UI.
        - First boot generates JWT, encryption, backup-encryption, API-key hashing, and database secrets in `/DATA/AppData/$AppID/secrets/nora.env`. Protect and back up that directory together with `/DATA/AppData/$AppID/postgres`; losing or rotating the keys can invalidate sessions and make encrypted credentials or backups unreadable.
        - The Web UI uses plain HTTP on port 8080 by default. Keep it on a trusted LAN or place it behind an HTTPS reverse proxy before remote exposure.
        - The first account created at `/signup` claims the platform administrator role. Deploying the first OpenClaw agent builds a pinned runtime image locally and can take several minutes.
  version: "1.15.0"
  update_at: "2026-07-07"
  release_notes:
    en_US: |-
      - Pins all six Nora control-plane images to the published v1.15.0 amd64 manifests.
      - Includes durable OpenClaw channel state and Docker durability hardening from Nora v1.15.0.
      - Pins the provisioned OpenClaw package to 2026.6.11 and Hermes agent image to v2026.6.5.
      - Generates persistent cryptographic secrets automatically and exposes only the Nginx web entry port.
