  updateAt: "2023-08-28"
  releaseNotes:
    en_US: |-
      - 4.0.4 is a bugfix-only release for the 4.0.x series.
      - Fixes include torrent metadata sent to peers, filename collision handling, locale-based statistic rounding, tracker announce keys, LPD announce ports, tracker URL editing, and listening-interface announces.
      - Qt, GTK, Web, CLI, and remote clients received UI, display, crash, and command fixes.
    en_GB: |-
      - 4.0.4 is a bugfix-only release for the 4.0.x series.
      - Fixes include torrent metadata sent to peers, filename collision handling, locale-based statistic rounding, tracker announce keys, LPD announce ports, tracker URL editing, and listening-interface announces.
      - Qt, GTK, Web, CLI, and remote clients received UI, display, crash, and command fixes.
    it_IT: |-
      - 4.0.4 è una versione bugfix-only per la serie 4.0.x.
      - Le correzioni includono metadati torrent inviati ai peer, gestione delle collisioni dei nomi di file, arrotondamento delle statistiche locale-based, chiavi di annuncio del tracker, porte di annuncio LPD, modifica del tracker URL e annunci listening-interface.
      - Qt, GTK, Web, CLI e i client remoti hanno ricevuto UI, correzioni di display, arresti anomali e comandi.
    nb_NO: |-
      - 4.0.4 er en bugfix-only-utgivelse for 4.0.x-serien.
      - Rettelser inkluderer torrent-metadata sendt til jevnaldrende, håndtering av filnavnkollisjoner, locale-based-statistikkavrunding, sporingsannonseringsnøkler, LPD-kunngjøringsporter, sporings-URL-redigering og listening-interface-kunngjøringer.
      - Qt, GTK, Web, CLI og eksterne klienter mottok UI, skjerm, krasj og kommandoer.
    zh_CN: |-
      - 4.0.4 是 4.0.x 系列的纯错误修复版本。
      - 修复内容包括发送给 peer 的 torrent 元数据、文件名冲突处理、基于 locale 的统计舍入、tracker announce keys、LPD announce 端口、tracker URL 编辑，以及监听接口 announce。
      - Qt、GTK、Web、CLI 和 remote 客户端获得了 UI、显示、崩溃和命令修复。
    ja_JP: |-
      - 4.0.4 は 4.0.x 系列のバグ修正のみのリリースです。
      - 修正には、peer に送信される torrent メタデータ、ファイル名衝突処理、ロケールベースの統計丸め、tracker announce keys、LPD announce ポート、tracker URL 編集、リスニングインターフェイス announce が含まれます。
      - Qt、GTK、Web、CLI、remote クライアントには UI、表示、クラッシュ、コマンドの修正が入りました。
    ko_KR: |-
      - 4.0.4는 4.0.x 시리즈의 버그 수정 전용 릴리스입니다.
      - 수정 사항에는 peer로 전송되는 torrent 메타데이터, 파일 이름 충돌 처리, locale 기반 통계 반올림, tracker announce keys, LPD announce 포트, tracker URL 편집, listening-interface announce가 포함됩니다.
      - Qt, GTK, Web, CLI, remote 클라이언트에는 UI, 표시, 충돌, 명령 수정이 적용되었습니다.
    fr_FR: |-
