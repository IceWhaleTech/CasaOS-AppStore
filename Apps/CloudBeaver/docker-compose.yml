version: "3.7"
name: cloudbeaver
services:
  cloudbeaver:
    container_name: cloudbeaver
    deploy:
      resources:
        reservations:
          memory: 256M
    image: dbeaver/cloudbeaver:25.2.5
    ports:
      - target: 8978
        published: "8978"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/workspace
        target: /opt/cloudbeaver/workspace
    network_mode: bridge
    privileged: false
    x-casaos:
      ports:
        - container: "8978"
          description:
            en_us: WebUI HTTP Port
            pt_br: Porta da WebUI
            zh_cn: WebUI HTTP端口
          protocol: tcp
      volumes:
        - container: /opt/cloudbeaver/workspace
          description:
            en_us: Workspace directory.
            pt_br: Diretório do workspace
            zh_cn: 工作目录

x-casaos:
  architectures:
    - amd64
    - arm64
  main: cloudbeaver
  author: joaobosconff
  category: Developer
  description:
    en_us: CloudBeaver is a web-based database GUI tool which provides rich web interface. You can use it to manage PostgreSQL, MySQL, MariaDB, SQL Server, Oracle, DB2, Firebird, H2, Trino.
    pt_br: CloudBeaver é uma ferramenta GUI de banco de dados baseada na web que oferece uma interface web abrangente. Você pode usá-lo para gerenciar PostgreSQL, MySQL, MariaDB, SQL Server, Oracle, DB2, Firebird, H2 e Trino.
    zh_cn: CloudBeaver是一个基于Web的数据库GUI工具，提供丰富的Web界面。您可以使用它来管理PostgreSQL、MySQL、MariaDB、SQL Server、Oracle、DB2、Firebird、H2和Trino。
  developer: dbeaver
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/icon.png
  screenshot_link:
  - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-1.png
  - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-2.png
  - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-3.png
  tagline:
    en_us: Cloud Database Manager.
    pt_br: Administrador de Banco de Dados na Nuvem.
    zh_cn: 云数据库管理器。
  title:
    en_us: CloudBeaver
    pt_br: CloudBeaver
  index: /
  port_map: "8978"
  version: "25.2.5"
  updateAt: "2025-11-12"
  releaseNotes:
    en_US: |-
      - The configured 25.2.5 image tag has no matching GitHub Release object in dbeaver/cloudbeaver.
      - Keep this entry tied to the CloudBeaver 25.2 image line until upstream publishes per-tag release notes.
    zh_CN: |-
      - 当前配置的 25.2.5 镜像标签在 dbeaver/cloudbeaver 中没有匹配的 GitHub Release 对象。
      - 在上游发布按标签对应的 release notes 之前，保持该条目跟随 CloudBeaver 25.2 镜像线。
    de_DE: |-
      - Der konfigurierte Image-Tag 25.2.5 hat kein passendes GitHub-Release-Objekt in dbeaver/cloudbeaver.
      - Dieser Eintrag bleibt an die CloudBeaver-25.2-Image-Reihe gebunden, bis Upstream tagbezogene Release Notes veröffentlicht.
    fr_FR: |-
      - Le tag d'image configuré 25.2.5 n'a pas d'objet GitHub Release correspondant dans dbeaver/cloudbeaver.
      - Cette entrée reste liée à la ligne d'image CloudBeaver 25.2 jusqu'à ce que l'amont publie des notes de version par tag.
    ja_JP: |-
      - 設定されている 25.2.5 イメージタグには、dbeaver/cloudbeaver 内で対応する GitHub Release オブジェクトがありません。
      - 上流がタグ単位の release notes を公開するまで、このエントリは CloudBeaver 25.2 イメージ系統に紐づけます。
    ko_KR: |-
      - 구성된 25.2.5 이미지 태그는 dbeaver/cloudbeaver에서 일치하는 GitHub Release 객체가 없습니다.
      - 업스트림이 태그별 release notes를 게시할 때까지 이 항목은 CloudBeaver 25.2 이미지 라인을 따릅니다.
  website: "https://dbeaver.com/download/cloudbeaver/"
  repo: "https://github.com/dbeaver/cloudbeaver"
  support: "https://github.com/dbeaver/cloudbeaver/issues"
  docs: "https://dbeaver.com/docs/cloudbeaver/"
