      - Keep this entry tied to the CloudBeaver 25.2 image line until upstream publishes per-tag release notes.
    en_GB: |-
      - The configured 25.2.5 image tag has no matching GitHub Release object in dbeaver/cloudbeaver.
      - Keep this entry tied to the CloudBeaver 25.2 image line until upstream publishes per-tag release notes.
