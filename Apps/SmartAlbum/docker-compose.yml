      智能相册是一款照片与视频管理平台。
      将您的照片保存在自己的家庭服务器上，通过网页，您可以：
      - 按时间浏览全部照片与视频
      - 上传到服务器长期保存
      - 用相册整理、用搜索快速找到某张照片
      - 与家人共享相册或生成对外分享链接
  screenshot_link:
