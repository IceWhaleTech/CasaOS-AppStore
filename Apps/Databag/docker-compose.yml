name: databag
services:
  databag:
    image: balzack/databag:0.1.18
    restart: unless-stopped
    x-casaos:
      volumes:
        - container: /var/lib/databag
          description:
            en_US: database and asset store
            zh_CN: 数据库和资源存储
      ports:
        - container: '7000'
          description:
            en_US: rest api port
            zh_CN: REST API端口
    ports:
      - target: 7000
        published: 7000
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/databag/data
        target: /var/lib/databag
    container_name: databag
x-casaos:
  app_id: org.icewhale.databag
  architectures:
    - amd64
    - arm64
  main: databag
  description:
    en_US: Databag is a federated chat app for self-hosting that focuses on user privacy and security; the service includes clients for iOS, Android, and browser.
    zh_CN: Databag是一个自托管的联邦聊天应用，专注于用户隐私和安全；该服务包括iOS、Android和浏览器的客户端。
  tagline:
    en_US: Messenger for the Decentralized Web
    zh_CN: 分布式网络的通讯应用
  developer: balzack
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/icon.svg
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/screenshot-2.png
  author: Pierre Balzack
  category: Social
  title:
    en_US: Databag
  port_map: "7000"
  version: "0.1.18"
  update_at: "2025-10-15"
  release_notes: ""
  website: ""
  repo: "https://github.com/balzack/databag"
  support: "https://github.com/balzack/databag/discussions"
  docs: "https://github.com/balzack/databag/tree/main/doc"
