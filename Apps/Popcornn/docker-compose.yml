# CasaOS App Store - Popcornn
# Volumes use /DATA/AppData/$AppID/ (CasaOS injects $AppID at install).
name: popcornn
services:
  client:
    container_name: popcornn-client
    depends_on:
      server:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: 1073741824
        reservations:
          memory: "268435456"
    environment:
      BACKEND_URL: http://server:3000
      HOST: 0.0.0.0
      NODE_ENV: production
      PGID: $PGID
      PORT: 80
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-}
      PUBLIC_CLIENT_URL: ${PUBLIC_CLIENT_URL:-http://localhost:4325}
      PUID: $PUID
      TZ: $TZ
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4321/ || exit 1"]
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 1m0s
    image: bobdivx/popcorn-frontend:latest
    networks:
      - popcornn-network
    ports:
      - target: 80
        published: "4325"
        protocol: tcp
    restart: unless-stopped
  server:
    container_name: popcornn-server
    deploy:
      resources:
        limits:
          memory: 2147483648
        reservations:
          memory: "536870912"
    environment:
      API_PASSWORD: popcorn_password_secure
      API_USERNAME: admin
      DOWNLOAD_DIR: /app/downloads
      LOG_LEVEL: info
      PGID: $PGID
      PUID: $PUID
      RUST_LOG: info
      RUN_AS_ROOT: ${RUN_AS_ROOT:-1}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      TZ: $TZ
      TX_ALT: ${TX_ALT:-0}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/client/health || exit 1"]
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 1m0s
    image: bobdivx/popcorn-backend:latest
    networks:
      - popcornn-network
    ports:
      - target: 3000
        published: "3000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/.data
      - type: bind
        source: /DATA/AppData/$AppID/downloads
        target: /app/downloads
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: popcornn-flaresolverr
    restart: unless-stopped
    networks:
      - popcornn-network
    ports:
      - target: 9191
        published: "9191"
        protocol: tcp
    deploy:
      resources:
        limits:
          memory: 1073741824
        reservations:
          memory: 268435456
networks:
  popcornn-network:
    name: popcornn-network
x-casaos:
  architectures:
    - amd64
    - arm64
  main: client
  author: Popcornn Team
  category: Media
  description:
    en_US: |
      Popcornn is a self-hosted BitTorrent manager with a modern web interface.
      Search and download torrents, manage your library, stream with built-in HLS transcoding.
      Backend (Rust) + frontend in one stack. Optional FlareSolverr for Cloudflare-protected indexers.
  developer: Popcornn Team
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Popcornn/icon.png
  tagline:
    en_US: Self-hosted BitTorrent manager with streaming and HLS transcoding
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Popcornn/icon.png
  tips: {}
  title:
    en_us: Popcornn
  index: /
  port_map: "4325"
  envs:
    - container: PUBLIC_BACKEND_URL
      description:
        en_us: "Backend URL as seen by the browser (e.g. http://your-nas:3000). Leave empty if same host."
        fr_fr: "URL du backend telle que vue par le navigateur (ex. http://votre-nas:3000). Laisser vide si même hôte."
    - container: TZ
      description:
        en_us: TimeZone
        fr_fr: Fuseau horaire
    - container: PUID
      description:
        en_us: Run as user ID
        fr_fr: Exécuter avec cet ID utilisateur
    - container: PGID
      description:
        en_us: Run as group ID
        fr_fr: Exécuter avec cet ID groupe
    - container: RUN_AS_ROOT
      description:
        en_us: "1 = run server as root (recommended on ZimaOS/CasaOS). 0 = run as PUID:PGID."
        fr_fr: "1 = lancer le serveur en root (recommandé sur ZimaOS/CasaOS). 0 = lancer avec PUID:PGID."
