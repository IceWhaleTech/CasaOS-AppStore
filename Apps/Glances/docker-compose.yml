    fr_FR: |-
      - v4.4.1 renvoie au changelog officiel complet de v4.4.0 à v4.4.1.
    ja_JP: |-
      - v4.4.1 は v4.4.0 から v4.4.1 までの公式完全 changelog を参照します。
    ko_KR: |-
      - v4.4.1은 v4.4.0부터 v4.4.1까지의 공식 전체 변경 로그를 가리킵니다.
  website: "https://nicolargo.github.io/glances/"
