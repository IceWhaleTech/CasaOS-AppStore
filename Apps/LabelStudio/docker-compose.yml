name: label-studio
services:
  label-studio:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: heartexlabs/label-studio:1.9.2
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
      - target: 8080
        published: "3080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /label-studio/data
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: "timezone"
            zh_cn: "时区"
      ports:
        - container: "3080"
          description:
            en_us: WebUI HTTP Port
            zh_cn: WebUI HTTP 端口
x-casaos:
  architectures:
    - amd64
    - arm64
  main: label-studio
  author: CorrectRoadH
  category: AI
  description:
    en_us: Label Studio is an open source data labeling tool. It lets you label data types like audio, text, images, videos, and time series with a simple and straightforward UI and export to various model formats. It can be used to prepare raw data or improve existing training data to get more accurate ML models.
    zh_cn: Label Studio 是一个开源数据标记工具。 它允许您使用简单直观的 UI 来标记音频、文本、图像、视频和时间序列等数据类型，并导出为各种模型格式。 它可用于准备原始数据或改进现有训练数据以获得更准确的机器学习模型。
  developer: Yidadaa
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LabelStudio/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LabelStudio/screenshot-1.jpg
  tagline:
    en_us: Label Studio is an open source data labeling tool. It lets you label data types like audio, text, images, videos, and time series with a simple and straightforward UI and export to various model formats. It can be used to prepare raw data or improve existing training data to get more accurate ML models.
    zh_cn: Label Studio 是一个开源数据标记工具。 它允许您使用简单直观的 UI 来标记音频、文本、图像、视频和时间序列等数据类型，并导出为各种模型格式。 它可用于准备原始数据或改进现有训练数据以获得更准确的机器学习模型。
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LabelStudio/thumbnail.jpg
  tips: {}
  title:
    en_us: Label Studio   
  port_map: "3080"
  version: "1.9.2"
  updateAt: "2023-11-07"
  releaseNotes:
    en_US: |-
      - 1.9.2 adds a legacy Taxonomy parameter and support for AWS Signature Version 4 query parameters.
      - VERIFY_SSL_CERTS now defaults to true for deployment-wide HTTPS certificate verification.
      - Security fixes address XSS issues and an SSRF DNS rebinding issue.
    en_GB: |-
      - 1.9.2 adds a legacy Taxonomy parameter and support for AWS Signature Version 4 query parameters.
      - VERIFY_SSL_CERTS now defaults to true for deployment-wide HTTPS certificate verification.
      - Security fixes address XSS issues and an SSRF DNS rebinding issue.
    it_IT: |-
      - 1.9.2 aggiunge un parametro di tassonomia legacy e il supporto per i parametri di query AWS Signature Version 4.
      - VERIFY_SSL_CERTS ora è impostato su true per la verifica del certificato deployment-wide HTTPS.
      - Le correzioni di sicurezza risolvono i problemi di XSS e un problema di riassociazione di SSRF DNS.
    nb_NO: |-
      - 1.9.2 legger til en eldre Taxonomy-parameter og støtte for AWS Signature Versjon 4-spørringsparametere.
      - VERIFY_SSL_CERTS er nå satt til sann for deployment-wide HTTPS sertifikatverifisering.
      - Sikkerhetsrettinger løser XSS-problemer og et SSRF DNS-rebindingsproblem.
    zh_CN: |-
      - 1.9.2 增加了 legacy Taxonomy parameter，并支持 AWS Signature Version 4 query parameters。
      - VERIFY_SSL_CERTS 现在默认为 true，用于部署级 HTTPS certificate verification。
      - 安全修复解决了 XSS 问题和 SSRF DNS rebinding 问题。
    ja_JP: |-
      - 1.9.2 は legacy Taxonomy parameter と AWS Signature Version 4 query parameters のサポートを追加します。
      - VERIFY_SSL_CERTS はデプロイ全体の HTTPS certificate verification 向けにデフォルトで true になりました。
      - セキュリティ修正では XSS 問題と SSRF DNS rebinding 問題に対応しています。
    ko_KR: |-
      - 1.9.2는 legacy Taxonomy parameter와 AWS Signature Version 4 query parameters 지원을 추가합니다.
      - VERIFY_SSL_CERTS는 이제 배포 전체 HTTPS certificate verification을 위해 기본값이 true입니다.
      - 보안 수정은 XSS 문제와 SSRF DNS rebinding 문제를 해결합니다.
    fr_FR: |-
      - 1.9.2 ajoute un legacy Taxonomy parameter et la prise en charge des AWS Signature Version 4 query parameters.
      - VERIFY_SSL_CERTS vaut maintenant true par defaut pour la HTTPS certificate verification a l'echelle du deploiement.
      - Les correctifs de securite traitent des problemes XSS et un probleme SSRF DNS rebinding.
    de_DE: |-
      - 1.9.2 fuegt einen legacy Taxonomy parameter und Support fuer AWS Signature Version 4 query parameters hinzu.
      - VERIFY_SSL_CERTS ist nun standardmaessig true fuer deploymentsweite HTTPS certificate verification.
      - Sicherheitskorrekturen beheben XSS-Probleme und ein SSRF DNS rebinding-Problem.
    sv_SE: |-
      - 1.9.2 lägger till en äldre taxonomiparameter och stöd för frågeparametrar för AWS Signature Version 4.
      - VERIFY_SSL_CERTS är nu som standard sant för deployment-wide HTTPS certifikatverifiering.
      - Säkerhetskorrigeringar åtgärdar XSS-problem och ett SSRF DNS återbindningsproblem.
    el_GR: |-
      - Το 1.9.2 προσθέτει μια παράμετρο Taxonomy παλαιού τύπου και υποστήριξη για παραμέτρους ερωτήματος AWS Signature Version 4.
      - Το VERIFY_SSL_CERTS είναι τώρα από προεπιλογή αληθές για την επαλήθευση πιστοποιητικού deployment-wide HTTPS.
      - Οι διορθώσεις ασφαλείας αντιμετωπίζουν XSS ζητήματα και ένα SSRF DNS πρόβλημα επαναδέσμευσης.
    hr_HR: |-
      - 1.9.2 dodaje naslijeđeni parametar taksonomije i podršku za parametre upita AWS Signature Version 4.
      - VERIFY_SSL_CERTS sada je zadana vrijednost istinita za deployment-wide HTTPS provjeru certifikata.
      - Sigurnosni popravci rješavaju probleme XSS i problem ponovnog povezivanja SSRF DNS.
    pt_PT: |-
      - 1.9.2 adiciona um parâmetro de taxonomia herdado e suporte para parâmetros de consulta AWS Signature versão 4.
      - VERIFY_SSL_CERTS tem agora como padrão verdadeiro para a verificação do certificado deployment-wide HTTPS.
      - As correções de segurança abordam problemas de XSS e um problema de religação de SSRF DNS.
    ru_RU: |-
      - 1.9.2 добавляет устаревший параметр таксономии и поддерживает параметры запроса AWS Signature версии 4.
      - VERIFY_SSL_CERTS теперь по умолчанию имеет значение true для проверки сертификата deployment-wide HTTPS.
      - Исправления безопасности касаются проблем XSS и проблемы повторной привязки SSRF DNS.
    tr_TR: |-
      - 1.9.2 eski bir Taksonomi parametresi ekler ve AWS İmza Sürümü 4 sorgu parametrelerini destekler.
      - VERIFY_SSL_CERTS artık deployment-wide HTTPS sertifika doğrulaması için varsayılan olarak true değerini alıyor.
      - Güvenlik, adres XSS sorunlarını ve SSRF DNS yeniden bağlama sorununu düzeltir.
  website: "https://labelstud.io/"
  repo: "https://github.com/HumanSignal/label-studio"
  support: "https://github.com/HumanSignal/label-studio/issues"
  docs: "https://labelstud.io/guide/"
