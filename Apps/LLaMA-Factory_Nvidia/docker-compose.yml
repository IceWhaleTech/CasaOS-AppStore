    el_GR: |-
      - Το v0.9.4 ενημερώνει το όνομα του έργου από LLaMA-Factory σε LlamaFactory.
      - Οι παλαιότεροι χρόνοι εκτέλεσης Python έχουν καταργηθεί. το υποστηριζόμενο εύρος χρόνου εκτέλεσης Python αυξήθηκε.
      - Η εγκατάσταση μεταφέρθηκε από pip σε uv και η νέα υποστήριξη εκπαίδευσης περιλαμβάνει OFT, Semantic Initialization, Megatron-LM, KTransformers, MPO, FP8 και TRL 0.24.
    hr_HR: |-
      - v0.9.4 ažurira naziv projekta iz LLaMA-Factory u LlamaFactory.
      - Starija vremena izvođenja Pythona su zastarjela; povećan je podržani raspon vremena izvođenja Pythona.
      - Instalacija je premještena s pip na uv, a nova podrška za obuku uključuje OFT, semantičku inicijalizaciju, Megatron-LM, KTransformers, MPO, FP8 i TRL 0.24.
    pt_PT: |-
      - v0.9.4 atualiza o nome do projeto de LLaMA-Factory para LlamaFactory.
      - Os tempos de execução Python mais antigos estão obsoletos; o intervalo de tempo de execução do Python suportado foi aumentado.
      - Instalação movida de pip para uv, e novo suporte de formação inclui OFT, inicialização semântica, Megatron-LM, KTransformers, MPO, FP8 e TRL 0.24.
    ru_RU: |-
      - v0.9.4 обновляет имя проекта с LLaMA-Factory на LlamaFactory.
      - Старые среды выполнения Python устарели; увеличен поддерживаемый диапазон времени выполнения Python.
      - Установка перенесена с pip на uv, а новая поддержка обучения включает OFT, семантическую инициализацию, Megatron-LM, KTransformers, MPO, FP8 и TRL 0.24.
    tr_TR: |-
      - v0.9.4, proje adını LLaMA-Factory'den LlamaFactory'ye günceller.
      - Daha eski Python çalışma zamanları kullanımdan kaldırıldı; desteklenen Python çalışma zamanı aralığı yükseltildi.
      - Kurulum pip'den uv'ye taşındı ve yeni eğitim desteği OFT, Anlamsal Başlatma, Megatron-LM, KTransformers, MPO, FP8 ve TRL 0.24'yi içeriyor.
