  releaseNotes:
    en_US: |-
      - v0.9.4 updates the project name from LLaMA-Factory to LlamaFactory.
      - Older Python runtimes are deprecated; the supported Python runtime range was raised.
      - Installation moved from pip to uv, and new training support includes OFT, Semantic Initialization, Megatron-LM, KTransformers, MPO, FP8, and TRL 0.24.
    en_GB: |-
      - v0.9.4 updates the project name from LLaMA-Factory to LlamaFactory.
      - Older Python runtimes are deprecated; the supported Python runtime range was raised.
      - Installation moved from pip to uv, and new training support includes OFT, Semantic Initialization, Megatron-LM, KTransformers, MPO, FP8, and TRL 0.24.
    it_IT: |-
      - v0.9.4 aggiorna il nome del progetto da LLaMA-Factory a LlamaFactory.
      - I runtime Python precedenti sono deprecati; l'intervallo di runtime Python supportato è stato aumentato.
      - L'installazione è stata spostata da pip a uv e il nuovo supporto per la formazione include OFT, inizializzazione semantica, Megatron-LM, KTransformers, MPO, FP8 e TRL 0.24.
    nb_NO: |-
      - v0.9.4 oppdaterer prosjektnavnet fra LLaMA-Factory til LlamaFactory.
      - Eldre Python-kjøretider er utdatert; det støttede Python-kjøretidsområdet ble hevet.
      - Installasjonen flyttet fra pip til uv, og ny opplæringsstøtte inkluderer OFT, semantisk initialisering, Megatron-LM, KTransformers, MPO, FP8 og TRL 0.24.
    zh_CN: |-
      - v0.9.4 将项目名从 LLaMA-Factory 更新为 LlamaFactory。
      - 旧版 Python 运行时被弃用，支持的 Python 运行时范围已提高。
      - 安装方式从 pip 迁移到 uv，新增训练支持包括 OFT、Semantic Initialization、Megatron-LM、KTransformers、MPO、FP8 和 TRL 0.24。
    ja_JP: |-
      - v0.9.4 はプロジェクト名を LLaMA-Factory から LlamaFactory に更新します。
      - 古い Python ランタイムは非推奨となり、サポートされる Python ランタイム範囲が引き上げられました。
      - インストールは pip から uv に移行し、新しい学習サポートとして OFT、Semantic Initialization、Megatron-LM、KTransformers、MPO、FP8、TRL 0.24 が含まれます。
    ko_KR: |-
      - v0.9.4는 프로젝트 이름을 LLaMA-Factory에서 LlamaFactory로 업데이트합니다.
      - 이전 Python 런타임은 더 이상 권장되지 않으며 지원되는 Python 런타임 범위가 상향되었습니다.
      - 설치 방식이 pip에서 uv로 변경되었고, 새로운 학습 지원에는 OFT, Semantic Initialization, Megatron-LM, KTransformers, MPO, FP8, TRL 0.24가 포함됩니다.
