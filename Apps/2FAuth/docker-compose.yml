name: 2fauth
services:
  2fauth:
    image: 2fauth/2fauth:5.4.3
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
      - target: 8000
        published: "8000"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID
        target: /2fauth
    x-casaos:
      ports:
        - container: "8000"
          description:
            en_us: ""
      volumes:
        - container: /2fauth
          description:
            en_us: ""
    container_name: 2fauth
x-casaos:
  architectures:
    - amd64
    - "386"
    - arm64
    - arm
  main: 2fauth
  author: CasaOS Team
  category: Utilities
  description:
    en_us: 2FAuth is a web based self-hosted alternative to One Time Passcode (OTP) generators like Google Authenticator, designed for both mobile and desktop.
    zh_cn: 2FAuth是一个基于Web的自托管的替代Google Authenticator的一次性密码（OTP）生成器，旨在为移动和桌面设备提供服务。
    ar_sa: 2FAuth هو بديل مستضاف لنفسه لمولدات رمز واحد (OTP) مثل Google Authenticator ، مصممة للجوال وسطح المكتب.
    de_de: 2FAuth ist eine webbasierte selbst gehostete Alternative zu One Time Passcode (OTP) Generatoren wie Google Authenticator, die für mobile und Desktop-Geräte entwickelt wurde.
    es_es: 2FAuth es una alternativa autohospedada basada en web a los generadores de códigos de un solo uso (OTP) como Google Authenticator, diseñada para móviles y escritorio.
    fr_fr: 2FAuth est une alternative auto-hébergée basée sur le web aux générateurs de codes à usage unique (OTP) tels que Google Authenticator, conçus pour les appareils mobiles et de bureau.
    hu_hu: A 2FAuth egy webes, önállóan kiszolgáló alternatíva a Google Authenticator egyetlen használatú kódjainak (OTP) generátorának, amelyet mobil és asztali eszközök számára terveztek.
    it_it: 2FAuth è un'alternativa auto-hosted basata su web ai generatori di codici a tempo singolo (OTP) come Google Authenticator, progettati per dispositivi mobili e desktop.
    ru_ru: 2FAuth - это веб-базовая самохостинговая альтернатива генераторам одноразовых кодов (OTP) вроде Google Authenticator, разработанные для мобильных и настольных устройств.
    pl_pl: 2FAuth to alternatywa samohostowana na podstawie sieci web do generatorów kodów jednorazowych (OTP) takich jak Google Authenticator, zaprojektowana dla urządzeń mobilnych i stacjonarnych.
    pt_br: 2FAuth é uma alternativa auto-hospedada baseada na web aos geradores de códigos de uso único (OTP) como o Google Authenticator, projetados para dispositivos móveis e desktop.
    sv_se: 2FAuth är en självhärdad webbaserad alternativ till One Time Passcode (OTP) -genererare som Google Authenticator, utformad för både mobila och skrivbordsenheter.
    uk_ua: 2FAuth - це веб-базова самохостингова альтернатива генераторам одноразових кодів (OTP) на кшталт Google Authenticator, розроблена для мобільних та стільниць пристроїв.
  developer: Bubka
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-3.png
  tagline:
    en_us: A web app to manage your Two-Factor Authentication (2FA) accounts and generate their security codes
    zh_cn: 一个用于管理您的两步验证（2FA）帐户并生成其安全代码的Web应用程序
    ar_sa: تطبيق ويب لإدارة حسابات المصادقة الثنائية (2FA) الخاصة بك وإنشاء رموز أمانها
    de_de: Eine Web-App zum Verwalten Ihrer Zwei-Faktor-Authentifizierung (2FA) Konten und zum Erstellen ihrer Sicherheitscodes
    es_es: Una aplicación web para administrar sus cuentas de autenticación de dos factores (2FA) y generar sus códigos de seguridad
    fr_fr: Une application Web pour gérer vos comptes d'authentification à deux facteurs (2FA) et générer leurs codes de sécurité
    hu_hu: Egy webalkalmazás a kétlépcsős hitelesítés (2FA) fiókok kezeléséhez és biztonsági kódjuk generálásához
    it_it: Un'applicazione web per gestire i tuoi account di autenticazione a due fattori (2FA) e generare i loro codici di sicurezza
    ru_ru: Веб-приложение для управления учетными записями двухфакторной аутентификации (2FA) и генерации их кодов безопасности
    pl_pl: Aplikacja internetowa do zarządzania kontami uwierzytelniania dwuskładnikowego (2FA) i generowania ich kodów bezpieczeństwa
    pt_br: Um aplicativo da web para gerenciar suas contas de autenticação de dois fatores (2FA) e gerar seus códigos de segurança
    sv_se: En webbapp för att hantera dina tvåfaktorsautentiserings (2FA) -konton och generera deras säkerhetskoder
    uk_ua: Веб-застосунок для керування обліковими записами двофакторної аутентифікації (2FA) та генерації їх кодів безпеки
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/thumbnail.png
  tips: {}
  title:
    en_us: 2FAuth
  index: /
  port_map: "8000"
  version: "5.4.3"
  updateAt: "2024-11-27"
  releaseNotes:
    en_US: |-
      - v5.4.3 fixes deleted icons reappearing after saving from the advanced form.
      - Login page loading, footer menu form submission, cropped QR codes, Manage mode freezes, and missing no-icon account icons were fixed.
      - The /up view no longer loads CSS styles from tailwindcss.com.
    en_GB: |-
      - v5.4.3 fixes deleted icons reappearing after saving from the advanced form.
      - Login page loading, footer menu form submission, cropped QR codes, Manage mode freezes, and missing no-icon account icons were fixed.
      - The /up view no longer loads CSS styles from tailwindcss.com.
    it_IT: |-
      - v5.4.3 corregge le icone cancellate che riappaiono dopo il salvataggio dal modulo avanzato the.
      - Sono stati corretti il ​​caricamento della pagina di accesso, l'invio del modulo del menu a piè di pagina, i codici QR ritagliati, i blocchi della modalità di gestione e le icone dell'account no-icon mancanti.
      - La vista /up non carica più gli stili CSS da tailwindcss.com.
    nb_NO: |-
      - v5.4.3 fikser slettede ikoner som dukker opp igjen etter lagring fra the avansert skjema.
      - Innlasting av påloggingsside, innsending av bunntekstmeny, beskjærte QR-koder, Administrasjonsmodus fryser og manglende no-icon-kontoikoner ble fikset.
      - /up-visningen laster ikke lenger CSS-stiler fra tailwindcss.com.
    zh_CN: |-
      - v5.4.3 修复了从高级表单保存后已删除图标重新出现的问题。
      - 修复了登录页加载、页脚菜单表单提交、二维码裁剪、Manage 模式冻结以及无图标账户图标缺失的问题。
      - /up 视图不再从 tailwindcss.com 加载 CSS 样式。
    ja_JP: |-
      - v5.4.3 は、高度なフォームから保存した後に削除済みアイコンが再表示される問題を修正します。
      - ログインページの読み込み、フッターメニューのフォーム送信、QR コードの切り抜き、Manage モードのフリーズ、アイコンなしアカウントのアイコン欠落が修正されました。
      - /up ビューは tailwindcss.com から CSS スタイルを読み込まなくなりました。
    ko_KR: |-
      - v5.4.3은 고급 양식에서 저장한 뒤 삭제된 아이콘이 다시 나타나는 문제를 수정합니다.
      - 로그인 페이지 로딩, 푸터 메뉴 양식 제출, 잘린 QR 코드, Manage 모드 멈춤, 아이콘 없는 계정 아이콘 누락이 수정되었습니다.
      - /up 보기는 더 이상 tailwindcss.com에서 CSS 스타일을 로드하지 않습니다.
    fr_FR: |-
      - v5.4.3 corrige la reapparition des icones supprimees apres l'enregistrement depuis le formulaire avance.
      - Le chargement de la page de connexion, l'envoi du formulaire du menu de pied de page, les QR codes rognes, les blocages du mode Manage et les icones de compte manquantes sans icone ont ete corriges.
      - La vue /up ne charge plus les styles CSS depuis tailwindcss.com.
    de_DE: |-
      - v5.4.3 behebt, dass geloeschte Icons nach dem Speichern aus dem erweiterten Formular wieder erscheinen.
      - Behoben wurden das Laden der Login-Seite, Formularuebermittlung im Footer-Menue, zugeschnittene QR-Codes, Einfrieren im Manage-Modus und fehlende Account-Icons ohne Icon.
      - Die Ansicht /up laedt keine CSS-Stile mehr von tailwindcss.com.
    sv_SE: |-
      - v5.4.3 fixar borttagna ikoner som dyker upp igen efter att ha sparats från the avancerad form.
      - Inloggningssidan laddas, sidfotsmenyformulär, beskurna QR-koder, hanteringsläge fryser och saknade no-icon-kontoikoner fixades.
      - /up-vyn laddar inte längre CSS-stilar från tailwindcss.com.
    el_GR: |-
      - Το v5.4.3 διορθώνει τα διαγραμμένα εικονίδια που εμφανίζονται ξανά μετά την αποθήκευση από the σύνθετη φόρμα.
      - Διορθώθηκε η φόρτωση της σελίδας σύνδεσης, η υποβολή φόρμας μενού υποσέλιδου, οι περικομμένοι QR κωδικοί, οι παγώσεις της λειτουργίας Διαχείρισης και τα εικονίδια λογαριασμού no-icon που λείπουν.
      - Η προβολή /πάνω δεν φορτώνει πλέον τα στυλ CSS από tailwindcss.com.
    hr_HR: |-
      - v5.4.3 popravlja izbrisane ikone koje se ponovno pojavljuju nakon spremanja iz naprednog obrasca the.
      - Ispravljeno je učitavanje stranice za prijavu, slanje obrasca izbornika podnožja, obrezani QR kodovi, zamrzavanje načina upravljanja i nedostajuće ikone računa no-icon.
      - Pogled /up više ne učitava CSS stilove iz tailwindcss.com.
    pt_PT: |-
      - v5.4.3 corrige os ícones eliminados que reaparecem após guardar no formulário avançado the.
      - O carregamento da página de início de sessão, o envio do formulário do menu de rodapé, os códigos QR cortados, o modo de gestão congela e os ícones de conta no-icon em falta foram corrigidos.
      - A vista /up já não carrega estilos CSS de tailwindcss.com.
    ru_RU: |-
      - v5.4.3 исправляет удаленные значки, которые снова появляются после сохранения из расширенной формы the.
      - Исправлены загрузка страницы входа, отправка формы меню нижнего колонтитула, обрезанные коды QR, зависание режима управления и отсутствующие значки учетной записи no-icon.
      - Представление /up больше не загружает стили CSS из tailwindcss.com.
    tr_TR: |-
      - v5.4.3, the gelişmiş formundan kaydettikten sonra silinen simgelerin yeniden görünmesini düzeltir.
      - Giriş sayfası yükleme, alt bilgi menüsü form gönderimi, kırpılmış QR kodları, Yönetim modunda donmalar ve eksik no-icon hesap simgeleri düzeltildi.
      - /up görünümü artık tailwindcss.com'den CSS stillerini yüklemiyor.
