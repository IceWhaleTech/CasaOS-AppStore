      # अवलोकन

      Termix एक ओपन-सोर्स, सदा-मुक्त, स्व-होस्ट किया गया सर्व-एक-में सर्वर प्रबंधन मंच है। यह एक एकल, सहज इंटरफेस के माध्यम से अपने सर्वर और बुनियादी ढांचे के प्रबंधन के लिए एक बहु-प्लेटफॉर्म समाधान प्रदान करता है। Termix SSH टर्मिनल एक्सेस, रिमोट डेस्कटॉप नियंत्रण (RDP, VNC, Telnet), SSH सुरंगिंग क्षमताएं, रिमोट SSH फ़ाइल प्रबंधन और कई अन्य उपकरण प्रदान करता है। Termix सभी प्लेटफार्मों के लिए Termius का एक आदर्श मुक्त और स्व-होस्ट किया गया विकल्प है।

      # विशेषताएं

      - **SSH टर्मिनल एक्सेस** - विभाजन-स्क्रीन समर्थन (4 पैनल तक) और ब्राउज़र-जैसी टैब प्रणाली के साथ पूर्ण-विशेषताओं वाला टर्मिनल। टर्मिनल को अनुकूलित करने के लिए समर्थन शामिल है जिसमें सामान्य टर्मिनल थीम, फ़ॉन्ट और अन्य घटक शामिल हैं।
      - **रिमोट डेस्कटॉप एक्सेस** - ब्राउज़र पर RDP, VNC और Telnet समर्थन पूर्ण अनुकूलन और विभाजन स्क्रीनिंग के साथ
      - **SSH सुरंग प्रबंधन** - स्वचालित पुनः कनेक्ट और स्वास्थ्य निगरानी के साथ SSH सुरंगें बनाएं और प्रबंधित करें और -l या -r कनेक्शन के लिए समर्थन
      - **रिमोट फ़ाइल प्रबंधक** - कोड, चित्र, ऑडियो और वीडियो देखने और संपादित करने के लिए समर्थन के साथ रिमोट सर्वर पर सीधे फ़ाइलें प्रबंधित करें। Sudo समर्थन के साथ फ़ाइलों को निर्बाध रूप से अपलोड, डाउनलोड, नाम बदलें, हटाएं और स्थानांतरित करें।
      - **Docker प्रबंधन** - कंटेनर शुरू, बंद, रोकें, हटाएं। कंटेनर आंकड़े देखें। docker exec टर्मिनल का उपयोग करके कंटेनर को नियंत्रित करें। यह Portainer या Dockge को प्रतिस्थापित करने के लिए नहीं बनाया गया था, बल्कि उन्हें बनाने की तुलना में अपने कंटेनरों को आसानी से प्रबंधित करने के लिए बनाया गया था।
      - **SSH होस्ट प्रबंधक** - टैग और फ़ोल्डर के साथ अपने SSH कनेक्शन को सहेजें, व्यवस्थित करें और प्रबंधित करें, और आसानी से पुनः प्रयोज्य लॉगिन जानकारी सहेजें जबकि SSH कुंजी के स्वचालित स्थापन में सक्षम हों
      - **सर्वर आंकड़े** - अधिकांश Linux-आधारित सर्वर पर CPU, मेमोरी और डिस्क उपयोग के साथ नेटवर्क, अपटाइम, सिस्टम जानकारी, फायरवॉल, पोर्ट मॉनिटर देखें
      - **डैशबोर्ड** - अपने डैशबोर्ड पर एक नज़र में सर्वर की जानकारी देखें
      - **RBAC** - भूमिकाएं बनाएं और उपयोगकर्ताओं/भूमिकाओं में होस्ट साझा करें
      - **उपयोगकर्ता प्रमाणीकरण** - व्यवस्थापक नियंत्रण और OIDC (एक्सेस नियंत्रण के साथ) और 2FA (TOTP) समर्थन के साथ सुरक्षित उपयोगकर्ता प्रबंधन। सभी प्लेटफार्म में सक्रिय उपयोगकर्ता सत्र देखें और अनुमतियां रद्द करें। अपने OIDC/स्थानीय खातों को एक साथ लिंक करें।
      - **डेटाबेस एन्क्रिप्शन** - बैकएंड को एन्क्रिप्ट किए गए SQLite डेटाबेस फ़ाइलों के रूप में संग्रहीत। अधिक जानकारी के लिए [दस्तावेज़](https://docs.termix.site/security) देखें।
      - **डेटा निर्यात/आयात** - SSH होस्ट, क्रेडेंशियल और फ़ाइल प्रबंधक डेटा निर्यात और आयात करें
      - **स्वचालित SSL सेटअप** - HTTPS रीडायरेक्ट के साथ अंतर्निहित SSL प्रमाणपत्र पीढ़ी और प्रबंधन
      - **आधुनिक UI** - React, Tailwind CSS और Shadcn के साथ बनाया गया स्वच्छ डेस्कटॉप/मोबाइल-अनुकूल इंटरफेस। UI पर आधारित गहरे या हल्के मोड के बीच चुनें। किसी भी कनेक्शन को पूर्ण-स्क्रीन में खोलने के लिए URL मार्ग का उपयोग करें।
      - **भाषाएं** - लगभग 30 भाषाओं के लिए अंतर्निहित समर्थन ([Crowdin](https://docs.termix.site/translations) द्वारा प्रबंधित)
      - **प्लेटफॉर्म समर्थन** - वेब ऐप, डेस्कटॉप एप्लिकेशन (Windows, Linux और macOS, Termix बैकएंड के बिना स्वतंत्र रूप से चलाया जा सकता है), PWA और iOS और Android के लिए समर्पित मोबाइल/टैबलेट ऐप के रूप में उपलब्ध।
      - **SSH उपकरण** - पुनः प्रयोज्य कमांड स्निपेट बनाएं जो एक क्लिक से निष्पादित होते हैं। एक साथ कई खुले टर्मिनल में एक कमांड चलाएं।
      - **कमांड इतिहास** - ऑटो-पूर्ण करें और पहले चलाई गई SSH कमांड देखें
      - **त्वरित कनेक्ट** - कनेक्शन डेटा को सहेजे बिना सर्वर से कनेक्ट करें
      - **कमांड पैलेट** - SSH कनेक्शन को अपने कीबोर्ड के साथ जल्दी से एक्सेस करने के लिए बाएं शिफ्ट को दोगुना टैप करें
      - **SSH फीचर समृद्ध** - जंप होस्ट, Warpgate, TOTP आधारित कनेक्शन, SOCKS5, होस्ट कुंजी सत्यापन, पासवर्ड ऑटोफिल, [OPKSSH](https://github.com/openpubkey/opkssh), आदि का समर्थन करता है।
      - **नेटवर्क ग्राफ** - अपने SSH कनेक्शन के आधार पर अपने होमलैब को दृश्यमान करने के लिए अपने डैशबोर्ड को अनुकूलित करें, स्थिति समर्थन के साथ
      - **स्थिर टैब** - यदि उपयोगकर्ता प्रोफ़ाइल में सक्षम किया गया तो SSH सत्र और टैब डिवाइस/रीफ्रेश में खुले रहते हैं
