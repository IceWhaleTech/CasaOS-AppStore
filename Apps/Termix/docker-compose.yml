      # Ringkasan

      Termix adalah platform manajemen server all-in-one yang bersumber terbuka, gratis selamanya, dan di-host sendiri. Ini menyediakan solusi multi-platform untuk mengelola server dan infrastruktur Anda melalui antarmuka tunggal yang intuitif. Termix menawarkan akses terminal SSH, kontrol desktop jarak jauh (RDP, VNC, Telnet), kemampuan tunneling SSH, manajemen file SSH jarak jauh, dan banyak alat lainnya. Termix adalah alternatif gratis dan self-hosted yang sempurna untuk Termius yang tersedia untuk semua platform.

      # Fitur

      - **Akses Terminal SSH** - Terminal dengan fitur lengkap dengan dukungan layar terpisah (hingga 4 panel) dengan sistem tab seperti browser. Mencakup dukungan untuk menyesuaikan terminal termasuk tema terminal umum, font, dan komponen lainnya.
      - **Akses Desktop Jarak Jauh** - Dukungan RDP, VNC, dan Telnet melalui browser dengan kustomisasi lengkap dan layar terpisah
      - **Manajemen Tunnel SSH** - Buat dan kelola tunnel SSH dengan reconnection otomatis dan monitoring kesehatan serta dukungan untuk koneksi -l atau -r
      - **Manajer File Jarak Jauh** - Kelola file langsung di server jarak jauh dengan dukungan untuk melihat dan mengedit kode, gambar, audio, dan video. Unggah, unduh, ubah nama, hapus, dan pindahkan file dengan mulus dengan dukungan sudo.
      - **Manajemen Docker** - Mulai, hentikan, jeda, hapus kontainer. Lihat statistik kontainer. Kontrol kontainer menggunakan terminal docker exec. Ini tidak dibuat untuk menggantikan Portainer atau Dockge tetapi hanya untuk mengelola kontainer Anda dibandingkan dengan membuatnya.
      - **Manajer Host SSH** - Simpan, atur, dan kelola koneksi SSH Anda dengan tag dan folder, dan mudah simpan informasi login yang dapat digunakan kembali sambil dapat mengotomatisasi penyebaran kunci SSH
      - **Statistik Server** - Lihat penggunaan CPU, memori, dan disk bersama dengan jaringan, waktu aktif, informasi sistem, firewall, monitor port, di sebagian besar server berbasis Linux
      - **Dasbor** - Lihat informasi server sekilas di dasbor Anda
      - **RBAC** - Buat peran dan bagikan host di seluruh pengguna/peran
      - **Autentikasi Pengguna** - Manajemen pengguna yang aman dengan kontrol admin dan dukungan OIDC (dengan kontrol akses) dan 2FA (TOTP). Lihat sesi pengguna aktif di semua platform dan cabut izin. Tautkan akun OIDC/Lokal Anda bersama-sama.
      - **Enkripsi Database** - Backend disimpan sebagai file database SQLite terenkripsi. Lihat [dokumen](https://docs.termix.site/security) untuk selengkapnya.
      - **Ekspor/Impor Data** - Ekspor dan impor host SSH, kredensial, dan data manajer file
      - **Penyiapan SSL Otomatis** - Pembuatan dan manajemen sertifikat SSL bawaan dengan pengalihan HTTPS
      - **UI Modern** - Antarmuka ramah desktop/seluler yang bersih dibangun dengan React, Tailwind CSS, dan Shadcn. Pilih antara mode gelap atau terang berbasis UI. Gunakan rute URL untuk membuka koneksi apa pun layar penuh.
      - **Bahasa** - Dukungan bawaan ~30 bahasa (dikelola oleh [Crowdin](https://docs.termix.site/translations))
      - **Dukungan Platform** - Tersedia sebagai aplikasi web, aplikasi desktop (Windows, Linux, dan macOS, dapat dijalankan secara mandiri tanpa backend Termix), PWA, dan aplikasi seluler/tablet khusus untuk iOS dan Android.
      - **Alat SSH** - Buat cuplikan perintah yang dapat digunakan kembali yang dijalankan dengan satu klik. Jalankan satu perintah secara bersamaan di beberapa terminal terbuka.
      - **Riwayat Perintah** - Pelengkapan otomatis dan lihat perintah SSH yang dijalankan sebelumnya
      - **Koneksi Cepat** - Terhubung ke server tanpa harus menyimpan data koneksi
      - **Palet Perintah** - Ketuk dua kali tombol Shift kiri untuk akses cepat koneksi SSH dengan keyboard Anda
      - **SSH Kaya Fitur** - Mendukung jump host, Warpgate, koneksi berbasis TOTP, SOCKS5, verifikasi kunci host, pengisian otomatis sandi, [OPKSSH](https://github.com/openpubkey/opkssh), dll.
      - **Grafik Jaringan** - Sesuaikan Dasbor Anda untuk memvisualisasikan homelab Anda berdasarkan koneksi SSH Anda dengan dukungan status
      - **Tab Persisten** - Sesi dan tab SSH tetap terbuka di seluruh perangkat/segarkan jika diaktifkan di profil pengguna

