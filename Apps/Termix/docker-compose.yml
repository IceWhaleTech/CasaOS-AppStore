      # Descripción General

      Termix es una plataforma de gestión de servidores todo en uno de código abierto, gratuita para siempre y auto-alojada. Proporciona una solución multiplataforma para administrar sus servidores e infraestructura a través de una interfaz única e intuitiva. Termix ofrece acceso a terminal SSH, control de escritorio remoto (RDP, VNC, Telnet), capacidades de túnel SSH, gestión remota de archivos SSH y muchas otras herramientas. Termix es la alternativa gratuita y auto-alojada perfecta a Termius disponible para todas las plataformas.

      # Características

      - **Acceso a Terminal SSH** - Terminal con todas las características con soporte de pantalla dividida (hasta 4 paneles) con un sistema de pestañas similar al navegador. Incluye soporte para personalizar la terminal, incluidos temas de terminal comunes, fuentes y otros componentes.
      - **Acceso a Escritorio Remoto** - Soporte para RDP, VNC y Telnet en el navegador con personalización completa y pantalla dividida
      - **Gestión de Túneles SSH** - Cree y gestione túneles SSH con reconexión automática y monitoreo de salud y soporte para conexiones -l o -r
      - **Administrador de Archivos Remoto** - Administre archivos directamente en servidores remotos con soporte para ver y editar código, imágenes, audio y video. Cargue, descargue, cambie el nombre, elimine y mueva archivos sin problemas con soporte de sudo.
      - **Gestión de Docker** - Inicie, detenga, pause, elimine contenedores. Ver estadísticas de contenedores. Controle el contenedor utilizando el terminal docker exec. No fue hecho para reemplazar Portainer o Dockge sino para administrar simplemente sus contenedores en comparación con crearlos.
      - **Gestor de Hosts SSH** - Guarde, organice y administre sus conexiones SSH con etiquetas y carpetas, y guarde fácilmente información de inicio de sesión reutilizable mientras puede automatizar la implementación de claves SSH
      - **Estadísticas del Servidor** - Ver uso de CPU, memoria y disco junto con red, tiempo de actividad, información del sistema, firewall, monitor de puertos, en la mayoría de servidores basados ​​en Linux
      - **Panel de Control** - Ver información del servidor de un vistazo en su panel de control
      - **RBAC** - Crear roles y compartir hosts entre usuarios/roles
      - **Autenticación de Usuario** - Gestión segura de usuarios con controles administrativos y soporte OIDC (con control de acceso) y 2FA (TOTP). Ver sesiones de usuario activas en todas las plataformas y revocar permisos. Vincule sus cuentas OIDC/Locales juntas.
      - **Cifrado de Base de Datos** - Backend almacenado como archivos de base de datos SQLite cifrados. Ver [documentación](https://docs.termix.site/security) para más.
      - **Exportación/Importación de Datos** - Exportar e importar hosts SSH, credenciales y datos del administrador de archivos
      - **Configuración SSL Automática** - Generación y gestión de certificados SSL integrados con redirecciones HTTPS
      - **Interfaz Moderna** - Interfaz limpia y amigable para escritorio/móvil construida con React, Tailwind CSS y Shadcn. Elija entre modo claro u oscuro basado en IU. Use rutas de URL para abrir cualquier conexión en pantalla completa.
      - **Idiomas** - Soporte integrado para ~30 idiomas (administrado por [Crowdin](https://docs.termix.site/translations))
      - **Compatibilidad de Plataformas** - Disponible como aplicación web, aplicación de escritorio (Windows, Linux y macOS, se puede ejecutar de forma independiente sin backend de Termix), PWA y aplicación móvil/tableta dedicada para iOS y Android.
      - **Herramientas SSH** - Cree fragmentos de comandos reutilizables que se ejecuten con un solo clic. Ejecute un comando simultáneamente en varias terminales abiertas.
      - **Historial de Comandos** - Autocompletar y ver comandos SSH ejecutados anteriormente
      - **Conexión Rápida** - Conéctese a un servidor sin necesidad de guardar los datos de conexión
      - **Paleta de Comandos** - Toque dos veces la tecla Mayús izquierda para acceder rápidamente a las conexiones SSH con su teclado
      - **SSH Completo de Características** - Soporta hosts de salto, Warpgate, conexiones basadas en TOTP, SOCKS5, verificación de claves de host, relleno automático de contraseñas, [OPKSSH](https://github.com/openpubkey/opkssh), etc.
      - **Gráfico de Red** - Personalice su Panel para visualizar su laboratorio casero basado en sus conexiones SSH con soporte de estado
      - **Pestañas Persistentes** - Las sesiones y pestañas SSH permanecen abiertas en dispositivos/actualizaciones si está habilitado en el perfil del usuario
