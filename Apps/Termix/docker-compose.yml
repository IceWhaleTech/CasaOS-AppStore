      # 概述

      Termix 是一个开源的、永远免费的、自托管的一体化服务器管理平台。它提供了一个多平台解决方案，用于通过单一直观的界面管理您的服务器和基础设施。Termix 提供 SSH 终端访问、远程桌面控制（RDP、VNC、Telnet）、SSH 隧道功能、远程 SSH 文件管理和许多其他工具。Termix 是适用于所有平台的 Termius 的完美免费自托管替代品。

      # 功能

      - **SSH 终端访问** - 功能齐全的终端，支持分屏（最多 4 个面板）和浏览器式标签系统。包括对终端自定义的支持，包括常见的终端主题、字体和其他组件。
      - **远程桌面访问** - 浏览器上的 RDP、VNC 和 Telnet 支持，具有完整的自定义和分屏功能
      - **SSH 隧道管理** - 创建和管理 SSH 隧道，支持自动重新连接和健康监测，以及 -l 或 -r 连接支持
      - **远程文件管理器** - 直接在远程服务器上管理文件，支持查看和编辑代码、图像、音频和视频。无缝上传、下载、重命名、删除和移动文件，支持 sudo。
      - **Docker 管理** - 启动、停止、暂停、删除容器。查看容器统计信息。使用 docker exec 终端控制容器。这不是为了替代 Portainer 或 Dockge，而是为了相比创建容器时简化容器管理。
      - **SSH 主机管理器** - 使用标签和文件夹保存、组织和管理您的 SSH 连接，轻松保存可重用的登录信息，同时能够自动部署 SSH 密钥
      - **服务器统计** - 在大多数基于 Linux 的服务器上查看 CPU、内存和磁盘使用情况以及网络、正常运行时间、系统信息、防火墙、端口监控
      - **仪表板** - 在仪表板上一览无余地查看服务器信息
      - **基于角色的访问控制** - 创建角色并跨用户/角色共享主机
      - **用户身份验证** - 具有管理控制、OIDC（带访问控制）和 2FA（TOTP）支持的安全用户管理。查看所有平台上的活跃用户会话并撤销权限。链接您的 OIDC/本地账户。
      - **数据库加密** - 后端存储为加密的 SQLite 数据库文件。查看[文档](https://docs.termix.site/security)了解更多。
      - **数据导出/导入** - 导出和导入 SSH 主机、凭证和文件管理器数据
      - **自动 SSL 设置** - 内置 SSL 证书生成和管理以及 HTTPS 重定向
      - **现代界面** - 使用 React、Tailwind CSS 和 Shadcn 构建的干净的桌面/移动友好界面。根据偏好选择深色或浅色模式。使用 URL 路由在全屏中打开任何连接。
      - **多语言支持** - 内置支持约 30 种语言（由 [Crowdin](https://docs.termix.site/translations) 管理）
      - **平台支持** - 可用作网络应用、桌面应用（Windows、Linux 和 macOS，可独立运行而无需 Termix 后端）、PWA 和 iOS 及 Android 专用移动/平板应用。
      - **SSH 工具** - 创建可重用的命令片段，一键即可执行。同时在多个打开的终端中运行一条命令。
      - **命令历史** - 自动完成和查看以前运行的 SSH 命令
      - **快速连接** - 无需保存连接数据即可连接到服务器
      - **命令面板** - 双击左 Shift 键可快速使用键盘访问 SSH 连接
      - **功能丰富的 SSH** - 支持跳转主机、Warpgate、基于 TOTP 的连接、SOCKS5、主机密钥验证、密码自动填充、[OPKSSH](https://github.com/openpubkey/opkssh) 等。
      - **网络图** - 根据您的 SSH 连接自定义仪表板以可视化您的家庭实验室，支持状态显示
      - **持久标签** - 如果在用户配置文件中启用，SSH 会话和标签在设备/刷新间保持打开状态
