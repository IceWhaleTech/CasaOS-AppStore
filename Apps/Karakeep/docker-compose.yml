  tips:
    before_install:
      en_US: |
        Set `NEXTAUTH_URL` to the address you will use to access Karakeep.
        Use long random strings for `NEXTAUTH_SECRET` and `MEILI_MASTER_KEY`, and keep the `MEILI_MASTER_KEY` identical in both `karakeep` and `meilisearch`.
        The first user to sign up on your instance becomes the admin.
      en_GB: |
        Set `NEXTAUTH_URL` to the address you will use to access Karakeep.
        Use long random strings for `NEXTAUTH_SECRET` and `MEILI_MASTER_KEY`, and keep the `MEILI_MASTER_KEY` identical in both `karakeep` and `meilisearch`.
        The first user to sign up on your instance becomes the admin.
      it_IT: |
        Imposta `NEXTAUTH_URL` con l'indirizzo che userai per accedere a Karakeep.
        Usa stringhe casuali lunghe per `NEXTAUTH_SECRET` e `MEILI_MASTER_KEY`, e mantieni `MEILI_MASTER_KEY` identico sia in `karakeep` sia in `meilisearch`.
        Il primo utente che si registra sulla tua istanza diventa amministratore.
      nb_NO: |
        Sett `NEXTAUTH_URL` til adressen du vil bruke for å få tilgang til Karakeep.
        Bruk lange tilfeldige strenger for `NEXTAUTH_SECRET` og `MEILI_MASTER_KEY`, og behold samme `MEILI_MASTER_KEY` i både `karakeep` og `meilisearch`.
        Den første brukeren som registrerer seg på instansen din blir administrator.
      zh_CN: |
        请将 `NEXTAUTH_URL` 设置为你实际访问 Karakeep 时使用的地址。
        请为 `NEXTAUTH_SECRET` 和 `MEILI_MASTER_KEY` 使用足够长的随机字符串，并确保 `karakeep` 与 `meilisearch` 两个服务中的 `MEILI_MASTER_KEY` 保持一致。
        你的实例中第一个注册的用户会成为管理员。
      ja_JP: |
        `NEXTAUTH_URL` は、Karakeep にアクセスするときに実際に使うアドレスへ設定してください。
        `NEXTAUTH_SECRET` と `MEILI_MASTER_KEY` には十分に長いランダム文字列を使用し、`karakeep` と `meilisearch` の `MEILI_MASTER_KEY` は同じ値に保ってください。
        このインスタンスで最初に登録したユーザーが管理者になります。
      ko_KR: |
        `NEXTAUTH_URL`은 Karakeep에 실제로 접속할 때 사용할 주소로 설정하세요.
        `NEXTAUTH_SECRET`와 `MEILI_MASTER_KEY`에는 충분히 긴 임의 문자열을 사용하고, `karakeep`과 `meilisearch` 두 서비스의 `MEILI_MASTER_KEY` 값은 같게 유지하세요.
        인스턴스에 처음 가입하는 사용자가 관리자가 됩니다.
      fr_FR: |
        Définissez `NEXTAUTH_URL` sur l'adresse que vous utiliserez pour accéder à Karakeep.
        Utilisez de longues chaînes aléatoires pour `NEXTAUTH_SECRET` et `MEILI_MASTER_KEY`, et gardez le même `MEILI_MASTER_KEY` dans `karakeep` et `meilisearch`.
        Le premier utilisateur qui s'inscrit sur votre instance devient administrateur.
      de_DE: |
        Setzen Sie `NEXTAUTH_URL` auf die Adresse, unter der Sie Karakeep aufrufen werden.
        Verwenden Sie lange Zufallszeichenfolgen für `NEXTAUTH_SECRET` und `MEILI_MASTER_KEY`, und halten Sie `MEILI_MASTER_KEY` in `karakeep` und `meilisearch` identisch.
        Der erste Benutzer, der sich auf Ihrer Instanz registriert, wird Administrator.
      sv_SE: |
        Sätt `NEXTAUTH_URL` till den adress du kommer att använda för att nå Karakeep.
        Använd långa slumpmässiga strängar för `NEXTAUTH_SECRET` och `MEILI_MASTER_KEY`, och behåll samma `MEILI_MASTER_KEY` i både `karakeep` och `meilisearch`.
        Den första användaren som registrerar sig på din instans blir administratör.
      el_GR: |
        Ορίστε το `NEXTAUTH_URL` στη διεύθυνση που θα χρησιμοποιείτε για πρόσβαση στο Karakeep.
        Χρησιμοποιήστε μεγάλες τυχαίες συμβολοσειρές για τα `NEXTAUTH_SECRET` και `MEILI_MASTER_KEY`, και κρατήστε το `MEILI_MASTER_KEY` ίδιο στα `karakeep` και `meilisearch`.
        Ο πρώτος χρήστης που θα εγγραφεί στο instance σας γίνεται διαχειριστής.
      hr_HR: |
        Postavite `NEXTAUTH_URL` na adresu koju ćete koristiti za pristup Karakeepu.
        Koristite duge nasumične nizove za `NEXTAUTH_SECRET` i `MEILI_MASTER_KEY`, a `MEILI_MASTER_KEY` neka bude isti u servisima `karakeep` i `meilisearch`.
        Prvi korisnik koji se registrira na vašoj instanci postaje administrator.
      pt_PT: |
        Defina `NEXTAUTH_URL` para o endereço que vai usar para aceder ao Karakeep.
        Use cadeias aleatórias longas para `NEXTAUTH_SECRET` e `MEILI_MASTER_KEY`, e mantenha o mesmo `MEILI_MASTER_KEY` em `karakeep` e `meilisearch`.
        O primeiro utilizador a registar-se na sua instância torna-se administrador.
      ru_RU: |
        Установите `NEXTAUTH_URL` в адрес, который вы будете использовать для доступа к Karakeep.
        Используйте длинные случайные строки для `NEXTAUTH_SECRET` и `MEILI_MASTER_KEY`, и сохраняйте одинаковое значение `MEILI_MASTER_KEY` в `karakeep` и `meilisearch`.
        Первый пользователь, зарегистрировавшийся в вашем экземпляре, становится администратором.
      tr_TR: |
        `NEXTAUTH_URL` değerini, Karakeep'e erişmek için kullanacağınız adrese ayarlayın.
        `NEXTAUTH_SECRET` ve `MEILI_MASTER_KEY` için uzun rastgele dizeler kullanın ve `MEILI_MASTER_KEY` değerini hem `karakeep` hem de `meilisearch` hizmetlerinde aynı tutun.
        Örneğinizde kaydolan ilk kullanıcı yönetici olur.
