      Built around long-term content preservation, Linkwarden can automatically capture webpage screenshots, PDFs, and full HTML files to help prevent link rot. It also includes reading mode, annotations, local AI-powered tagging, full-text search, and a multi-level classification system for smarter and more efficient information management. Its modular architecture supports self-hosting, browser extensions, and cross-device sync.

      In practice, Linkwarden is suitable not only for personal knowledge management and content collection, but also for team collaboration and shared curation. With collections and permission controls, users can organize content together and manage it publicly or privately. It is a modern bookmarking tool that balances data ownership, security, and collaboration.

      **Key Features:**

      - Full webpage archiving (screenshots, PDFs, HTML) to prevent link rot
      - AI-powered auto-tagging and full-text search
      - Reading mode, text highlighting, and annotations
      - Multi-level categories and tags for flexible organization
      - Team collaboration and permission management

      **Learn more:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    fr_FR: |
      Linkwarden est une plateforme open source auto-hébergée de gestion de favoris et d’archivage web, conçue pour aider les utilisateurs à collecter, organiser et conserver durablement les contenus importants du Web. Au-delà des fonctions classiques de favoris, elle permet de sauvegarder intégralement les pages afin de garder les informations précieuses accessibles dans le temps.

      Axé sur la préservation à long terme du contenu, Linkwarden peut capturer automatiquement des captures d’écran de pages, des PDF et des fichiers HTML complets pour lutter contre la disparition des liens. Il propose également un mode lecture, des annotations, un étiquetage local assisté par IA, une recherche plein texte et un système de classification multi-niveaux pour une organisation plus intelligente et plus efficace.

      Dans la pratique, Linkwarden convient aussi bien à la gestion personnelle des connaissances qu’à la collaboration d’équipe et au partage de contenus. Grâce aux collections et aux permissions, les utilisateurs peuvent organiser les contenus ensemble et les gérer en mode public ou privé. C’est un outil de favoris moderne qui combine contrôle des données, sécurité et collaboration.

      **Fonctionnalités principales :**

      - Archivage complet des pages web (captures, PDF, HTML) pour éviter la perte des liens
      - Étiquetage automatique par IA et recherche plein texte
      - Mode lecture, surlignage de texte et annotations
      - Catégories et étiquettes multi-niveaux
      - Collaboration d’équipe et gestion des permissions

      **En savoir plus :**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    hr_HR: |
      Linkwarden je open-source self-hosted platforma za upravljanje oznakama i arhiviranje web sadržaja, osmišljena kako bi korisnicima pomogla prikupljati, organizirati i dugoročno sačuvati važan internetski sadržaj. Uz klasične mogućnosti spremanja oznaka, nudi i potpuno sigurnosno kopiranje web stranica kako bi vrijedne informacije ostale dostupne kroz vrijeme.

      Usmjeren na dugotrajno očuvanje sadržaja, Linkwarden podržava automatsko spremanje snimki zaslona web stranica, PDF-ova i potpunih HTML datoteka, čime učinkovito sprječava propadanje poveznica. Također uključuje način čitanja, bilješke, lokalno AI označavanje, pretraživanje cijelog teksta i višerazinski sustav kategorizacije za pametnije i učinkovitije upravljanje informacijama.

      U praksi je Linkwarden prikladan i za osobno upravljanje znanjem i za timsku suradnju te dijeljenje sadržaja. Uz kolekcije i dozvole, korisnici mogu zajednički organizirati sadržaj te ga upravljati javno ili privatno. To je moderan alat za oznake koji povezuje kontrolu nad podacima, sigurnost i suradnju.

      **Glavne značajke:**

      - Potpuno arhiviranje web stranica (snimke zaslona, PDF, HTML) za sprječavanje nestanka poveznica
      - Automatsko AI označavanje i pretraživanje cijelog teksta
      - Način čitanja, označavanje teksta i bilješke
      - Višerazinske kategorije i oznake
      - Timska suradnja i upravljanje dozvolama

      **Saznajte više:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    it_IT: |
      Linkwarden è una piattaforma open source self-hosted per la gestione dei segnalibri e l’archiviazione del web, pensata per aiutare gli utenti a raccogliere, organizzare e conservare nel tempo contenuti online importanti. Oltre alle classiche funzioni di bookmarking, offre il backup completo delle pagine web così che le informazioni preziose restino accessibili in modo sicuro.

      Basato sul principio della conservazione a lungo termine dei contenuti, Linkwarden supporta la cattura automatica di screenshot di pagine web, PDF e file HTML completi, aiutando a prevenire il link rot. Include anche modalità lettura, annotazioni, tagging locale con AI, ricerca full-text e un sistema di classificazione multilivello per una gestione delle informazioni più intelligente ed efficiente.

