  linkwarden-postgres:
    image: postgres:16-alpine
    container_name: linkwarden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc123
      POSTGRES_DB: linkwarden
      TZ: $TZ
    networks:
      - linkwarden-net
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d linkwarden
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          memory: 256m
    x-casaos:
      envs:
