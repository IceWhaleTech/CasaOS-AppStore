    ja_JP: |
      Linkwarden は、重要なオンラインコンテンツを一か所で収集・整理し、長期的に保存するための、オープンソースのセルフホスト型ブックマーク兼 Web アーカイブ管理プラットフォームです。一般的なブックマーク機能に加え、Web ページ全体のバックアップ機能により、価値ある情報へ継続的に安全にアクセスできます。

      長期保存を中心に設計されており、Web ページのスクリーンショット、PDF、完全な HTML ファイルを自動取得して、リンク切れの問題を軽減します。さらに、リーディングモード、注釈、ローカル AI による自動タグ付け、全文検索、多階層の分類システムを備え、より賢く効率的な情報管理を実現します。モジュール型アーキテクチャにより、セルフホスティング、ブラウザ拡張、複数端末での同期にも対応します。

      実際には、個人のナレッジ管理や情報収集だけでなく、チームでの共同整理や共有にも適しています。コレクションと権限設定により、コンテンツを共同で整理し、公開または非公開で管理できます。データ管理性・安全性・共同作業性を兼ね備えた、モダンなブックマークツールです。

      **主な機能:**

      - Web ページの完全アーカイブ（スクリーンショット、PDF、HTML）でリンク切れを防止
      - AI 自動タグ付けと全文検索
      - リーディングモード、テキストハイライト、注釈
      - 多階層カテゴリとタグによる柔軟な整理
      - チーム共同作業と権限管理

      **詳細:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    ko_KR: |
