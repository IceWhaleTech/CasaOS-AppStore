    tr_TR: |
      Linkwarden, kullanıcıların önemli çevrimiçi içerikleri tek bir yerde toplamasına, düzenlemesine ve uzun vadeli olarak korumasına yardımcı olmak için tasarlanmış, açık kaynaklı ve kendi sunucunda barındırılabilen bir yer imi ve web arşivi yönetim platformudur. Geleneksel yer imi özelliklerine ek olarak, değerli bilgilerin zaman içinde erişilebilir kalması için tam web sayfası yedekleme özelliği sunar.

      Uzun süreli içerik korumasını merkeze alan Linkwarden; web sayfası ekran görüntülerini, PDF dosyalarını ve tam HTML dosyalarını otomatik olarak kaydederek bağlantı çürümesi sorununu azaltır. Ayrıca okuma modu, not ekleme, yerel AI destekli otomatik etiketleme, tam metin arama ve çok seviyeli sınıflandırma sistemi ile bilgilerin daha akıllı ve verimli şekilde düzenlenmesini sağlar. Modüler yapısı sayesinde self-hosting, tarayıcı eklentileri ve çoklu cihaz senkronizasyonunu destekler.

      Uygulamada Linkwarden yalnızca kişisel bilgi yönetimi ve içerik toplama için değil, ekip iş birliği ve içerik paylaşımı için de uygundur. Koleksiyonlar ve izin kontrolleri sayesinde kullanıcılar içerikleri birlikte düzenleyebilir ve bunları herkese açık ya da özel olarak yönetebilir. Veri kontrolü, güvenlik ve iş birliğini bir araya getiren modern bir yer imi aracıdır.

      **Başlıca Özellikler:**

      - Bağlantı çürümesini önlemek için tam web sayfası arşivleme (ekran görüntüsü, PDF, HTML)
      - AI destekli otomatik etiketleme ve tam metin arama
      - Okuma modu, metin vurgulama ve notlar
      - Esnek düzenleme için çok seviyeli kategoriler ve etiketler
      - Ekip iş birliği ve izin yönetimi

      **Daha fazla bilgi:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    zh_CN: |
      Linkwarden 是一个开源的自托管书签与网页归档管理平台，旨在帮助用户集中收集、整理并长期保存重要的网络内容。它不仅提供传统书签管理能力，还通过网页完整备份机制，让用户能够在一个统一空间中安全存储和访问有价值的信息资源。

      该项目以“内容持久化”为核心理念，支持自动抓取网页截图、PDF 以及完整 HTML 文件，从根本上缓解链接失效（Link Rot）问题。同时，Linkwarden 提供阅读模式与批注功能，并结合本地 AI 自动标签、全文搜索与多层级分类体系，使信息组织更加智能与高效。此外，其模块化架构支持自托管部署、浏览器扩展与多端同步，兼顾灵活性与可扩展性。

      在实际应用中，Linkwarden 不仅适用于个人知识管理与信息收藏，也适合团队协作与内容共享场景。用户可以通过集合与权限系统进行协同整理，并将整理后的内容公开或私有化管理，是一个兼顾数据掌控、安全性与协作能力的现代化书签工具。

      **主要功能：**

      - 网页完整归档（截图、PDF、HTML），防止链接失效
      - AI 自动标签与全文搜索，提升信息检索效率
      - 支持阅读模式、文本高亮与批注功能
      - 多级分类与标签体系，灵活组织内容
      - 团队协作与权限管理，支持共享与公开集合

      **了解更多：**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)
