  tagline:
    de_DE: Selbstgehosteter kollaborativer Lesezeichen-Manager zum Sammeln, Lesen, Kommentieren und vollständigen Bewahren wichtiger Inhalte an einem Ort.
    el_GR: Αυτοφιλοξενούμενος συνεργατικός διαχειριστής σελιδοδεικτών για συλλογή, ανάγνωση, σχολιασμό και πλήρη διατήρηση όσων έχουν σημασία, όλα σε ένα μέρος.
    en_GB: Self-hosted collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place.
    en_US: Self-hosted collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place.
    fr_FR: Gestionnaire collaboratif de favoris auto-hébergé pour collecter, lire, annoter et préserver intégralement l’essentiel en un seul endroit.
    hr_HR: Samostalno hostiran suradnički upravitelj knjižnim oznakama za prikupljanje, čitanje, bilježenje i potpuno očuvanje važnog sadržaja na jednom mjestu.
    it_IT: Gestore collaborativo di segnalibri self-hosted per raccogliere, leggere, annotare e conservare completamente ciò che conta, tutto in un unico posto.
    ja_JP: 収集・閲覧・注釈・完全保存を1か所で行える、セルフホスト型の共同ブックマーク管理ツール。
    ko_KR: 중요한 콘텐츠를 한곳에서 수집하고, 읽고, 주석을 달고, 완전하게 보존할 수 있는 셀프호스팅 협업 북마크 관리자입니다.
    nb_NO: Selvhostet samarbeidsbasert bokmerkebehandler for å samle, lese, annotere og fullstendig bevare det som betyr noe, alt på ett sted.
    pt_PT: Gestor colaborativo de marcadores autoalojado para recolher, ler, anotar e preservar totalmente o que importa, tudo num só lugar.
    ru_RU: Самостоятельно размещаемый совместный менеджер закладок для сбора, чтения, аннотирования и полного сохранения важного контента в одном месте.
    sv_SE: Självhostad samarbetsbaserad bokmärkeshanterare för att samla, läsa, annotera och bevara det som är viktigt på ett och samma ställe.
    tr_TR: Önemli içerikleri tek bir yerde toplamak, okumak, not eklemek ve tamamen korumak için kendi sunucunda barındırılan işbirlikçi yer imi yöneticisi.
    zh_CN: 自托管协作式书签管理器，可在一个地方收集、阅读、批注并完整保存重要内容。

  description:
    de_DE: |
      Linkwarden ist eine Open-Source-Plattform zur selbstgehosteten Verwaltung von Lesezeichen und Webarchiven. Sie hilft Nutzern dabei, wichtige Online-Inhalte zentral zu sammeln, zu organisieren und langfristig zu bewahren. Neben klassischen Lesezeichenfunktionen bietet sie einen vollständigen Sicherungsmechanismus für Webseiten, damit wertvolle Informationen sicher in einem einheitlichen Arbeitsbereich gespeichert und abgerufen werden können.

      Das Projekt stellt die langfristige Erhaltung von Inhalten in den Mittelpunkt und unterstützt automatische Erfassung von Webseiten-Screenshots, PDFs und vollständigen HTML-Dateien, um Link-Verfall wirksam zu vermeiden. Zusätzlich bietet Linkwarden einen Lesemodus, Anmerkungen, lokale KI-Tagging-Funktionen, Volltextsuche und ein mehrstufiges Kategoriesystem, wodurch Informationen intelligenter und effizienter organisiert werden können. Dank seiner modularen Architektur unterstützt es Self-Hosting, Browser-Erweiterungen und Synchronisierung über mehrere Geräte hinweg.

      In der Praxis eignet sich Linkwarden nicht nur für persönliches Wissensmanagement und das Sammeln von Informationen, sondern auch für Teamarbeit und gemeinsames Teilen von Inhalten. Mit Sammlungen und Berechtigungssystemen können Inhalte gemeinsam organisiert sowie öffentlich oder privat verwaltet werden. Es ist ein modernes Lesezeichen-Tool, das Datenkontrolle, Sicherheit und Zusammenarbeit miteinander verbindet.

      **Hauptfunktionen:**

      - Vollständige Webseiten-Archivierung (Screenshot, PDF, HTML) gegen Link-Verfall
      - KI-gestützte automatische Tags und Volltextsuche für schnellere Recherche
      - Lesemodus, Textmarkierungen und Anmerkungen
      - Mehrstufige Kategorien und Tags zur flexiblen Organisation
      - Teamzusammenarbeit und Berechtigungsverwaltung mit Freigabeoptionen

      **Mehr erfahren:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    el_GR: |
      Το Linkwarden είναι μια ανοιχτού κώδικα, self-hosted πλατφόρμα διαχείρισης σελιδοδεικτών και αρχειοθέτησης ιστοσελίδων, σχεδιασμένη ώστε να βοηθά τους χρήστες να συλλέγουν, να οργανώνουν και να διατηρούν σημαντικό διαδικτυακό περιεχόμενο σε βάθος χρόνου. Εκτός από τις κλασικές λειτουργίες σελιδοδεικτών, προσφέρει πλήρες αντίγραφο ιστοσελίδων ώστε οι πολύτιμες πληροφορίες να παραμένουν προσβάσιμες σε έναν ενιαίο χώρο.

      Με βασική φιλοσοφία τη μακροχρόνια διατήρηση περιεχομένου, υποστηρίζει αυτόματη αποθήκευση στιγμιότυπων ιστοσελίδων, PDF και πλήρων αρχείων HTML, αντιμετωπίζοντας αποτελεσματικά το πρόβλημα του link rot. Παράλληλα προσφέρει λειτουργία ανάγνωσης, σημειώσεις, τοπικό AI tagging, πλήρη αναζήτηση κειμένου και πολυεπίπεδη οργάνωση κατηγοριών, ώστε η διαχείριση πληροφοριών να γίνεται πιο έξυπνα και αποτελεσματικά.

      Στην πράξη, το Linkwarden είναι κατάλληλο τόσο για προσωπική διαχείριση γνώσης όσο και για ομαδική συνεργασία και κοινή χρήση περιεχομένου. Μέσω συλλογών και δικαιωμάτων πρόσβασης, οι χρήστες μπορούν να οργανώνουν συνεργατικά το υλικό τους και να το διαχειρίζονται δημόσια ή ιδιωτικά. Είναι ένα σύγχρονο εργαλείο σελιδοδεικτών που συνδυάζει έλεγχο δεδομένων, ασφάλεια και συνεργασία.

      **Κύρια χαρακτηριστικά:**

      - Πλήρης αρχειοθέτηση ιστοσελίδων (στιγμιότυπο, PDF, HTML) για αποφυγή απώλειας συνδέσμων
      - Αυτόματες ετικέτες με AI και πλήρης αναζήτηση κειμένου
      - Λειτουργία ανάγνωσης, υπογράμμιση κειμένου και σημειώσεις
      - Πολυεπίπεδες κατηγορίες και ετικέτες
      - Συνεργασία ομάδας και διαχείριση δικαιωμάτων

      **Περισσότερα:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

    en_GB: |
      Linkwarden is an open-source self-hosted bookmark and web archive manager designed to help users collect, organise, and preserve important online content in one place. In addition to traditional bookmarking capabilities, it provides full webpage backup so valuable information remains safely accessible over time.

      Built around long-term content preservation, Linkwarden can automatically capture webpage screenshots, PDFs, and full HTML files to help prevent link rot. It also includes reading mode, annotations, local AI-powered tagging, full-text search, and a multi-level classification system for smarter and more efficient information management. Its modular architecture supports self-hosting, browser extensions, and cross-device sync.

      In practice, Linkwarden is suitable not only for personal knowledge management and content collection, but also for team collaboration and shared curation. With collections and permission controls, users can organise content together and manage it publicly or privately. It is a modern bookmarking tool that balances data ownership, security, and collaboration.

      **Key Features:**

      - Full webpage archiving (screenshots, PDFs, HTML) to prevent link rot
      - AI-powered auto-tagging and full-text search
      - Reading mode, text highlighting, and annotations
      - Multi-level categories and tags for flexible organisation
      - Team collaboration and permission management

      **Learn more:**

      - [Linkwarden GitHub](https://github.com/linkwarden/linkwarden)

