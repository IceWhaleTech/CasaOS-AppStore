  version: "1.27.1"
  updateAt: "2025-09-27"
  releaseNotes:
    en_US: |-
      - 1.27.1 is a security and bug-fix release for the 1.27.x series.
      - It keeps sort/order criteria after marking articles as read and adds Docker healthcheck support.
      - Security fixes include login session regeneration, stricter language handling, cURL restrictions, and CSRF fixes.
    en_GB: |-
      - 1.27.1 is a security and bug-fix release for the 1.27.x series.
      - It keeps sort/order criteria after marking articles as read and adds Docker healthcheck support.
      - Security fixes include login session regeneration, stricter language handling, cURL restrictions, and CSRF fixes.
    it_IT: |-
      - 1.27.1 è una versione di sicurezza e bug-fix per la serie 1.27.x.
      - Mantiene i criteri di ordinamento/ordinamento dopo aver contrassegnato gli articoli come letti e aggiunge il supporto per il controllo dello stato Docker.
      - Le correzioni di sicurezza includono la rigenerazione della sessione di accesso, una gestione più rigorosa della lingua, restrizioni cURL e correzioni CSRF.
    nb_NO: |-
      - 1.27.1 er en sikkerhets- og bug-fix-utgivelse for 1.27.x-serien.
      - Den beholder sorterings-/rekkefølgekriterier etter å ha merket artikler som lest og legger til Docker helsesjekkstøtte.
      - Sikkerhetsrettinger inkluderer regenerering av påloggingsøkt, strengere språkhåndtering, cURL-begrensninger og CSRF-rettinger.
    zh_CN: |-
      - 1.27.1 是 1.27.x 系列的安全和错误修复版本。
      - 标记文章为已读后会保留排序/顺序条件，并增加了 Docker healthcheck 支持。
      - 安全修复包括登录会话重新生成、更严格的语言处理、cURL 限制和 CSRF 修复。
    ja_JP: |-
      - 1.27.1 は 1.27.x 系列のセキュリティおよびバグ修正リリースです。
      - 記事を既読にした後も並び替え/順序条件を保持し、Docker healthcheck サポートを追加します。
      - セキュリティ修正には、ログインセッション再生成、より厳格な言語処理、cURL 制限、CSRF 修正が含まれます。
    ko_KR: |-
      - 1.27.1은 1.27.x 시리즈의 보안 및 버그 수정 릴리스입니다.
      - 글을 읽음으로 표시한 뒤 정렬/순서 조건을 유지하고 Docker healthcheck 지원을 추가합니다.
      - 보안 수정에는 로그인 세션 재생성, 더 엄격한 언어 처리, cURL 제한, CSRF 수정이 포함됩니다.
    fr_FR: |-
      - 1.27.1 est une version de sécurité et de correction de bugs pour la série 1.27.x.
      - Elle conserve les critères de tri/ordre après le marquage des articles comme lus et ajoute la prise en charge du Docker healthcheck.
      - Les correctifs de sécurité incluent la régénération de session de connexion, une gestion plus stricte des langues, des restrictions cURL et des corrections CSRF.
    de_DE: |-
      - 1.27.1 ist ein Sicherheits- und Fehlerbehebungsrelease für die 1.27.x-Serie.
      - Sortier-/Reihenfolgekriterien bleiben nach dem Markieren von Artikeln als gelesen erhalten, und Docker-Healthcheck-Unterstützung wurde hinzugefügt.
      - Sicherheitskorrekturen umfassen Login-Session-Regeneration, strengere Sprachbehandlung, cURL-Einschränkungen und CSRF-Korrekturen.
    sv_SE: |-
      - 1.27.1 är en säkerhets- och bug-fix-version för 1.27.x-serien.
      - Den behåller sorterings-/ordningskriterier efter att ha markerat artiklar som lästa och lägger till Docker hälsokontrollstöd.
      - Säkerhetskorrigeringar inkluderar regenerering av inloggningssessioner, strängare språkhantering, cURL-begränsningar och CSRF-fixar.
    el_GR: |-
      - Το 1.27.1 είναι μια έκδοση ασφαλείας και bug-fix για τη σειρά 1.27.x.
      - Διατηρεί τα κριτήρια ταξινόμησης/παραγγελίας μετά την επισήμανση άρθρων ως αναγνωσμένων και προσθέτει υποστήριξη υγειονομικού ελέγχου Docker.
      - Οι διορθώσεις ασφαλείας περιλαμβάνουν αναγέννηση περιόδου σύνδεσης σύνδεσης, αυστηρότερο χειρισμό γλώσσας, περιορισμούς cURL και διορθώσεις CSRF.
    hr_HR: |-
      - 1.27.1 je sigurnosno i bug-fix izdanje za seriju 1.27.x.
      - Čuva kriterije sortiranja/redoslijeda nakon označavanja članaka kao pročitanih i dodaje podršku za provjeru stanja Docker.
      - Sigurnosni popravci uključuju regeneraciju sesije prijave, strože rukovanje jezikom, ograničenja cURL-a i popravke CSRF.
    pt_PT: |-
      - 1.27.1 é uma versão de segurança e bug-fix para a série 1.27.x.
      - Mantém os critérios de classificação/ordem após marcar os artigos como lidos e adiciona suporte à verificação de saúde Docker.
      - As correções de segurança incluem a regeneração da sessão de login, tratamento de linguagem mais rigoroso, restrições cURL e correções CSRF.
    ru_RU: |-
      - 1.27.1 — это выпуск безопасности и bug-fix для серии 1.27.x.
      - Он сохраняет критерии сортировки/порядка после пометки статей как прочитанных и добавляет поддержку проверки работоспособности Docker.
      - Исправления безопасности включают повторную генерацию сеанса входа в систему, более строгую обработку языка, ограничения cURL и исправления CSRF.
    tr_TR: |-
      - 1.27.1, 1.27.x serisi için bir menkul kıymet ve bug-fix sürümüdür.
      - Makaleleri okundu olarak işaretledikten sonra sıralama/sıralama kriterlerini korur ve Docker sağlık kontrolü desteği ekler.
      - Güvenlik düzeltmeleri, oturum açma oturumunun yeniden oluşturulmasını, daha katı dil yönetimini, cURL kısıtlamalarını ve CSRF düzeltmelerini içerir.
