name: stremio
services:
  stremio:
    container_name: stremio
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - NO_CORS=1
      - AUTO_SERVER_URL=1
    devices:
      - /dev/dri:/dev/dri
    image: tsaridas/stremio-docker:v1.2.5
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /root/.stremio-server
    ports:
      - target: 11470
        published: "11470"
        protocol: tcp
      - target: 8080
        published: "8100"
        protocol: tcp
    restart: unless-stopped
    network_mode: bridge
    privileged: false
    x-casaos:
      ports:
        - container: "11470"
          description:
            en_us: Server Port
            pt_br: Porta do Server
            zh_cn: Server HTTP端口
          protocol: tcp
        - container: "8100"
          description:
            en_us: WebUI HTTPS Port
            pt_br: Porta da WebUI
            zh_cn: WebUI HTTPS端口
          protocol: tcp
      envs:
        - container: NO_CORS
          description:
            en_us: CORS config.
            zh_cn: CORS配置
            pt_br: Configuração do CORS
        - container: AUTO_SERVER_URL
          description:
            en_us: Enables automatic server URL detection for remote clients.
            zh_cn: 为远程客户端启用自动服务器 URL 检测。
            pt_br: Habilita a detecção automática da URL do servidor para clientes remotos.
      volumes:
        - container: /root/.stremio-server
          description:
            en_us: Stremio config directory.
            zh_cn: Stremio配置目录
            pt_br: Diretório de configurações do Stremio

x-casaos:
  architectures:
    - amd64
    - arm64
  main: stremio
