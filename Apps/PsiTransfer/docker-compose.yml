  description:
    de_DE: |
      PsiTransfer ist ein einfacher, selbstgehosteter Open-Source-Dateifreigabedienst, mit dem Sie Dateien sicher und mühelos teilen können – ohne Registrierung.

      **Hauptfunktionen:**
      - **Keine Registrierung erforderlich:** Dateien sofort teilen, ohne ein Konto erstellen zu müssen.
      - **Datenschutz und Kontrolle:** Alle Dateien werden auf Ihrem eigenen Server gespeichert, damit Sie die volle Kontrolle über Ihre Daten haben.
      - **Passwortschutz:** Schützen Sie freigegebene Dateien mit einem Passwort für zusätzliche Sicherheit.
      - **Ablaufzeit für Uploads:** Legen Sie fest, dass hochgeladene Dateien nach einer bestimmten Zeit automatisch ablaufen, um Speicherplatz zu sparen.
      - **Administrationsbereich:** Verwalten Sie alle Uploads über ein übersichtliches Admin-Panel.
      - **Zustellungsziel:** Dateien an vordefinierte E-Mail-Adressen senden (Konfiguration erforderlich).
      - **Responsives Web-Interface:** Sauberes und benutzerfreundliches Design, das auf allen Geräten perfekt funktioniert.

      **Mehr erfahren:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    el_GR: |
      Το PsiTransfer είναι μια απλή, αυτο-φιλοξενούμενη υπηρεσία κοινής χρήσης αρχείων ανοιχτού κώδικα που σας επιτρέπει να μοιράζεστε αρχεία με ασφάλεια και ευκολία χωρίς εγγραφή.

      **Κύρια χαρακτηριστικά:**
      - **Χωρίς εγγραφή:** Μοιραστείτε αρχεία αμέσως χωρίς να δημιουργήσετε λογαριασμό.
      - **Απόρρητο και έλεγχος:** Όλα τα αρχεία αποθηκεύονται στον δικό σας διακομιστή, δίνοντάς σας πλήρη έλεγχο των δεδομένων σας.
      - **Προστασία με κωδικό:** Προστατέψτε τα κοινόχρηστα αρχεία με κωδικό πρόσβασης για επιπλέον ασφάλεια.
      - **Λήξη μεταφόρτωσης:** Ορίστε τα μεταφορτωμένα αρχεία να λήγουν αυτόματα μετά από συγκεκριμένο χρονικό διάστημα για εξοικονόμηση χώρου αποθήκευσης.
      - **Πίνακας διαχείρισης:** Διαχειριστείτε όλες τις μεταφορτώσεις μέσω ενός κομψού πίνακα διαχείρισης.
      - **Προορισμός παράδοσης:** Στείλτε αρχεία σε προκαθορισμένες διευθύνσεις email (απαιτείται διαμόρφωση).
      - **Responsive διεπαφή ιστού:** Καθαρή και φιλική διεπαφή που λειτουργεί τέλεια σε όλες τις συσκευές.

      **Μάθετε περισσότερα:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    en_GB: |
      PsiTransfer is a simple, self-hosted open-source file sharing service that allows you to share files securely and easily without registration.

      **Key Features:**
      - **No Registration Required:** Share files instantly without creating an account.
      - **Privacy and Control:** All files are stored on your own server, giving you complete control over your data.
      - **Password Protection:** Protect shared files with a password for enhanced security.
      - **Upload Expiry:** Set uploaded files to automatically expire after a specific time to save storage space.
      - **Admin Panel:** Manage all uploads through a clean admin panel.
      - **Delivery Target:** Send files to predefined email addresses (configuration required).
      - **Responsive Web Interface:** Clean and user-friendly interface that works perfectly on all devices.

      **Learn More:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    en_US: |
      PsiTransfer is a simple, self-hosted open-source file sharing service that allows you to share files securely and easily without registration.

      **Key Features:**
      - **No Registration Required:** Share files instantly without creating an account.
      - **Privacy and Control:** All files are stored on your own server, giving you complete control over your data.
      - **Password Protection:** Protect shared files with a password for enhanced security.
      - **Upload Expiry:** Set uploaded files to automatically expire after a specific time to save storage space.
      - **Admin Panel:** Manage all uploads through a clean admin panel.
      - **Delivery Target:** Send files to predefined email addresses (configuration required).
      - **Responsive Web Interface:** Clean and user-friendly interface that works perfectly on all devices.

      **Learn More:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    fr_FR: |
      PsiTransfer est un service simple de partage de fichiers open source auto-hébergé qui vous permet de partager des fichiers de manière sécurisée et facile sans inscription.

      **Fonctionnalités principales :**
      - **Aucune inscription requise :** Partagez des fichiers instantanément sans créer de compte.
      - **Confidentialité et contrôle :** Tous les fichiers sont stockés sur votre propre serveur, vous donnant un contrôle total sur vos données.
      - **Protection par mot de passe :** Protégez les fichiers partagés avec un mot de passe pour une sécurité renforcée.
      - **Expiration des uploads :** Définissez une expiration automatique des fichiers après un certain temps pour économiser l'espace de stockage.
      - **Panneau d'administration :** Gérez tous les uploads via un panneau d'administration élégant.
      - **Cible de livraison :** Envoyez des fichiers vers des adresses email prédéfinies (configuration requise).
      - **Interface web responsive :** Interface propre et conviviale qui fonctionne parfaitement sur tous les appareils.

      **En savoir plus :**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    hr_HR: |
      PsiTransfer je jednostavna, samo-hostana usluga za dijeljenje datoteka otvorenog koda koja vam omogućuje sigurno i jednostavno dijeljenje datoteka bez registracije.

      **Ključne značajke:**
      - **Bez registracije:** Dijelite datoteke odmah bez kreiranja računa.
      - **Privatnost i kontrola:** Sve su datoteke pohranjene na vašem vlastitom poslužitelju, dajući vam potpunu kontrolu nad vašim podacima.
      - **Zaštita lozinkom:** Zaštitite dijeljene datoteke lozinkom za poboljšanu sigurnost.
      - **Istek upload-a:** Postavite da se prenesene datoteke automatski brišu nakon određenog vremena kako biste uštedjeli prostor za pohranu.
      - **Administratorska ploča:** Upravljajte svim prijenosima putem čiste administratorske ploče.
      - **Cilj isporuke:** Pošaljite datoteke na unaprijed definirane email adrese (potrebna konfiguracija).
      - **Responzivno web sučelje:** Čisto i korisniku prilagođeno sučelje koje savršeno funkcionira na svim uređajima.

      **Saznajte više:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    it_IT: |
      PsiTransfer è un servizio semplice e auto-ospitato di condivisione file open source che ti permette di condividere file in modo sicuro e facile senza registrazione.

      **Funzionalità principali:**
      - **Nessuna registrazione richiesta:** Condividi file istantaneamente senza creare un account.
      - **Privacy e controllo:** Tutti i file vengono archiviati sul tuo server, dandoti il pieno controllo sui tuoi dati.
      - **Protezione con password:** Proteggi i file condivisi con una password per una sicurezza avanzata.
      - **Scadenza upload:** Imposta i file caricati per scadere automaticamente dopo un certo tempo per risparmiare spazio di archiviazione.
      - **Pannello di amministrazione:** Gestisci tutti i caricamenti tramite un pannello di amministrazione pulito.
      - **Destinazione di consegna:** Invia file a indirizzi email predefiniti (richiede configurazione).
      - **Interfaccia web responsive:** Interfaccia pulita e intuitiva che funziona perfettamente su tutti i dispositivi.

      **Scopri di più:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    ja_JP: |
      PsiTransferはシンプルでセルフト-hostedのオープンソースファイル共有サービスで、登録なしでファイルを安全かつ簡単に共有できます。

      **主な機能：**
      - **登録不要：**アカウントを作成せずに、ファイルを即座に共有できます。
      - **プライバシーとコントロール：**すべてのファイルは自分のサーバーに保存され、データへの完全なコントロールが得られます。
      - **パスワード保護：**共有ファイルにパスワードを設定して、セキュリティを強化できます。
      - **アップロード有効期限：**アップロードされたファイルが一定時間後に自動的に期限切れになるよう設定し、ストレージを節約できます。
      - **管理パネル：**清爽な管理パネルですべてのアップロードを管理できます。
      - **配信先：**事前定義されたメールアドレスにファイルを送信できます（設定が必要）。
      - **レスポンシブWebインターフェース：**すべてのデバイスで完璧に動作するクリーンでユーザーフレンドリーなインターフェース。

      **詳細を見る：**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    ko_KR: |
      PsiTransfer는 등록 없이 안전하고 쉽게 파일을 공유할 수 있는 간단한 자체 호스팅 오픈소스 파일 공유 서비스입니다.

      **주요 기능:**
      - **등록 불필요:** 계정을 생성하지 않고 즉시 파일을 공유할 수 있습니다.
      - **프라이버시 및 제어:** 모든 파일은 사용자의 자체 서버에 저장되어 데이터에 대한 완전한 제어를 제공합니다.
      - **비밀번호 보호:** 공유 파일을 비밀번호로 보호하여 보안을 강화합니다.
      - **업로드 만료:** 스토리지 공간을 절약하기 위해 업로드된 파일이 특정 시간이 지나면 자동으로 만료되도록 설정할 수 있습니다.
      - **관리자 패널:** 깔끔한 관리자 패널을 통해 모든 업로드를 관리할 수 있습니다.
      - **전송 대상:** 사전 정의된 이메일 주소로 파일을 보낼 수 있습니다(구성 필요).
      - **반응형 웹 인터페이스:** 모든 기기에서 완벽하게 작동하는 깔끔하고 사용자 친화적인 인터페이스입니다.

      **자세히 알아보기:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    nb_NO: |
      PsiTransfer er en enkel, selv-vertstjeneste for fildeling med åpen kildekode som lar deg dele filer sikkert og enkelt uten registrering.

      **Hovedfunksjoner:**
      - **Ingen registrering nødvendig:** Del filer umiddelbart uten å opprette en konto.
      - **Personvern og kontroll:** Alle filer lagres på din egen server, noe som gir deg full kontroll over dataene dine.
      - **Passordbeskyttelse:** Beskytt delte filer med et passord for forbedret sikkerhet.
      - **Opplastingsutløp:** Sett opplastede filer til å automatisk utløpe etter en bestemt tid for å spare lagringsplass.
      - **Administrasjonspanel:** Behandle alle opplastinger gjennom et rent administreringspanel.
      - **Leveringsmål:** Send filer til forhåndsdefinerte e-postadresser (konfigurasjon kreves).
      - **Responsiv webgrensesnitt:** Rent og brukervennlig grensesnitt som fungerer perfekt på alle enheter.

      **Lær mer:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    pt_PT: |
      PsiTransfer é um serviço simples de partilha de ficheiros open source auto-hospedado que lhe permite partilhar ficheiros de forma segura e fácil sem registo.

      **Funcionalidades principais:**
      - **Sem registo necessário:** Partilhe ficheiros instantaneamente sem criar uma conta.
      - **Privacidade e controlo:** Todos os ficheiros são armazenados no seu próprio servidor, dando-lhe controlo total sobre os seus dados.
      - **Proteção por palavra-passe:** Proteja ficheiros partilhados com uma palavra-passe para maior segurança.
      - **Expiração de uploads:** Defina ficheiros carregados para expirar automaticamente após um período específico para poupar espaço de armazenamento.
      - **Painel de administração:** Gerencie todos os uploads através de um painel de administração limpo.
      - **Destino de entrega:** Envie ficheiros para endereços de e-mail predefinidos (requer configuração).
      - **Interface web responsiva:** Interface limpa e amigável que funciona perfeitamente em todos os dispositivos.

      **Saiba mais:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    ru_RU: |
      PsiTransfer — это простой сервис для обмена файлами с открытым исходным кодом, который позволяет безопасно и легко делиться файлами без регистрации.

      **Основные функции:**
      - **Без регистрации:** Делитесь файлами мгновенно без создания учетной записи.
      - **Конфиденциальность и контроль:** Все файлы хранятся на вашем собственном сервере, что дает вам полный контроль над вашими данными.
      - **Защита паролем:** Защитите общие файлы паролем для повышения безопасности.
      - **Срок действия загрузок:** Установите автоматическое удаление загруженных файлов по истечении определенного времени для экономии места.
      - **Панель администратора:** Управляйте всеми загрузками через удобную панель администратора.
      - **Цель доставки:** Отправляйте файлы на предопределенные адреса электронной почты (требуется настройка).
      - **Адаптивный веб-интерфейс:** Чистый и удобный интерфейс, который отлично работает на всех устройствах.

      **Узнать больше:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    sv_SE: |
      PsiTransfer är en enkel, självvärd fildelningstjänst med öppen källkod som låter dig dela filer säkert och enkelt utan registrering.

      **Huvudfunktioner:**
      - **Ingen registrering krävs:** Dela filer direkt utan att skapa ett konto.
      - **Integritet och kontroll:** Alla filer lagras på din egen server, vilket ger dig fullständig kontroll över dina data.
      - **Lösenordsskydd:** Skydda delade filer med ett lösenord för förbättrad säkerhet.
      - **Uppladdningsförfall:** Ställ in uppladdade filer så att de automatiskt förfaller efter en viss tid för att spara lagringsutrymme.
      - **Administratörspanel:** Hantera alla uppladdningar genom en ren administratörspanel.
      - **Leveransmål:** Skicka filer till fördefinierade e-postadresser (konfiguration krävs).
      - **Responsiv webbgränssnitt:** Ren och användarvänlig gränssnitt som fungerar perfekt på alla enheter.

      **Läs mer:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    tr_TR: |
      PsiTransfer, kayıt olmadan dosyaları güvenli ve kolay bir şekilde paylaşmanızı sağlayan basit, kendi kendine barındırılan açık kaynaklı bir dosya paylaşım hizmetidir.

      **Temel Özellikler:**
      - **Kayıt Gerektirmez:** Hesap oluşturmadan dosyaları anında paylaşın.
      - **Gizlilik ve Kontrol:** Tüm dosyalar kendi sunucunuzda saklanır, böylece verileriniz üzerinde tam kontrole sahip olursunuz.
      - **Şifre Koruması:** Geliştirilmiş güvenlik için paylaşılan dosyaları bir şifreyle koruyun.
      - **Yükleme Süresi Dolumu:** Depolama alanından tasarruf etmek için yüklenen dosyaların belirli bir süre sonra otomatik olarak süresinin dolmasını ayarlayın.
      - **Yönetici Paneli:** Temiz bir yönetici paneli aracılığıyla tüm yüklemeleri yönetin.
      - **Teslimat Hedefi:** Dosyaları önceden tanımlanmış e-posta adreslerine gönderin (yapılandırma gerekli).
      - **Duyarlı Web Arayüzü:** Tüm cihazlarda mükemmel çalışan temiz ve kullanıcı dostu arayüz.

      **Daha Fazla Bilgi:**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
    zh_CN: |
      PsiTransfer 是一个简单、自托管的开源文件分享服务，让您无需注册即可安全、轻松地分享文件。

      **主要功能：**
      - **无需注册**：无需创建账户，即可即时分享文件。
      - **隐私与控制**：所有文件都存储在您自己的服务器上，让您完全掌控自己的数据。
      - **密码保护**：可为分享的文件设置密码，增强安全性。
      - **上传有效期**：可设置上传文件在特定时间后自动过期，以节省存储空间。
      - **管理面板**：通过简洁的管理面板管理所有上传文件。
      - **投递目标**：允许将文件发送到预定义的电子邮件地址（需配置）。
      - **响应式Web界面**：界面简洁友好，可在所有设备上完美运行。

      **了解更多：**
      - [PsiTransfer GitHub Repository](https://github.com/psi-4ward/psitransfer)
