    de_DE: Ein einfacher, quelloffener Dateifreigabe-Host.
    el_GR: Ένας απλός, ανοιχτού κώδικα host διαμοιρασμού αρχείων.
    en_GB: A simple, open-source file sharing host.
    en_US: A simple, open-source file sharing host.
