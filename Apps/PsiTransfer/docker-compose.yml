name: psitransfer
services:
  psitransfer:
    image: psitrax/psitransfer:v2.4.1
    container_name: psitransfer
    ports:
      - target: "3000"
        published: "13001"
        protocol: tcp
    environment:
      PSITRANSFER_ADMIN_PASS: secret
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /data
    deploy:
      resources:
        reservations:
          memory: 256M
    restart: unless-stopped
    x-casaos:
      envs:
        - container: PSITRANSFER_ADMIN_PASS
          description:
            de_DE: Passwort für den Administrator-Account.
            el_GR: Κωδικός πρόσβασης για τον λογαριασμό διαχειριστή.
            en_GB: Password for the administrator account.
            en_US: Password for the administrator account.
            fr_FR: Mot de passe pour le compte administrateur.
            hr_HR: Lozinka za administratorski račun.
            it_IT: Password per l\ account amministratore.
            ja_JP: 管理者アカウントのパスワード。
            ko_KR: 관리자 계정의 비밀번호.
            nb_NO: Passord for administratorkontoen.
            pt_PT: Palavra-passe para a conta de administrador.
            ru_RU: Пароль для учетной записи администратора.
            sv_SE: Lösenord för administratörskontot.
            tr_TR: Yönetici hesabı için şifre.
            zh_CN: 管理员账户的密码。
      ports:
        - container: "3000"
          description:
            de_DE: Web-UI und API-Port.
            el_GR: Θύρα για το Web UI και το API.
            en_GB: Web UI and API port.
            en_US: Web UI and API port.
            fr_FR: Port pour l\interface Web et l\API.
            hr_HR: Web UI i API port.
            it_IT: Porta per l\interfaccia Web e l\API.
            ja_JP: Web UIとAPIのポート。
            ko_KR: 웹 UI 및 API 포트.
            nb_NO: Web UI og API-port.
            pt_PT: Porta da interface Web e API.
            ru_RU: Порт для веб-интерфейса и API.
            sv_SE: Port för webbgränssnitt och API.
            tr_TR: Web arayüzü ve API portu.
            zh_CN: Web界面和API端口。
      volumes:
        - container: /data
          description:
            de_DE: Speicherort für hochgeladene Dateien und Anwendungsdaten.
            el_GR: Τοποθεσία αποθήκευσης για τα αρχεία που ανέβηκαν και τα δεδομένα της εφαρμογής.
            en_GB: Storage location for uploaded files and application data.
            en_US: Storage location for uploaded files and application data.
            fr_FR: Emplacement de stockage pour les fichiers téléchargés et les données de l\application.
            hr_HR: Lokacija za pohranu prenesenih datoteka i podataka aplikacije.
            it_IT: Posizione di archiviazione per i file caricati e i dati dell\applicazione.
            ja_JP: アップロードされたファイルとアプリケーションデータの保存場所。
            ko_KR: 업로드된 파일과 애플리케이션 데이터의 저장 위치.
            nb_NO: Lagringsplass for opplastede filer og applikasjonsdata.
            pt_PT: Local de armazenamento para ficheiros carregados e dados da aplicação.
            ru_RU: Место хранения загруженных файлов и данных приложения.
            sv_SE: Lagringsplats för uppladdade filer och applikationsdata.
            tr_TR: Yüklenen dosyaların ve uygulama verilerinin depolama konumu.
            zh_CN: 上传文件和应用数据的存储位置。
