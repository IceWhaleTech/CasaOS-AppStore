  updateAt: "2023-10-26"
  releaseNotes:
    en_US: |-
      - v2.13.2 adds quarter-value icons for history watch status.
      - A concurrent streams per day graph and metadata directory exporter field were added.
      - Notification and newsletter agent lists now show the last triggered time, and X-Plex-Language can be overridden in config.
    en_GB: |-
      - v2.13.2 adds quarter-value icons for history watch status.
      - A concurrent streams per day graph and metadata directory exporter field were added.
      - Notification and newsletter agent lists now show the last triggered time, and X-Plex-Language can be overridden in config.
    it_IT: |-
      - v2.13.2 aggiunge le icone quarter-value per lo stato di visualizzazione della cronologia.
      - Sono stati aggiunti un grafico dei flussi simultanei giornalieri e un campo di esportazione della directory dei metadati.
      - Gli elenchi degli agenti di notifica e newsletter ora mostrano l'ultima ora di attivazione e X-Plex-Language può essere sovrascritto nella configurazione.
    nb_NO: |-
      - v2.13.2 legger til quarter-value-ikoner for historikkstatus.
      - En samtidig graf for strømmer per dag og metadatakatalogeksportørfelt ble lagt til.
      - Lister over varslings- og nyhetsbrevagenter viser nå det siste utløste tidspunktet, og X-Plex-Language kan overstyres i konfig.
    zh_CN: |-
      - v2.13.2 为 history watch status 增加了 quarter-value icons。
      - 新增 concurrent streams per day graph 和 metadata directory exporter field。
      - Notification 和 newsletter agent 列表现在会显示 last triggered time，并且可以在 config 中覆盖 X-Plex-Language。
    ja_JP: |-
      - v2.13.2 は history watch status 向けの quarter-value icons を追加します。
      - concurrent streams per day graph と metadata directory exporter field が追加されました。
      - notification と newsletter agent の一覧は last triggered time を表示するようになり、X-Plex-Language は config で上書きできます。
    ko_KR: |-
      - v2.13.2는 history watch status용 quarter-value icons를 추가합니다.
      - concurrent streams per day graph와 metadata directory exporter field가 추가되었습니다.
      - notification 및 newsletter agent 목록은 이제 last triggered time을 표시하며 config에서 X-Plex-Language를 재정의할 수 있습니다.
    fr_FR: |-
      - v2.13.2 ajoute quarter-value icons pour history watch status.
      - Un concurrent streams per day graph et metadata directory exporter field ont ete ajoutes.
      - Les listes notification et newsletter agent affichent maintenant last triggered time, et X-Plex-Language peut etre remplace dans la configuration.
    de_DE: |-
      - v2.13.2 fuegt quarter-value icons fuer history watch status hinzu.
      - Ein concurrent streams per day graph und metadata directory exporter field wurden hinzugefuegt.
      - Notification- und newsletter agent-Listen zeigen nun last triggered time, und X-Plex-Language kann in der Konfiguration ueberschrieben werden.
    sv_SE: |-
      - v2.13.2 lägger till quarter-value-ikoner för historikbevakningsstatus.
      - En samtidig graf för strömmar per dag och fält för export av metadatakataloger lades till.
      - Aviserings- och nyhetsbrevsagentlistor visar nu den senaste utlösta tiden, och X-Plex-Language kan åsidosättas i konfigurationen.
    el_GR: |-
      - Το v2.13.2 προσθέτει εικονίδια quarter-value για την κατάσταση παρακολούθησης ιστορικού.
      - Προστέθηκε ένα γράφημα ταυτόχρονων ροών ανά ημέρα και πεδίο εξαγωγής καταλόγου μεταδεδομένων.
      - Οι λίστες πρακτόρων ειδοποιήσεων και ενημερωτικών δελτίων εμφανίζουν πλέον τον τελευταίο χρόνο ενεργοποίησης και το X-Plex-Language μπορεί να παρακαμφθεί στις ρυθμίσεις παραμέτρων.
    hr_HR: |-
      - v2.13.2 dodaje quarter-value ikone za status praćenja povijesti.
      - Dodani su grafikon istodobnih tokova po danu i polje za izvoz direktorija metapodataka.
      - Popisi agenata za obavijesti i biltene sada prikazuju zadnje aktivirano vrijeme, a X-Plex-Language se može nadjačati u konfiguraciji.
    pt_PT: |-
      - v2.13.2 adiciona ícones quarter-value para o estado de observação do histórico.
      - Foi adicionado um gráfico de fluxos simultâneos por dia e um campo exportador de diretório de metadados.
      - As listas de agentes de notificação e de newsletter mostram agora o último horário acionado e X-Plex-Language pode ser substituído na configuração.
    ru_RU: |-
      - v2.13.2 добавляет значки quarter-value для статуса просмотра истории.
      - Добавлен график одновременных потоков в день и поле экспорта каталога метаданных.
      - В списках агентов уведомлений и информационных бюллетеней теперь отображается время последнего срабатывания, а X-Plex-Language можно переопределить в конфигурации.
    tr_TR: |-
      - v2.13.2 geçmiş izleme durumu için quarter-value simgeleri ekler.
      - Günlük eş zamanlı akış grafiği ve meta veri dizini dışa aktarıcı alanı eklendi.
      - Bildirim ve haber bülteni aracısı listeleri artık en son tetiklenen zamanı gösteriyor ve X-Plex-Language, yapılandırmada geçersiz kılınabilir.
