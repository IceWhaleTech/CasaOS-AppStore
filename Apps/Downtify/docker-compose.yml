name: downtify
services:
  downtify:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/henriquesebastiao/downtify:2.6.0
    deploy:
      resources:
        reservations:
          memory: "2048M"
    ports:
      - target: 8000
        published: "8582"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/Downloads/downtify
        target: /downloads
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /data
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: for UserID
        - container: PGID
          description:
            en_us: for GroupID
        - container: TZ
          description:
            en_us: specify a timezone to use, see this list.
      volumes:
        - container: /downloads
          description:
            en_us: Directory where the files will be saved.
            pt_br: DiretГіrio onde os arquivos serГЈo salvos.
        - container: /data
          description:
            en_us: Directory where the app will save its data.
            pt_br: DiretГіrio onde o aplicativo salvarГЎ seus dados.
    container_name: downtify
x-casaos:
  architectures:
    - amd64
    - arm64
  main: downtify
  author: Henrique SebastiГЈo
  category: Downloader
  description:
    en_us: |
      With Downtify you can download Spotify musics containing album art, track names, album title and other metadata about the songs. Just copy the Spotify link, whether it's a single song, an album, etc. As soon as your downloads are complete you will be notified!
    pt_br: |
      Com o Downtify vocГӘ pode baixar mГәsicas do Spotify contendo capas de ГЎlbuns, nomes de faixas, tГӯtulos de ГЎlbuns e outros metadados sobre as mГәsicas. Basta copiar o link do Spotify, seja uma mГәsica Гәnica, um ГЎlbum, etc. Assim que seus downloads forem concluГӯdos, vocГӘ serГЎ notificado!
  developer: Henrique SebastiГЈo
  icon: https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/casaos-icon.png
  screenshot_link:
    - https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-1.png
    - https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-2.png
  tagline:
