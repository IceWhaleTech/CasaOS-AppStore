site_name: ZimaOS AppStore Docs
site_description: Development documentation for the ZimaOS AppStore repository and third-party stores.
repo_url: https://github.com/IceWhaleTech/CasaOS-AppStore
repo_name: IceWhaleTech/CasaOS-AppStore
docs_dir: ../../docs
site_dir: ../../site
exclude_docs: |
  README.md
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Home: index.md
            - Docs Development: README-mkdocs.md
            - Quick Start:
                - Overview: quick-start/overview.md
                - Repository Structure: quick-start/repository-structure.md
            - Guides:
                - Third-party Store Guide: guides/third-party-store-guide.md
                - Official Actions and Workflows: guides/official-actions-and-workflows.md
                - v1 to v2 Migration Checklist: guides/v1-to-v2-migration-checklist.md
            - Specifications:
                - Overview: specs/overview.md
                - Store Config: specs/store-config.md
                - Compose and x-casaos: specs/compose-and-x-casaos.md
                - Build Output: specs/build-output.md
                - Assets and i18n: specs/assets-and-i18n.md
            - Migration:
                - Overview: migration/overview.md
            - FAQ:
                - Overview: faq/overview.md
            - CI/CD:
                - Overview: cicd/overview.md
                - Validator Workflow: cicd/validator-workflow.md
                - Release Workflow: cicd/release-workflow.md
                - Release-store Workflow: cicd/release-store-workflow.md
        - locale: zh
          name: 简体中文
          build: true
          nav:
            - 首页: index.md
            - 文档开发: README-mkdocs.md
            - 快速开始:
                - 总览: quick-start/overview.md
                - 仓库结构: quick-start/repository-structure.md
            - 指南:
                - 第三方商店指南: guides/third-party-store-guide.md
                - 官方 Actions 与工作流复用指南: guides/official-actions-and-workflows.md
                - v1 到 v2 迁移清单: guides/v1-to-v2-migration-checklist.md
            - 规范:
                - 总览: specs/overview.md
                - Store Config: specs/store-config.md
                - Compose 与 x-casaos: specs/compose-and-x-casaos.md
                - 构建产物: specs/build-output.md
                - 资源与 i18n: specs/assets-and-i18n.md
            - 迁移:
                - 总览: migration/overview.md
            - FAQ:
                - 总览: faq/overview.md
            - CI/CD:
                - 总览: cicd/overview.md
                - Validator 工作流: cicd/validator-workflow.md
                - Release 工作流: cicd/release-workflow.md
                - Release-store 工作流: cicd/release-store-workflow.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IceWhaleTech/CasaOS-AppStore
