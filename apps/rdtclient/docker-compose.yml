name: rdtclient
services:
  rdtclient:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      UMASK: '002'
    cpu_shares: 50
    command: []
    container_name: rdtclient
    deploy:
      resources:
        reservations:
          memory: 64M
    image: rogerfar/rdtclient@sha256:a05f0427946a4c3c64dc9d556c017f9a181acec320ecf218b6334a1066c11d1f
    ports:
    - target: 6500
      published: '6500'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/Downloads
      target: /data/downloads
    - type: bind
      source: /DATA/AppData/$AppID/db
      target: /data/db
    network_mode: bridge
    privileged: false
x-casaos:
  app_id: org.icewhale.rdtclient
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/rdtclient/assets/icon.svg
  index: /
  port_map: '6500'
  scheme: http
  title:
    en_US: Real-Debrid Torrent Client
  version: 2.0.136
