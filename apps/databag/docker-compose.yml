name: databag
services:
  databag:
    image: balzack/databag@sha256:37c4ab38f64842afa44ed8aea0e47271112795180708f0cb7be8ee7c7defebac
    restart: unless-stopped
    ports:
    - target: 7000
      published: 7000
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/databag/data
      target: /var/lib/databag
    container_name: databag
x-casaos:
  app_id: org.icewhale.databag
  main: databag
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/databag/assets/icon.svg
  title:
    en_US: Databag
  port_map: '7000'
  version: 0.1.18
