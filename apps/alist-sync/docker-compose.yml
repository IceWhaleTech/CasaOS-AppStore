name: alist-sync
services:
  alist-sync:
    image: xjxjin/alist-sync@sha256:5b090b2b47f77db4f63b2502a597a64fd25634d53f5646ff75e7c7fd60762292
    container_name: alist-sync
    restart: unless-stopped
    ports:
    - 52441:52441
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /app/data
    environment:
    - TZ=Asia/Shanghai
x-casaos:
  app_id: org.icewhale.alistsync
  main: alist-sync
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/alist-sync/assets/icon.svg
  title:
    en_US: Alist-Sync
  port_map: '52441'
  version: 1.1.5
