name: weknora
services:
  weknora:
    image: wechatopenai/weknora-ui:v0.2.14
    container_name: weknora
    ports:
    - target: 80
      published: '1080'
      protocol: tcp
    environment:
    - MAX_FILE_SIZE_MB=50
    depends_on:
      app:
        condition: service_healthy
    networks:
    - weknora-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 128M
  app:
    image: wechatopenai/weknora-app:v0.2.14
    container_name: weknora-app
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/files
      target: /data/files
    deploy:
      resources:
        reservations:
          memory: 512M
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
    - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    - OTEL_SERVICE_NAME=WeKnora
    - OTEL_TRACES_EXPORTER=otlp
    - OTEL_METRICS_EXPORTER=none
    - OTEL_LOGS_EXPORTER=none
    - OTEL_PROPAGATORS=tracecontext,baggage
    - QDRANT_HOST=qdrant
    - QDRANT_PORT=6334
    - QDRANT_COLLECTION=weknora_embeddings
    - QDRANT_API_KEY=
    - QDRANT_USE_TLS=false
    - MINIO_ENDPOINT=minio:9000
    - MINIO_ACCESS_KEY_ID=minioadmin
    - MINIO_SECRET_ACCESS_KEY=minioadmin
    - MINIO_BUCKET_NAME=weknora
    - GIN_MODE=release
    - DISABLE_REGISTRATION=false
    - DB_DRIVER=postgres
    - DB_HOST=weknora-postgres
    - DB_PORT=5432
    - DB_USER=postgres
    - DB_PASSWORD=postgres123!@#
    - DB_NAME=WeKnora
    - TZ=$TZ
    - RETRIEVE_DRIVER=postgres
    - DOCREADER_ADDR=weknora-docreader:50051
    - STORAGE_TYPE=minio
    - LOCAL_STORAGE_BASE_DIR=/data/files
    - AUTO_RECOVER_DIRTY=true
    - OLLAMA_BASE_URL=http://host.docker.internal:11434
    - STREAM_MANAGER_TYPE=redis
    - REDIS_ADDR=weknora-redis:6379
    - REDIS_PASSWORD=redis123!@#
    - REDIS_DB=0
    - REDIS_PREFIX="stream:"
    - TENANT_AES_KEY=weknorarag-api-key-secret-secret
    - CONCURRENCY_POOL_SIZE=5
    - JWT_SECRET=weknora-jwt-secret
    - MAX_FILE_SIZE_MB=50
    depends_on:
      weknora-redis:
        condition: service_started
      weknora-postgres:
        condition: service_healthy
      weknora-docreader:
        condition: service_healthy
    networks:
    - weknora-network
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
  weknora-docreader:
    image: wechatopenai/weknora-docreader:v0.2.14
    container_name: weknora-docreader
    environment:
    - MAX_FILE_SIZE_MB=50
    - MINIO_ENDPOINT=minio:9000
    - MINIO_ACCESS_KEY_ID=minioadmin
    - MINIO_SECRET_ACCESS_KEY=minioadmin
    - MINIO_BUCKET_NAME=weknora
    deploy:
      resources:
        reservations:
          memory: 256M
    healthcheck:
      test:
      - CMD
      - grpc_health_probe
      - -addr=:50051
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - weknora-network
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
  weknora-postgres:
    image: paradedb/paradedb:v0.18.9-pg17
    container_name: weknora-postgres
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres123!@#
    - POSTGRES_DB=WeKnora
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /var/lib/postgresql/data
    networks:
    - weknora-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 512M
    restart: unless-stopped
    stop_grace_period: 1m
  weknora-redis:
    image: redis:7.0-alpine
    container_name: weknora-redis
    command:
    - redis-server
    - --requirepass redis123!@#
    - --appendonly
    - true
    deploy:
      resources:
        reservations:
          memory: 128M
    restart: unless-stopped
    networks:
    - weknora-network
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: weknora-minio
    ports:
    - target: 9000
      published: '19000'
      protocol: tcp
    - target: 9001
      published: '19001'
      protocol: tcp
    environment:
    - MINIO_ROOT_USER=minioadmin
    - MINIO_ROOT_PASSWORD=minioadmin
    deploy:
      resources:
        reservations:
          memory: 512M
    command:
    - server
    - /data
    - --console-address
    - :9001
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/minio-data
      target: /data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/live
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
    - weknora-network
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: weknora-jaeger
    ports:
    - target: 6831
      published: '46831'
      protocol: udp
    - target: 6832
      published: '46832'
      protocol: udp
    - target: 5778
      published: '45778'
      protocol: tcp
    - target: 16686
      published: '16686'
      protocol: tcp
    - target: 4317
      published: '44317'
      protocol: tcp
    - target: 4318
      published: '44318'
      protocol: tcp
    - target: 14250
      published: '14250'
      protocol: tcp
    - target: 14268
      published: '14268'
      protocol: tcp
    - target: 9411
      published: '49411'
      protocol: tcp
    environment:
    - COLLECTOR_OTLP_ENABLED=true
    - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    deploy:
      resources:
        reservations:
          memory: 512M
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/jaeger
      target: /var/lib/jaeger
    networks:
    - weknora-network
    restart: unless-stopped
  neo4j:
    image: neo4j:2025.10.1
    container_name: weknora-neo4j
    profiles:
    - neo4j
    - full
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/neo4j-data
      target: /data
    environment:
    - NEO4J_AUTH=neo4j/password
    - NEO4J_apoc_export_file_enabled=true
    - NEO4J_apoc_import_file_enabled=true
    - NEO4J_apoc_import_file_use__neo4j__config=true
    - NEO4JLABS_PLUGINS=["apoc"]
    ports:
    - target: 7474
      published: '47474'
      protocol: tcp
    - target: 7687
      published: '47687'
      protocol: tcp
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 256M
    networks:
    - weknora-network
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: weknora-qdrant
    profiles:
    - qdrant
    - full
    ports:
    - target: 6333
      published: '46333'
      protocol: tcp
    - target: 6334
      published: '46334'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/storage
      target: /qdrant/storage
    networks:
    - weknora-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 256M
networks:
  weknora-network:
    driver: bridge
x-casaos:
  id: org.icewhale.weknora
  title:
    de_DE: WeKnora
    el_GR: WeKnora
    en_GB: WeKnora
    en_US: WeKnora
    fr_FR: WeKnora
    hr_HR: WeKnora
    it_IT: WeKnora
    ja_JP: WeKnora
    ko_KR: WeKnora
    nb_NO: WeKnora
    pt_PT: WeKnora
    ru_RU: WeKnora
    sv_SE: WeKnora
    tr_TR: WeKnora
    zh_CN: WeKnora
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.weknora/assets/icon.svg
  main: weknora
  port_map: '1080'
  index: /
  scheme: http
  version: 0.2.14
