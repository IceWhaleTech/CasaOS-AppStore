name: teable
services:
  teable:
    image: teableio/teable@sha256:96a86f966168ef76a4055b72689555f9ebc8ebe204b49c0fc30fb13adedbd329
    container_name: teable
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 512M
    ports:
    - target: 3000
      published: '3200'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/assets
      target: /app/.assets
    environment:
    - TZ=$TZ
    - NEXT_ENV_IMAGES_ALL_REMOTE=true
    - PUBLIC_ORIGIN=http://127.0.0.1:3000
    - PRISMA_DATABASE_URL=postgresql://example:example@teable-db:5432/teable-db
    - BACKEND_CACHE_PROVIDER=redis
    - BACKEND_CACHE_REDIS_URI=redis://default:password@teable-cache:6379/0
    networks:
    - teable-network
    depends_on:
      teable-db:
        condition: service_healthy
      teable-cache:
        condition: service_healthy
  teable-db:
    image: postgres@sha256:3b0d656f5fff31c7d8a64f500a703dcf3f35e98ce78f602831a73059a5e6a012
    restart: unless-stopped
    container_name: teable-db
    deploy:
      resources:
        reservations:
          memory: 256M
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /var/lib/postgresql/data
    environment:
    - TZ=$TZ
    - POSTGRES_DB=teable-db
    - POSTGRES_USER=example
    - POSTGRES_PASSWORD=example
    networks:
    - teable-network
    healthcheck:
      test:
      - CMD-SHELL
      - sh -c 'pg_isready -U example -d teable-db'
      interval: 10s
      timeout: 3s
      retries: 3
  teable-cache:
    image: redis@sha256:5a93f6b2e391b78e8bd3f9e7e1e1e06aeb5295043b4703fb88392835cec924a0
    restart: unless-stopped
    container_name: teable-cache
    deploy:
      resources:
        reservations:
          memory: 256M
    expose:
    - '6379'
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/teable-cache-data
      target: /data
    networks:
    - teable-network
    command:
    - redis-server
    - --requirepass password
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      interval: 10s
      timeout: 3s
      retries: 3
networks:
  teable-network:
    name: teable-network
    driver: bridge
x-casaos:
  app_id: org.icewhale.teable
  title:
    de_DE: Teable
    el_GR: Teable
    en_GB: Teable
    en_US: Teable
    fr_FR: Teable
    hr_HR: Teable
    it_IT: Teable
    ja_JP: Teable
    ko_KR: Teable
    nb_NO: Teable
    pt_PT: Teable
    ru_RU: Teable
    sv_SE: Teable
    tr_TR: Teable
    zh_CN: Teable
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/teable/assets/icon.svg
  main: teable
  port_map: '3200'
  index: /
  scheme: http
  version: 0.0.1
