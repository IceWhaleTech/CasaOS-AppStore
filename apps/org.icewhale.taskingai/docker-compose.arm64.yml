name: taskingai
services:
  frontend:
    image: taskingai/taskingai-console:v0.3.0@sha256:70f410012482481f42b4a482466986526f547f0669d4412b7f16583d13c06f2f
    depends_on:
    - backend-web
    - backend-api
    networks:
    - taskingai_network
  backend-inference:
    image: taskingai/taskingai-inference:v0.2.14@sha256:2c9f7b5a50c5e7d96da46a7eb2a9488576a1620edf22bbbfc3159de4c7f33c22
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      PROJECT_ID: taskingai
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-plugin:
    image: taskingai/taskingai-plugin:v0.2.10@sha256:e62139e232180414fa270504fce9b638f7391989bb85ccff2ee5eb279206fe16
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-api:
    image: taskingai/taskingai-server:v0.3.0@sha256:e534a4c966df930972e7fe23599fcbf2116fb633f3f51b436d55fcef98279a95
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    depends_on:
    - db
    - cache
    - backend-inference
    - backend-plugin
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-web:
    image: taskingai/taskingai-server:v0.3.0@sha256:e534a4c966df930972e7fe23599fcbf2116fb633f3f51b436d55fcef98279a95
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      JWT_SECRET_KEY: dbefe42f34473990a3fa903a6a3283acdc3a910beb1ae271a6463ffa5a926bfb
      PURPOSE: WEB
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: TaskingAI321
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    depends_on:
    - db
    - cache
    - backend-inference
    - backend-plugin
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  db:
    image: ankane/pgvector:v0.5.1@sha256:cd23e42a06ce5c8494514259e04359e545023d4da7c5354d19ba8c21b2cb04b8
    environment:
      POSTGRES_DB: taskingai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TaskingAI321
    volumes:
    - /DATA/AppData/$AppID/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
    - taskingai_network
  cache:
    image: redis:7-alpine@sha256:084f4bcb3fedf990ba43d26774f58ed4697a2c044156544ac4717934ad1d57c8
    command:
    - redis-server
    - --requirepass
    - TaskingAI321
    volumes:
    - /DATA/AppData/$AppID/data/redis:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - auth
      - TaskingAI321
      - ping
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
    - taskingai_network
  nginx:
    image: nginx:1.24@sha256:e8fdcd6356fb4914274d329bdb38c9fb7bd1be31ff50da71a8ffedaab04cf929
    ports:
    - 3080:80
    volumes:
    - /DATA/AppData/$AppID/data/nginx_cache:/var/cache/nginx
    depends_on:
    - frontend
    - backend-web
    - backend-api
    networks:
    - taskingai_network
    configs:
    - source: nginx_config
      target: /etc/nginx/conf.d/default.conf
networks:
  taskingai_network:
    driver: bridge
configs:
  nginx_config:
    content: "server {\n  listen 80;\n\n  client_max_body_size 20M;\n\n  location\
      \ /images/providers/icons/ {\n      proxy_pass http://backend-inference:8000;\n\
      \  }\n\n  location /images/plugins/bundles/icons/ {\n      proxy_pass http://backend-plugin:8000;\n\
      \  }\n\n  location /api/v1/ {\n      proxy_pass http://backend-web:8000;\n \
      \     proxy_http_version 1.1;\n      proxy_set_header Connection '';\n     \
      \ proxy_buffering off;\n      proxy_cache off;\n      proxy_read_timeout 24h;\n\
      \  }\n\n  location /v1/ {\n      proxy_pass http://backend-api:8000;\n     \
      \ proxy_http_version 1.1;\n      proxy_set_header Connection '';\n      proxy_buffering\
      \ off;\n      proxy_cache off;\n      proxy_read_timeout 24h;\n  }\n\n  location\
      \ /imgs/ {\n      proxy_pass http://backend-web:8000;\n  }\n\n  location / {\n\
      \      proxy_pass http://frontend:80;\n  }\n}\n"
x-casaos:
  app_id: org.icewhale.taskingai
  main: frontend
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.taskingai/assets/icon.svg
  title:
    en_US: TaskingAI
  port_map: '3080'
  version: 0.3.0
