name: sonarr
services:
  sonarr:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/sonarr@sha256:02bc962946fef994e67a38152446df25c10a52f8583aefeeb6467f9dd44cab99
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8989
      published: '8989'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/TV Shows
      target: /tv
    - type: bind
      source: /DATA/Downloads
      target: /downloads
    container_name: sonarr
x-casaos:
  app_id: org.icewhale.sonarr
  main: sonarr
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/sonarr/assets/icon.svg
  title:
    en_US: Sonarr
  index: /
  port_map: '8989'
  version: 4.0.17
