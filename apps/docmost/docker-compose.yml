name: docmost
services:
  docmost:
    image: docmost/docmost@sha256:3be8d60d9d5fb84738d2eca5616646e4ee8fd3df8c3524c74ed1050089391afc
    container_name: docmost
    deploy:
      resources:
        reservations:
          memory: 512M
    restart: unless-stopped
    ports:
    - target: 3000
      published: '3000'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/storage
      target: /app/data/storage
    environment:
      APP_URL: http://localhost:3000
      APP_SECRET: gxahngf9wc9ak9ahgpjp03zp1akcr7ry
      DATABASE_URL: postgresql://docmost:jcui51lw747yuuk4zrpm@docmost-db:5432/docmost?schema=public
      REDIS_URL: redis://docmost-redis:6379
    networks:
    - docmost-network
    depends_on:
    - docmost-db
    - docmost-redis
  docmost-db:
    container_name: docmost-db
    image: postgres@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: jcui51lw747yuuk4zrpm
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/pgdata
      target: /var/lib/postgresql/data
    networks:
    - docmost-network
  docmost-redis:
    container_name: docmost-redis
    image: redis@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/redis
      target: /data
    networks:
    - docmost-network
networks:
  docmost-network:
    driver: bridge
x-casaos:
  app_id: org.icewhale.docmost
  main: docmost
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/docmost/assets/icon.svg
  scheme: http
  port_map: '3000'
  index: /
  title:
    en_US: Docmost
  version: 0.90.0
