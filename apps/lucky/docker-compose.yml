name: lucky
services:
  lucky:
    deploy:
      resources:
        reservations:
          memory: 64M
    image: gdy666/lucky@sha256:96a530d208af31c45951520c0723767c29efb8cd461073dda0ccfb8bcca53e44
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/lucky
      target: /goodluck
    environment:
      TZ: $TZ
    network_mode: host
    privileged: false
x-casaos:
  app_id: org.icewhale.lucky
  main: lucky
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/lucky/assets/icon.svg
  index: /
  title:
    en_US: Lucky
  port_map: '16601'
  scheme: http
  version: 2.27.2
