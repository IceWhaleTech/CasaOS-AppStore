name: swingmusic
services:
  swingmusic:
    image: ghcr.io/swingmx/swingmusic@sha256:89009c016848946c35418eb8459fee9eba044fb3a4cd6808160a510ecb8b22f6
    container_name: swingmusic
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/Music
      target: /music
    ports:
    - 1970:1970
    restart: unless-stopped
x-casaos:
  app_id: org.icewhale.swingmusic
  main: swingmusic
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/swingmusic/assets/icon.svg
  title:
    en_US: Swing Music
    zh_CN: Swing Music
  index: /
  port_map: '1970'
  version: 2.1.4
