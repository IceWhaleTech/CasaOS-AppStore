name: ddns-updater
services:
  ddns-updater:
    image: qmcgaw/ddns-updater@sha256:3e2aa558946b5a293def4d73008fa4651c072b2c12932cecd02126fb23979831
    network_mode: bridge
    command:
    - touch /data/config.json
    container_name: ddns-updater
    deploy:
      resources:
        limits:
          memory: 32M
    environment:
    - BACKUP_DIRECTORY=/updater/data
    - BACKUP_PERIOD=0
    - CONFIG=
    - HTTP_TIMEOUT=10s
    - LISTENING_ADDRESS=:8000
    - LOG_CALLER=hidden
    - LOG_LEVEL=info
    - PERIOD=5m
    - PUBLICIP_DNS_PROVIDERS=all
    - PUBLICIP_DNS_TIMEOUT=3s
    - PUBLICIP_FETCHERS=all
    - PUBLICIP_HTTP_PROVIDERS=all
    - PUBLICIPV4_HTTP_PROVIDERS=all
    - PUBLICIPV6_HTTP_PROVIDERS=all
    - ROOT_URL=/
    - SHOUTRRR_ADDRESSES=
    - UPDATE_COOLDOWN_PERIOD=5m
    hostname: ddns-updater
    ports:
    - target: 8000
      published: '8000'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /updater/data
x-casaos:
  app_id: org.icewhale.ddnsupdater
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/ddns-updater/assets/icon.svg
  main: ddns-updater
  port_map: '8000'
  scheme: http
  title:
    en_US: ddns-updater
  version: 2.10.0
