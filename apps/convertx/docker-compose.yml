name: convertx
services:
  convertx:
    image: c4illin/convertx@sha256:e1f85be04bbaf8a55ead9261194c3ae0fa0957d303ea537127154860b2552afd
    container_name: convertx
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 500M
    ports:
    - 3333:3000
    environment:
    - JWT_SECRET=aLongAndSecretStringUsedToSignTheJSONWebToken1234
    - HTTP_ALLOWED=true
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /app/data
    network_mode: bridge
x-casaos:
  app_id: org.icewhale.convertx
  main: convertx
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/convertx/assets/icon.svg
  port_map: '3333'
  index: /
  scheme: http
  title:
    en_US: ConvertX
  version: 0.17.0
