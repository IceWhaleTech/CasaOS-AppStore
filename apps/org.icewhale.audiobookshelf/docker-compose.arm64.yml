name: audiobookshelf
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.0@sha256:f3891b8b5a89ea4dc9eac652de37167fd831c2302b417a79a18a0454fde9d8e9
    container_name: audiobookshelf
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: unless-stopped
    volumes:
    - /DATA/Media/Audiobooks:/audiobooks
    - /DATA/Media/Podcasts:/podcasts
    - /DATA/AppData/$AppID/config:/config
    - /DATA/AppData/$AppID/metadata:/metadata
    ports:
    - 13378:80
x-casaos:
  app_id: org.icewhale.audiobookshelf
  main: audiobookshelf
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.audiobookshelf/assets/icon.svg
  scheme: http
  port_map: '13378'
  index: /
  title:
    en_US: Audiobookshelf
  version: 2.35.0
