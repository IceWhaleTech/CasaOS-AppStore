name: gopeed
services:
  gopeed:
    container_name: gopeed
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M
    image: liwei2633/gopeed@sha256:3ad6274077eb81282f0782efb9824783bb2f969c3a4ce966f0d959cc53c23eae
    ports:
    - target: 9999
      published: '9999'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /app/storage
    - type: bind
      source: /DATA/Downloads
      target: /app/Downloads
    network_mode: bridge
    privileged: false
x-casaos:
  app_id: org.icewhale.gopeed
  main: gopeed
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/gopeed/assets/icon.svg
  title:
    en_US: Gopeed
    pt_BR: Gopeed
  index: /
  port_map: '9999'
  version: 1.9.3
