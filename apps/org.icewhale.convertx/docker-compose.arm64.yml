name: convertx
services:
  convertx:
    image: c4illin/convertx:v0.17.0@sha256:01907dda6dc67992eea7055964dbb746956a025df32a5b2fc86fc09029f25bf3
    container_name: convertx
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 500M
    ports:
    - 3333:3000
    environment:
    - JWT_SECRET=aLongAndSecretStringUsedToSignTheJSONWebToken1234
    - HTTP_ALLOWED=true
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /app/data
    network_mode: bridge
x-casaos:
  app_id: org.icewhale.convertx
  main: convertx
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.convertx/assets/icon.svg
  port_map: '3333'
  index: /
  scheme: http
  title:
    en_US: ConvertX
  version: 0.17.0
