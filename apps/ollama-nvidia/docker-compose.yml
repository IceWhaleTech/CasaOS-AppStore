name: ollama-nvidia
services:
  ollama:
    image: ollama/ollama@sha256:64fcc2a7c48ae920f5317264031d86414e30417269631822858c6d23f61100b0
    container_name: ollama
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    restart: unless-stopped
    ports:
    - target: 11434
      published: '11434'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/
      target: /root/.ollama
x-casaos:
  app_id: org.icewhale.ollamanvidia
  main: ollama
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/ollama-nvidia/assets/icon.svg
  scheme: http
  port_map: '11434'
  index: /
  title:
    en_US: Ollama(Nvidia GPU)
  version: 0.9.5
