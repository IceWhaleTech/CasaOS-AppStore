name: jellyfin-nvidia
services:
  jellyfin:
    devices:
    - /dev/dri:/dev/dri
    - /dev/vcsm:/dev/vcsm
    - /dev/vchiq:/dev/vchiq
    - /dev/video10:/dev/video10
    - /dev/video11:/dev/video11
    - /dev/video12:/dev/video12
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      CPU_FALLBACK: 'true'
      NVIDIA_VISIBLE_DEVICES: all
    image: linuxserver/jellyfin:10.10.6
    deploy:
      resources:
        reservations:
          memory: 256M
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    network_mode: bridge
    ports:
    - target: 8096
      published: '8097'
      protocol: tcp
    - target: 8920
      published: '8921'
      protocol: tcp
    - target: 7359
      published: '7359'
      protocol: tcp
    - target: 1900
      published: '1901'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media
      target: /Media
    - type: bind
      source: /opt/vc/lib
      target: /opt/vc/lib
    container_name: jellyfin
x-casaos:
  app_id: org.icewhale.jellyfinnvidia
  main: jellyfin
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.jellyfinnvidia/assets/icon.svg
  title:
    en_US: Jellyfin(Nvidia GPU)
  index: /
  port_map: '8097'
  version: 10.10.6
