    ja_JP: LibreChat
    ko_KR: LibreChat
    nb_NO: LibreChat
    pt_PT: LibreChat
    ru_RU: LibreChat
    sv_SE: LibreChat
    tr_TR: LibreChat
    zh_CN: LibreChat
  port_map: '3080'
  scheme: http
