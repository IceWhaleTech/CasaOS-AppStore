name: sabnzbd
services:
  sabnzbd:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/sabnzbd:5.0.3
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8080
      published: '8282'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/Downloads
      target: /incomplete-downloads
    - type: bind
      source: /DATA/AppData/sabnzbd/config
      target: /config
    - type: bind
      source: /DATA/Downloads
      target: /downloads
    container_name: sabnzbd
x-casaos:
  id: org.icewhale.sabnzbd
  main: sabnzbd
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.sabnzbd/assets/icon.svg
  title:
    en_US: Sabnzbd
  port_map: '8282'
  version: 5.0.3
