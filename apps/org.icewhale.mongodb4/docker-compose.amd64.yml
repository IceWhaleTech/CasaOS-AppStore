name: mongodb4
services:
  mongodb4:
    image: mongo:4.4.22@sha256:00d5d7e4df9aa132ae50996efe1d7c32746145ef6ff249289c8b6a58bbf68391
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    ports:
    - target: 27017
      published: '27017'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/mongodb4/data/configdb
      target: /data/configdb
    - type: bind
      source: /DATA/AppData/mongodb4/data/db
      target: /data/db
    container_name: mongodb4
x-casaos:
  id: org.icewhale.mongodb4
  main: mongodb4
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.mongodb4/assets/icon.svg
  title:
    en_US: MongoDB 4
  version: 4.4.22
