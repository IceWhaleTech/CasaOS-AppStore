name: langflow
services:
  langflow:
    container_name: langflow
    image: langflowai/langflow@sha256:59b00513151c224090e2d062ba94b2b5ba7f9f46922d2704bdf1090b59424d81
    user: 0:0
    ports:
    - target: 7860
      published: '17860'
      protocol: tcp
    depends_on:
    - langflow-postgres
    networks:
    - langflow-net
    environment:
    - LANGFLOW_DATABASE_URL=postgresql://langflow:langflow@langflow-postgres:5432/langflow
    - LANGFLOW_CONFIG_DIR=/app/langflow
    volumes:
    - /DATA/AppData/$AppID/backend:/app/langflow
  langflow-postgres:
    container_name: langflow-postgress
    image: postgres@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54
    environment:
    - POSTGRES_USER=langflow
    - POSTGRES_PASSWORD=langflow
    - POSTGRES_DB=langflow
    networks:
    - langflow-net
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/postgres
      target: /var/lib/postgresql/data
networks:
  langflow-net:
    driver: bridge
x-casaos:
  app_id: org.icewhale.langflow
  main: langflow
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/langflow/assets/icon.svg
  scheme: http
  port_map: '17860'
  index: /
  title:
    en_US: Langflow
    en_GB: Langflow
    it_IT: Langflow
    nb_NO: Langflow
    zh_CN: Langflow
    ja_JP: Langflow
    ko_KR: Langflow
    fr_FR: Langflow
    de_DE: Langflow
    sv_SE: Langflow
    el_GR: Langflow
    hr_HR: Langflow
    pt_PT: Langflow
    ru_RU: Langflow
    tr_TR: Langflow
  version: 1.9.3
