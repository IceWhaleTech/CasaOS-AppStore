name: duckdns
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest@sha256:30d404b454429c5149bdd3e793d74bc2b8759eca1362b957e8bd283b8d11e137
    container_name: duckdns
    network_mode: host
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Etc/UTC
    - SUBDOMAINS=subdomain1,subdomain2
    - TOKEN=token
    - UPDATE_IP=ipv6
    - LOG_FILE=false
    volumes:
    - /DATA/AppData/duckdns:/config
    restart: unless-stopped
x-casaos:
  id: org.icewhale.duckdns
  main: duckdns
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.duckdns/assets/icon.svg
  title:
    en_US: duckdns
  index: /
  version: 0.0.1
