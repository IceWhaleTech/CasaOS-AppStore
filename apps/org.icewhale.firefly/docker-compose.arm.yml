version: '3'
name: firefly
services:
  firefly:
    image: uusec/firefly:latest@sha256:31bf91225760115bbe3700b7828836b4bee0c671b73c0ab3d5739acd0aede3c9
    container_name: firefly
    devices:
    - /dev/net/tun:/dev/net/tun
    network_mode: host
    volumes:
    - /lib/modules:/lib/modules
    - /DATA/AppData/firefly/conf:/firefly/conf
    cap_add:
    - NET_ADMIN
    - SYS_MODULE
    restart: unless-stopped
    environment:
    - FIREFLY_PASSWORD=firefly
    deploy:
      resources:
        reservations:
          memory: 32M
x-casaos:
  app_id: org.icewhale.firefly
  main: firefly
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.firefly/assets/icon.svg
  title:
    en_US: Firefly
    zh_CN: 萤火虫
  port_map: '50121'
  scheme: http
  index: /
  version: 0.0.1
