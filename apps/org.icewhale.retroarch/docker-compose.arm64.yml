name: retroarch
services:
  retroarch:
    image: inglebard/retroarch-web:latest@sha256:d4bd86a36edb9e20f52a16b65813f4f560c109648b6a15837ed14d48404bb149
    container_name: retroarch
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: unless-stopped
    environment:
    - ROOT_WWW_PATH="/var/www/html"
    ports:
    - 8183:80
x-casaos:
  app_id: org.icewhale.retroarch
  main: retroarch
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.retroarch/assets/icon.svg
  scheme: http
  port_map: '8183'
  index: /
  title:
    en_US: RetroArch
  version: 0.0.1
