name: myspeed
services:
  myspeed:
    container_name: myspeed
    deploy:
      resources:
        limits:
          memory: 256M
    image: germannewsmaker/myspeed@sha256:3a3e774b3f78d930a5a962d625b99bcb3d71730bfeb4a6b93e04fd38cfe7d9a9
    ports:
    - target: 5216
      published: '5216'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /myspeed/data
    network_mode: bridge
    privileged: false
x-casaos:
  app_id: org.icewhale.myspeed
  main: myspeed
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/myspeed/assets/icon.svg
  title:
    en_US: MySpeed
    pt_BR: MySpeed
  index: /
  port_map: '5216'
  version: 1.0.9
