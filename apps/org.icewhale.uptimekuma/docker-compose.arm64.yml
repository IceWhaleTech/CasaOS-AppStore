name: uptimekuma
services:
  uptimekuma:
    image: louislam/uptime-kuma:2.4.0@sha256:a571f2ec9033cb63cfbe59abb6b9f0c1d96bcd9d673a40e6dc0a7fbddf8cb937
    deploy:
      resources:
        reservations:
          memory: 128M
    network_mode: bridge
    ports:
    - target: 3001
      published: '3001'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/app/data
      target: /app/data
    container_name: uptimekuma
x-casaos:
  app_id: org.icewhale.uptimekuma
  main: uptimekuma
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.uptimekuma/assets/icon.svg
  title:
    en_US: Uptime Kuma
  index: /
  port_map: '3001'
  version: 2.4.0
