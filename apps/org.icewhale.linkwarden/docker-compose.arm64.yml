services:
  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:v2.14.1@sha256:b1eb072019acb7f5f78768767caccf33bd426f86f9c17934263d7e6909e0385b
    container_name: linkwarden
    restart: unless-stopped
    depends_on:
      linkwarden-postgres:
        condition: service_healthy
      linkwarden-meilisearch:
        condition: service_started
    ports:
    - target: 3000
      published: '3428'
      protocol: tcp
    environment:
      TZ: $TZ
      NEXTAUTH_URL: http://localhost:3000/api/v1/auth
      NEXTAUTH_SECRET: abc123
      DATABASE_URL: postgresql://postgres:abc123@linkwarden-postgres:5432/linkwarden
      STORAGE_FOLDER: /data
      MEILI_HOST: http://linkwarden-meilisearch:7700
      MEILI_MASTER_KEY: kZWvi7wFylRjEnOTnNrNucG3d7c892HlIBtN3Vr8M-0
      NEXT_PUBLIC_DISABLE_REGISTRATION: 'false'
      NEXT_PUBLIC_CREDENTIALS_ENABLED: 'true'
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data/data
    networks:
    - linkwarden-net
    deploy:
      resources:
        reservations:
          memory: 512m
  linkwarden-postgres:
    image: postgres:16-alpine@sha256:7ae1143a9f249af815f056751a122a86d7e44ddce0926f2b227e3d5c434444f4
    container_name: linkwarden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc123
      POSTGRES_DB: linkwarden
      TZ: $TZ
    networks:
    - linkwarden-net
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/pgdata
      target: /var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d linkwarden
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          memory: 256m
  linkwarden-meilisearch:
    image: getmeili/meilisearch:v1.12.8@sha256:459f539c1f3e14dfddbc7451f3cb3506c998661cc0daef82828260242fe6c71f
    container_name: linkwarden-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: kZWvi7wFylRjEnOTnNrNucG3d7c892HlIBtN3Vr8M-0
      MEILI_ENV: production
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/meili_data
      target: /meili_data
    networks:
    - linkwarden-net
    deploy:
      resources:
        reservations:
          memory: 256m
networks:
  linkwarden-net:
    driver: bridge
name: linkwarden
