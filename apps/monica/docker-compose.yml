name: monica
services:
  monica:
    image: monica@sha256:193615ec4d29be3bbfc5f4b5db9eabd91d463dbe7a4208f3126788b9aa989691
    container_name: monica
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M
    restart: unless-stopped
    ports:
    - target: 80
      published: '18930'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/storage
      target: /var/www/html/storage
    environment:
      APP_KEY: ChangeMeBy32KeyLengthOrGenerated
      DB_HOST: monica-db
      DB_USERNAME: monicauser
      DB_PASSWORD: monicasecret
    networks:
    - monica_network
    depends_on:
    - monica-db
  monica-db:
    image: mariadb@sha256:2bcbaec92bd9d4f6591bc8103d3a8e6d0512ee2235506e47a2e129d190444405
    container_name: monica-db
    deploy:
      resources:
        reservations:
          memory: 256M
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/mysql
      target: /var/lib/mysql
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: true
      MARIADB_DATABASE: monica
      MARIADB_USER: monicauser
      MARIADB_PASSWORD: monicasecret
    restart: unless-stopped
    networks:
    - monica_network
networks:
  monica_network:
    driver: bridge
x-casaos:
  app_id: org.icewhale.monica
  main: monica
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/monica/assets/icon.svg
  scheme: ''
  port_map: '18930'
  index: /
  title:
    en_US: Monica
  version: 4.1.2
