name: mylar3
services:
  mylar3:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/mylar3@sha256:2d2920fb5dac4a9e3a556d52aaa5e9e694dd21a892c61354fa21577bcdaa4568
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8090
      published: '8090'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/mylar3/config
      target: /config
    - type: bind
      source: /DATA/Media/Comics
      target: /comics
    - type: bind
      source: /DATA/Downloads
      target: /downloads
    container_name: mylar3
x-casaos:
  app_id: org.icewhale.mylar3
  main: mylar3
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/mylar3/assets/icon.svg
  title:
    en_US: Mylar3
  port_map: '8090'
  version: 0.9.0
