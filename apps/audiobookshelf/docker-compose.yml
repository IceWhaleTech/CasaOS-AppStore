name: audiobookshelf
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
    container_name: audiobookshelf
    deploy:
      resources:
        reservations:
          memory: 64M
    restart: unless-stopped
    volumes:
    - /DATA/Media/Audiobooks:/audiobooks
    - /DATA/Media/Podcasts:/podcasts
    - /DATA/AppData/$AppID/config:/config
    - /DATA/AppData/$AppID/metadata:/metadata
    ports:
    - 13378:80
x-casaos:
  app_id: org.icewhale.audiobookshelf
  main: audiobookshelf
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/audiobookshelf/assets/icon.svg
  scheme: http
  port_map: '13378'
  index: /
  title:
    en_US: Audiobookshelf
  version: 2.35.0
