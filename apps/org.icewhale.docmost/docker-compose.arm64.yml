name: docmost
services:
  docmost:
    image: docmost/docmost:0.90.0@sha256:5133f2ad0f5c014e1514467c836aed3e79dbf1412d42bd0811295a81917e666e
    container_name: docmost
    deploy:
      resources:
        reservations:
          memory: 512M
    restart: unless-stopped
    ports:
    - target: 3000
      published: '3000'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/storage
      target: /app/data/storage
    environment:
      APP_URL: http://localhost:3000
      APP_SECRET: gxahngf9wc9ak9ahgpjp03zp1akcr7ry
      DATABASE_URL: postgresql://docmost:jcui51lw747yuuk4zrpm@docmost-db:5432/docmost?schema=public
      REDIS_URL: redis://docmost-redis:6379
    networks:
    - docmost-network
    depends_on:
    - docmost-db
    - docmost-redis
  docmost-db:
    container_name: docmost-db
    image: postgres:16-alpine@sha256:7ae1143a9f249af815f056751a122a86d7e44ddce0926f2b227e3d5c434444f4
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: jcui51lw747yuuk4zrpm
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/pgdata
      target: /var/lib/postgresql/data
    networks:
    - docmost-network
  docmost-redis:
    container_name: docmost-redis
    image: redis:7.2-alpine@sha256:424de7646a92a78270cc0b8fadd371063a76e1b7cc6f115f483c7215bf426113
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/redis
      target: /data
    networks:
    - docmost-network
networks:
  docmost-network:
    driver: bridge
x-casaos:
  id: org.icewhale.docmost
  main: docmost
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.docmost/assets/icon.svg
  scheme: http
  port_map: '3000'
  index: /
  title:
    en_US: Docmost
  version: 0.90.0
