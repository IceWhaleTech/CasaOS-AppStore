name: gateway-go
services:
  gateway-go:
    image: openiothub/gateway-go:v2.0.12@sha256:70ff9950030ba63d1bc6896b5f4412c676a0f75c4e8183339e1384b6226a9d6c
    network_mode: host
    deploy:
      resources:
        reservations:
          memory: 32M
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /root
    ports:
    - target: 34323
      published: '34323'
      protocol: tcp
    container_name: gateway-go
x-casaos:
  id: org.icewhale.gatewaygo
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.gatewaygo/assets/icon.svg
  main: gateway-go
  port_map: '34323'
  scheme: http
  title:
    en_US: gateway-go
  version: 2.0.12
