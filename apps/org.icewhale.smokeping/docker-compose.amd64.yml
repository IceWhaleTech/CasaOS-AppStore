name: smokeping
services:
  smokeping:
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: Europe/London
    image: linuxserver/smokeping:2.9.0@sha256:163cd3f5857af2876e6336f6fb8c7c0c8a8b7a69505cc9b220f863c7320b71f2
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 80
      published: '10280'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/smokeping/config
      target: /config
    - type: bind
      source: /DATA/AppData/smokeping/data
      target: /data
    container_name: smokeping
x-casaos:
  id: org.icewhale.smokeping
  main: smokeping
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.smokeping/assets/icon.svg
  title:
    en_US: Smokeping
  port_map: '10280'
  version: 2.9.0
