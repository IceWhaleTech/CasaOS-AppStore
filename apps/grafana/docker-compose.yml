name: grafana
services:
  grafana:
    image: grafana/grafana@sha256:2d1f9ae67c1778d33e291d4c3c759cd8b650e67491f02533499eb950e075eeb5
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 3000
      published: '3003'
      protocol: tcp
    restart: always
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /var/lib/grafana
    container_name: grafana
x-casaos:
  app_id: org.icewhale.grafana
  main: grafana
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/grafana/assets/icon.svg
  title:
    en_US: Grafana
  index: /
  port_map: '3003'
  version: 13.0.1-security-01
