name: autobrr
services:
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:v1.79.0@sha256:11940c8b388b037544569be68df570eea711a972b50ef1b108e962ef4ef009ac
    network_mode: bridge
    restart: unless-stopped
    environment:
      TZ: $TZ
    ports:
    - target: 7474
      published: '7474'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
x-casaos:
  id: org.icewhale.autobrr
  main: autobrr
  port_map: '7474'
  title:
    en_US: Autobrr
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.autobrr/assets/icon.svg
  version: 1.79.0
