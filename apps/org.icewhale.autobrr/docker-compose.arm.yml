name: autobrr
services:
  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:v1.79.0@sha256:a2939d0027269b01fbbb28773c92a2d9fa7621de245f63d72585c83b8b1eb125
    network_mode: bridge
    restart: unless-stopped
    environment:
      TZ: $TZ
    ports:
    - target: 7474
      published: '7474'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
x-casaos:
  app_id: org.icewhale.autobrr
  main: autobrr
  port_map: '7474'
  title:
    en_US: Autobrr
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.autobrr/assets/icon.svg
  version: 1.79.0
