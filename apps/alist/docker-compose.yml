name: alist
services:
  alist:
    image: xhofe/alist@sha256:a448c4fcdd59fe299c719f4a75588b7bd2729afddc46b80ec399bcd33917d071
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 5244
      published: '5244'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /opt/alist/data
    container_name: alist
x-casaos:
  app_id: org.icewhale.alist
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/alist/assets/icon.svg
  main: alist
  port_map: '5244'
  scheme: http
  title:
    en_US: Alist
  version: 3.40.0
