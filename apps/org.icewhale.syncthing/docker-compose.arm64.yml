name: syncthing
services:
  syncthing:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/syncthing:1.29.7@sha256:1de68f4888deb6c7a62439442bf7262ee08c0cd100eba6490dccb88f528bc2fa
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8384
      published: '8384'
      protocol: tcp
    - target: 22000
      published: '22000'
      protocol: tcp
    - target: 22000
      published: '22000'
      protocol: udp
    - target: 21027
      published: '21027'
      protocol: udp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA
      target: /DATA
    container_name: syncthing
x-casaos:
  id: org.icewhale.syncthing
  main: syncthing
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.syncthing/assets/icon.svg
  title:
    en_US: Syncthing
  index: /
  port_map: '8384'
  version: 1.29.7
