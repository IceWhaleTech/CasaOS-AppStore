name: calibre-web
services:
  calibre-web:
    environment:
      DOCKER_MODS: ghcr.io/linuxserver/mods:universal-calibre
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/calibre-web:0.6.24
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8083
      published: '8083'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/Books
      target: /books
    container_name: calibre-web
x-casaos:
  app_id: org.icewhale.calibreweb
  main: calibre-web
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.calibreweb/assets/icon.svg
  title:
    en_US: Calibre-web
  index: /
  port_map: '8083'
  version: 0.6.24
