name: photoprism
services:
  photoprism:
    environment:
      PHOTOPRISM_ADMIN_PASSWORD: casaos
      PHOTOPRISM_UPLOAD_NSFW: 'true'
      TZ: $TZ
    image: photoprism/photoprism:260523@sha256:5d8cecc7c37e685d1b096ff197e66b44be4400a14b6b136f9dd1c191ae45e810
    deploy:
      resources:
        reservations:
          memory: 512M
    network_mode: bridge
    ports:
    - target: 2342
      published: '2342'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/photoprism/storage
      target: /photoprism/storage
    - type: bind
      source: /DATA/Gallery
      target: /photoprism/originals
    container_name: photoprism
x-casaos:
  app_id: org.icewhale.photoprism
  main: photoprism
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.photoprism/assets/icon.svg
  title:
    en_US: PhotoPrism
  index: /
  port_map: '2342'
  version: 260523.0.0
