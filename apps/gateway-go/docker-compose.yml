name: gateway-go
services:
  gateway-go:
    image: openiothub/gateway-go:v2.0.12
    network_mode: host
    deploy:
      resources:
        reservations:
          memory: 32M
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /root
    ports:
    - target: 34323
      published: '34323'
      protocol: tcp
    container_name: gateway-go
x-casaos:
  app_id: org.icewhale.gatewaygo
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/gateway-go/assets/icon.svg
  main: gateway-go
  port_map: '34323'
  scheme: http
  title:
    en_US: gateway-go
  version: 2.0.12
