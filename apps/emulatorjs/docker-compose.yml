name: emulatorjs
services:
  emulatorjs:
    environment:
    - PGID=$PGID
    - PUID=$PUID
    - SUBFOLDER=/
    - TZ=$TZ
    image: linuxserver/emulatorjs@sha256:b7003f7d4f383dd32d210ba08f24c840276fdf92c211bd18a798d47647311290
    network_mode: bridge
    ports:
    - target: 3000
      published: '3001'
      protocol: tcp
    - target: 4001
      published: '4001'
      protocol: tcp
    - target: 80
      published: '88'
      protocol: tcp
    privileged: true
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data
    - type: bind
      source: /ROMS/nes
      target: /data/nes/roms
    container_name: emulatorjs
x-casaos:
  app_id: org.icewhale.emulatorjs
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/emulatorjs/assets/icon.svg
  index: /
  port_map: '88'
  scheme: http
  title:
    en_US: emulatorjs
  version: 1.9.2
