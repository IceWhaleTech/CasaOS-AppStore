name: wg-easy
services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:13@sha256:88207e44e5163936b02ae6401c506069096b53f564fb1f3273a9956187b446a6
    restart: unless-stopped
    network_mode: bridge
    environment:
      PASSWORD: casaos
      WG_HOST: casaos.local
      WG_PORT: '51820'
      WG_DEFAULT_DNS: 1.1.1.1
    ports:
    - target: 51820
      published: '51820'
      protocol: udp
    - target: 51821
      published: '51821'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/wireguard
      target: /etc/wireguard
    cap_add:
    - NET_ADMIN
    - SYS_MODULE
    sysctls:
    - net.ipv4.ip_forward=1
    - net.ipv4.conf.all.src_valid_mark=1
    container_name: wg-easy
x-casaos:
  id: org.icewhale.wgeasy
  main: wg-easy
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.wgeasy/assets/icon.svg
  title:
    en_US: WireGuard Easy
  port_map: '51821'
  version: 13.0.0
