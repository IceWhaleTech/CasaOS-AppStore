name: downtify
services:
  downtify:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: ghcr.io/henriquesebastiao/downtify@sha256:95d00787cfcd645ce8e48aead56b6a6b96c6f85646c14d8f7a6491f1a03e0cbc
    deploy:
      resources:
        reservations:
          memory: 2048M
    ports:
    - target: 8000
      published: '8582'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/Downloads/downtify
      target: /downloads
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data
    container_name: downtify
x-casaos:
  app_id: org.icewhale.downtify
  main: downtify
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/downtify/assets/icon.svg
  title:
    en_US: Downtify
  index: /
  port_map: '8582'
  version: 2.7.0
