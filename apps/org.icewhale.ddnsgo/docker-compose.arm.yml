name: ddns-go
services:
  ddns-go:
    image: jeessy/ddns-go:v6.17.1@sha256:1163db57d5ec0acd871ce607944e9b4e4a8ab5aa9103bce4f92d7c4c44d28316
    network_mode: bridge
    deploy:
      resources:
        reservations:
          memory: 32M
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /root
    ports:
    - target: 9876
      published: '9876'
      protocol: tcp
    container_name: ddns-go
x-casaos:
  id: org.icewhale.ddnsgo
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.ddnsgo/assets/icon.svg
  main: ddns-go
  port_map: '9876'
  scheme: http
  title:
    en_US: ddns-go
  version: 6.17.1
