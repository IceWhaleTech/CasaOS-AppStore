name: ddns-go
services:
  ddns-go:
    image: jeessy/ddns-go:v6.17.1@sha256:44d205993f9a6bafcdd49d71e437479ec1af3afc8067d1978a2685cf8cc64617
    network_mode: bridge
    deploy:
      resources:
        reservations:
          memory: 32M
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /root
    ports:
    - target: 9876
      published: '9876'
      protocol: tcp
    container_name: ddns-go
x-casaos:
  app_id: org.icewhale.ddnsgo
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.ddnsgo/assets/icon.svg
  main: ddns-go
  port_map: '9876'
  scheme: http
  title:
    en_US: ddns-go
  version: 6.17.1
