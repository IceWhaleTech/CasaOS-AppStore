version: '3.7'
name: cloudbeaver
services:
  cloudbeaver:
    container_name: cloudbeaver
    deploy:
      resources:
        reservations:
          memory: 256M
    image: dbeaver/cloudbeaver@sha256:33083a988e83c714b98bffc58d45c6c6c15c86816bb446c5f053f1eed66d5247
    ports:
    - target: 8978
      published: '8978'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/workspace
      target: /opt/cloudbeaver/workspace
    network_mode: bridge
    privileged: false
x-casaos:
  app_id: org.icewhale.cloudbeaver
  main: cloudbeaver
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/cloudbeaver/assets/icon.svg
  title:
    en_US: CloudBeaver
    pt_BR: CloudBeaver
  index: /
  port_map: '8978'
  version: 26.0.5
