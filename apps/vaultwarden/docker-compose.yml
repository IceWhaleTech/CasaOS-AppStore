name: vaultwarden
services:
  vaultwarden:
    image: vaultwarden/server@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 80
      published: '10380'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /data
    container_name: vaultwarden
x-casaos:
  app_id: org.icewhale.vaultwarden
  main: vaultwarden
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/vaultwarden/assets/icon.svg
  title:
    en_US: Vaultwarden
  index: /
  port_map: '10380'
  version: 1.36.0
