name: emby-nvidia
services:
  emby:
    devices:
    - /dev/dri:/dev/dri
    - /dev/vchiq:/dev/vchiq
    - /dev/video10:/dev/video10
    - /dev/video11:/dev/video11
    - /dev/video12:/dev/video12
    environment:
      PGID: '1000'
      PUID: '1000'
      TZ: $TZ
      CPU_FALLBACK: 'true'
      NVIDIA_VISIBLE_DEVICES: all
    image: linuxserver/emby:4.9.1@sha256:50c9e2b2afd88a02365b36f2722d93449579f6d84eb659613f702a2631b22b45
    deploy:
      resources:
        reservations:
          memory: 256M
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    network_mode: bridge
    ports:
    - target: 8096
      published: '8096'
      protocol: tcp
    - target: 8920
      published: '8920'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media/TV Shows
      target: /data/tvshows
    - type: bind
      source: /DATA/Media/Movies
      target: /data/movies
    container_name: emby
x-casaos:
  id: org.icewhale.embynvidia
  main: emby
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.embynvidia/assets/icon.svg
  title:
    en_US: Emby(Nvidia GPU)
  index: /
  port_map: '8096'
  version: 4.9.1
