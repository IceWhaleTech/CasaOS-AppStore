name: plex-nvidia
services:
  plex:
    devices:
    - /dev/dri:/dev/dri
    - /dev/dvb:/dev/dvb
    environment:
      PGID: $PGID
      PUID: $PUID
      VERSION: docker
      CPU_FALLBACK: 'true'
      NVIDIA_VISIBLE_DEVICES: all
    image: lscr.io/linuxserver/plex@sha256:ec54f85c19b3575c63929c260a0d8c360d57d41f3597ac9184cb134b6c634137
    deploy:
      resources:
        reservations:
          memory: 256M
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    network_mode: host
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /config
    - type: bind
      source: /DATA/Media
      target: /Media
    container_name: plex
x-casaos:
  app_id: org.icewhale.plexnvidia
  main: plex
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/plex-nvidia/assets/icon.svg
  title:
    en_US: Plex(Nvidia GPU)
  index: /web/index.html
  port_map: '32400'
  version: 1.41.3
