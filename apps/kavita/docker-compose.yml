name: kavita
services:
  kavita:
    image: jvmilazz0/kavita@sha256:ca6af7a18d7124d014702983c2364e485294f808c1552e9555f2595b7cda7982
    container_name: kavita
    deploy:
      resources:
        reservations:
          memory: 128M
    network_mode: bridge
    restart: unless-stopped
    ports:
    - target: 5000
      published: '5150'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/config
      target: /kavita/config
    - type: bind
      source: /DATA/Media/Manga
      target: /manga
    environment:
      TZ: $TZ
x-casaos:
  app_id: org.icewhale.kavita
  main: kavita
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/kavita/assets/icon.svg
  scheme: http
  port_map: '5150'
  index: /
  title:
    en_US: Kavita
  version: 0.9.0-2
