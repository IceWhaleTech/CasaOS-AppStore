name: mylar3
services:
  mylar3:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: linuxserver/mylar3:0.9.0@sha256:3aa1039176a30296894acc9c776e14eb33d1fa5800e785bfdcf10ee4ee42eace
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 8090
      published: '8090'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/mylar3/config
      target: /config
    - type: bind
      source: /DATA/Media/Comics
      target: /comics
    - type: bind
      source: /DATA/Downloads
      target: /downloads
    container_name: mylar3
x-casaos:
  id: org.icewhale.mylar3
  main: mylar3
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.mylar3/assets/icon.svg
  title:
    en_US: Mylar3
  port_map: '8090'
  version: 0.9.0
