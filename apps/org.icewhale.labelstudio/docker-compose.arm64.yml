name: label-studio
services:
  label-studio:
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
    image: heartexlabs/label-studio:1.23.0@sha256:b4193c893d7abfc7ebe6546a1b828d826162fb5c63a7fe1bd7350912b57f1761
    deploy:
      resources:
        reservations:
          memory: 256M
    network_mode: bridge
    ports:
    - target: 8080
      published: '3080'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/data
      target: /label-studio/data
x-casaos:
  app_id: org.icewhale.labelstudio
  main: label-studio
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.labelstudio/assets/icon.svg
  title:
    en_US: Label Studio
  port_map: '3080'
  version: 1.23.0
