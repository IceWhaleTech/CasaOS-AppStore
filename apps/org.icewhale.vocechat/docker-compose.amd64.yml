name: vocechat
services:
  vocechat:
    environment:
      TZ: $TZ
    image: privoce/vocechat-server:v0.5.17@sha256:7df8b76b15e285c4e348ec44a855c0429bcea477928cfc857c5c42d22fc1d2d1
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
    - target: 3000
      published: '3009'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - type: bind
      source: /DATA/AppData/$AppID/home/vocechat-server/data
      target: /home/vocechat-server/data
    container_name: vocechat
x-casaos:
  id: org.icewhale.vocechat
  main: vocechat
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.vocechat/assets/icon.svg
  title:
    en_US: VoceChat
  index: /
  port_map: '3009'
  version: 0.5.17
