name: jdownloader2
services:
  jdownloader2:
    image: jlesage/jdownloader-2:latest@sha256:58434680f299d09b2732bc64296d77f53b37be0a15eee9ec5a66a9d0ca5687ba
    restart: unless-stopped
    environment:
    - USER_ID=$PUID
    - GROUP_ID=$PGID
    - TZ=$TZ
    - MYJDOWNLOADER_EMAIL=$MYJDOWNLOADER_EMAIL
    - MYJDOWNLOADER_PASSWORD=$MYJDOWNLOADER_PASSWORD
    - MYJDOWNLOADER_DEVICE_NAME=$MYJDOWNLOADER_DEVICE_NAME
    - JDOWNLOADER_HEADLESS=$JDOWNLOADER_HEADLESS
    ports:
    - target: 5800
      published: '5800'
      protocol: tcp
    - target: 5900
      published: '5900'
      protocol: tcp
    - target: 3129
      published: '3129'
      protocol: tcp
    volumes:
    - type: bind
      source: /DATA/AppData/jdownloader2/config
      target: /config
    - type: bind
      source: /DATA/Downloads
      target: /output
    container_name: jdownloader2
x-casaos:
  id: org.icewhale.jdownloader2
  main: jdownloader2
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/org.icewhale.jdownloader2/assets/icon.svg
  port_map: '5800'
  scheme: http
  title:
    en_US: JDownloader2
  version: 26.3.1
