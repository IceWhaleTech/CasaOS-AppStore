name: taskingai
services:
  frontend:
    image: taskingai/taskingai-console@sha256:8d0f85f3984437baaa7b8a82ab0081511b221d25dbeeedae560097b7edfbeb6d
    depends_on:
    - backend-web
    - backend-api
    networks:
    - taskingai_network
  backend-inference:
    image: taskingai/taskingai-inference@sha256:91d7abc1269fb200e53973812cceabb8be93516df57f60952e377af285089c9b
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      PROJECT_ID: taskingai
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-plugin:
    image: taskingai/taskingai-plugin@sha256:39a13c02ce93b1e1c0bc454049ecee02e9dcab61dc0cf002587e071f2e525481
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-api:
    image: taskingai/taskingai-server@sha256:5032f3015bbc03e4d0fc263a8f04a75fbf2cda48de01943436b2e8d398ddd2a8
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    depends_on:
    - db
    - cache
    - backend-inference
    - backend-plugin
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  backend-web:
    image: taskingai/taskingai-server@sha256:5032f3015bbc03e4d0fc263a8f04a75fbf2cda48de01943436b2e8d398ddd2a8
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      JWT_SECRET_KEY: dbefe42f34473990a3fa903a6a3283acdc3a910beb1ae271a6463ffa5a926bfb
      PURPOSE: WEB
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: TaskingAI321
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
    - /DATA/AppData/$AppID/data/object_storage:/var/lib/data
    depends_on:
    - db
    - cache
    - backend-inference
    - backend-plugin
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - taskingai_network
  db:
    image: ankane/pgvector@sha256:d3a9d8ac27bb7e05e333ef25b634d2625adaa85336ab729954b9e94859bf6fa7
    environment:
      POSTGRES_DB: taskingai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TaskingAI321
    volumes:
    - /DATA/AppData/$AppID/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
    - taskingai_network
  cache:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command:
    - redis-server
    - --requirepass
    - TaskingAI321
    volumes:
    - /DATA/AppData/$AppID/data/redis:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - auth
      - TaskingAI321
      - ping
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
    - taskingai_network
  nginx:
    image: nginx@sha256:f6daac2445b0ce70e64d77442ccf62839f3f1b4c24bf6746a857eff014e798c8
    ports:
    - 3080:80
    volumes:
    - /DATA/AppData/$AppID/data/nginx_cache:/var/cache/nginx
    depends_on:
    - frontend
    - backend-web
    - backend-api
    networks:
    - taskingai_network
    configs:
    - source: nginx_config
      target: /etc/nginx/conf.d/default.conf
networks:
  taskingai_network:
    driver: bridge
configs:
  nginx_config:
    content: "server {\n  listen 80;\n\n  client_max_body_size 20M;\n\n  location\
      \ /images/providers/icons/ {\n      proxy_pass http://backend-inference:8000;\n\
      \  }\n\n  location /images/plugins/bundles/icons/ {\n      proxy_pass http://backend-plugin:8000;\n\
      \  }\n\n  location /api/v1/ {\n      proxy_pass http://backend-web:8000;\n \
      \     proxy_http_version 1.1;\n      proxy_set_header Connection '';\n     \
      \ proxy_buffering off;\n      proxy_cache off;\n      proxy_read_timeout 24h;\n\
      \  }\n\n  location /v1/ {\n      proxy_pass http://backend-api:8000;\n     \
      \ proxy_http_version 1.1;\n      proxy_set_header Connection '';\n      proxy_buffering\
      \ off;\n      proxy_cache off;\n      proxy_read_timeout 24h;\n  }\n\n  location\
      \ /imgs/ {\n      proxy_pass http://backend-web:8000;\n  }\n\n  location / {\n\
      \      proxy_pass http://frontend:80;\n  }\n}\n"
x-casaos:
  app_id: org.icewhale.taskingai
  main: frontend
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@gh-pages/apps/taskingai/assets/icon.svg
  title:
    en_US: TaskingAI
  port_map: '3080'
  version: 0.3.0
