name: Validate Compose And Build

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      app_path:
        description: "Optional app folder name under Apps/ (e.g. 2FAuth). Leave empty to validate all."
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check name field in YAML files
        env:
          APP_PATH_INPUT: ${{ inputs.app_path }}
        run: |
          set -euo pipefail
          if [ -n "${APP_PATH_INPUT}" ]; then
            SEARCH_ROOT="Apps/${APP_PATH_INPUT}"
          else
            SEARCH_ROOT="Apps"
          fi
          while IFS= read -r file; do
            if ! grep -qP '^name:\s[a-z0-9_-]*\r?$' "$file"; then
              echo "Invalid 'name' field in: $file"
              echo "name must match: ^[a-z0-9_-]+$"
              exit 1
            fi
          done < <(find "${SEARCH_ROOT}" -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \))

      - name: Validate all docker-compose files
        env:
          APP_PATH_INPUT: ${{ inputs.app_path }}
        run: |
          set -euo pipefail
          if [ -n "${APP_PATH_INPUT}" ]; then
            SEARCH_ROOT="Apps/${APP_PATH_INPUT}"
          else
            SEARCH_ROOT="Apps"
          fi
          while IFS= read -r file; do
            echo "Validating: ${file}"
            docker compose -f "${file}" config -q
          done < <(find "${SEARCH_ROOT}" -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          pip install pyyaml Pillow

      - name: Restore image size cache
        uses: actions/cache@v4
        with:
          path: .cache/build_appstore/image-size-cache.json
          key: build-appstore-image-size-cache-${{ github.ref_name }}
          restore-keys: |
            build-appstore-image-size-cache-

      - name: Validate appstore build
        run: |
          python3 scripts/build_appstore.py \
            --source . \
            --output /tmp/appstore-dist \
            --cache-file .cache/build_appstore/image-size-cache.json \
            --base-url "https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages"
