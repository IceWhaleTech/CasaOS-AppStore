name: Validate Compose And Build

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      app_path:
        description: "Optional app folder name under Apps/ (e.g. 2FAuth). Leave empty to validate all."
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check name field in YAML files
        env:
          APP_PATH_INPUT: ${{ inputs.app_path }}
        run: |
          set -euo pipefail
          if [ -n "${APP_PATH_INPUT}" ]; then
            SEARCH_ROOT="Apps/${APP_PATH_INPUT}"
          else
            SEARCH_ROOT="Apps"
          fi
          while IFS= read -r file; do
            if ! grep -qP '^name:\s[a-z0-9_-]*\r?$' "$file"; then
              echo "Invalid 'name' field in: $file"
              echo "name must match: ^[a-z0-9_-]+$"
              exit 1
            fi
          done < <(find "${SEARCH_ROOT}" -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \))

      - name: Validate all docker-compose files
        env:
          APP_PATH_INPUT: ${{ inputs.app_path }}
        run: |
          set -euo pipefail
          if [ -n "${APP_PATH_INPUT}" ]; then
            SEARCH_ROOT="Apps/${APP_PATH_INPUT}"
          else
            SEARCH_ROOT="Apps"
          fi
          while IFS= read -r file; do
            echo "Validating: ${file}"
            docker compose -f "${file}" config -q
          done < <(find "${SEARCH_ROOT}" -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \))

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            scripts/build_appstore.py

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          pip install pyyaml Pillow

      - name: Prewarm remote build caches
        run: |
          set -euo pipefail
          mkdir -p .cache/build_appstore
          CACHE_URL="https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages/store/build_appstore_cache.tar.gz"
          if curl -fsSL "$CACHE_URL" -o /tmp/build_appstore_cache.tar.gz; then
            tar -xzf /tmp/build_appstore_cache.tar.gz -C .cache/build_appstore
            echo "Prewarmed build caches from $CACHE_URL"
          else
            echo "No remote build cache bundle found at $CACHE_URL"
          fi

      - name: Restore build caches
        uses: actions/cache@v6
        with:
          path: .cache/build_appstore
          key: build-appstore-cache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('scripts/build_appstore.py', 'store-config.json', 'supported-languages.json', 'Apps/**/docker-compose.yaml', 'Apps/**/docker-compose.yml') }}
          restore-keys: |
            build-appstore-cache-${{ runner.os }}-${{ github.ref_name }}-
            build-appstore-cache-${{ runner.os }}-

      - name: Validate appstore build
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 scripts/build_appstore.py \
            --source . \
            --output /tmp/appstore-dist \
            --cache-file .cache/build_appstore/image-size-cache.json \
            --digest-cache-file .cache/build_appstore/image-digest-cache.json \
            --base-url "https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages"
