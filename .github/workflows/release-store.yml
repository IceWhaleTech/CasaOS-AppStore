name: Release Store

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional tag name to publish as the release version"
        required: false
        default: ""
      base_url:
        description: "Base URL used by the build action"
        required: false
        default: "https://cdn.jsdelivr.net/gh/jerrykuku/ZimaOS-AppStore@gh-pages"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name != '' && inputs.tag_name || github.ref_name }}
      BUILD_CACHE_KEY: build-appstore-cache-${{ github.ref_name }}-${{ github.run_id }}
      BUILD_CACHE_PREFIX: build-appstore-cache-${{ github.ref_name }}-
    steps:
      - uses: actions/checkout@v6

      - name: Restore build caches
        uses: actions/cache/restore@v5
        with:
          path: |
            .cache/build_appstore/image-size-cache.json
            .cache/build_appstore/image-digest-cache.json
          key: ${{ env.BUILD_CACHE_KEY }}
          restore-keys: |
            ${{ env.BUILD_CACHE_PREFIX }}

      - name: Build static appstore dist
        id: build_v2
        continue-on-error: true
        uses: ./.github/actions/build-store-v2
        with:
          source: .
          output: dist
          base-url: ${{ inputs.base_url }}
          cache-file: .cache/build_appstore/image-size-cache.json
          digest-cache-file: .cache/build_appstore/image-digest-cache.json
          report-json: out/build-v2-report.json
          report-title: Release V2 Store Report

      - name: Upload build report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-build-v2-report
          path: |
            out/build-v2-report.json
          if-no-files-found: warn

      - name: Fail workflow if v2 build failed
        if: always() && steps.build_v2.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "V2 store build failed. See release-build-v2-report artifact."
          exit 1

      - name: Disable Jekyll
        run: |
          touch dist/.nojekyll

      - name: Write custom domain file
        run: |
          printf 'casaos.app\n' > dist/CNAME

      - name: Build legacy v1 appstore zip
        id: build_v1
        continue-on-error: true
        uses: ./.github/actions/build-store-v1
        with:
          source: .
          output-zip: dist/store/main.zip
          report-json: out/build-v1-report.json
          report-title: Release V1 Store Report

      - name: Upload v1 build report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-build-v1-report
          path: |
            out/build-v1-report.json
            dist/store/main.zip
          if-no-files-found: warn

      - name: Fail workflow if v1 build failed
        if: always() && steps.build_v1.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "V1 store build failed. See release-build-v1-report artifact."
          exit 1

      - name: Create release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          (cd dist && zip -r ../release-assets/v2-dist.zip .)
          cp dist/store/main.zip release-assets/main.zip
          cp out/build-v2-report.json release-assets/build-v2-report.json
          cp out/build-v1-report.json release-assets/build-v1-report.json

      - name: Upload release bundles artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-bundles
          path: release-assets

      - name: Save build caches
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            .cache/build_appstore/image-size-cache.json
            .cache/build_appstore/image-digest-cache.json
          key: ${{ env.BUILD_CACHE_KEY }}

      - name: Write release job summary
        if: always()
        uses: ./.github/actions/write-job-summary
        with:
          title: Release Summary
          report-jsons: |
            out/build-v2-report.json
            out/build-v1-report.json

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist

      - name: Refresh jsDelivr cache
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@gh-pages/index.json" || true
          curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@gh-pages/store/main.zip" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-assets/v2-dist.zip
            release-assets/main.zip
            release-assets/build-v2-report.json
            release-assets/build-v1-report.json
